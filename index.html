<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--b:#003DA5;--r:#DC1C2E;--bg:#F0F2F5;--t:#1a1a2e;--t2:#6b7280}
body{font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:var(--bg);color:var(--t);height:100dvh;overflow:hidden}
.L{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100dvh;background:linear-gradient(135deg,var(--b),#001d52);padding:24px}
.L h1{color:#fff;font-size:28px;font-weight:700;margin-bottom:4px}.L p{color:rgba(255,255,255,.7);font-size:14px;margin-bottom:32px}
.lb{background:#fff;border-radius:16px;padding:32px 24px;width:100%;max-width:340px}
.lb label{display:block;font-size:13px;color:var(--t2);margin-bottom:6px;font-weight:500}
.lb select,.lb input{width:100%;padding:14px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:16px;margin-bottom:16px;outline:none;background:#fafbfc;-webkit-appearance:none}
.lb button{width:100%;padding:14px;background:var(--r);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer}
.le{color:var(--r);font-size:13px;text-align:center;margin-top:8px;min-height:20px}
.A{display:none;flex-direction:column;height:100dvh}
.hd{background:var(--b);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:12px}
.hd span{font-size:20px}.hd .hi{flex:1}.hd .hn{font-size:16px;font-weight:600}.hd .hs{font-size:11px;color:rgba(255,255,255,.7)}
.hd button{background:none;border:none;color:rgba(255,255,255,.7);font-size:22px;cursor:pointer}
.ch{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch}
.m{max-width:88%;padding:12px 16px;border-radius:16px;font-size:15px;line-height:1.6;word-wrap:break-word;white-space:pre-wrap;animation:fi .2s}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.mu{background:var(--b);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.mb{background:#fff;color:var(--t);align-self:flex-start;border-bottom-left-radius:4px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.tp{align-self:flex-start;background:#fff;padding:14px 20px;border-radius:16px;border-bottom-left-radius:4px}
.dt{display:flex;gap:4px}.dt span{width:8px;height:8px;background:var(--t2);border-radius:50%;animation:bo 1.2s infinite}
.dt span:nth-child(2){animation-delay:.2s}.dt span:nth-child(3){animation-delay:.4s}
@keyframes bo{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.ip{padding:10px 12px;background:#fff;border-top:1px solid #e8e8e8;display:flex;gap:8px;align-items:flex-end}
.ip textarea{flex:1;padding:12px 16px;border:1.5px solid #e0e0e0;border-radius:22px;font-size:15px;font-family:inherit;resize:none;outline:none;max-height:100px;min-height:44px;line-height:1.4;background:#fafbfc}
.ip textarea:focus{border-color:var(--b)}
.ip button{width:44px;height:44px;background:var(--r);color:#fff;border:none;border-radius:50%;font-size:20px;cursor:pointer;flex-shrink:0}
.ip button:active{transform:scale(.9)}.ip button:disabled{opacity:.4}
.W{text-align:center;padding:30px 16px;color:var(--t2)}.W .e{font-size:48px;margin-bottom:10px}.W h2{color:var(--t);font-size:20px;margin-bottom:6px}.W p{font-size:14px;line-height:1.5;margin-bottom:14px}
.qb{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}.qb button{background:#fff;border:1.5px solid #e0e0e0;border-radius:20px;padding:8px 12px;font-size:12px;color:var(--b);cursor:pointer}.qb button:active{border-color:var(--b);background:#f0f4ff}
</style></head><body>

<div class="A" id="A"><div class="hd"><span>🏠</span><div class="hi"><div class="hn">Doğuş Asistan</div><div class="hs" id="usr"></div></div><button onclick="location.reload()">✕</button></div><div class="ch" id="ch"><div class="W" id="W"><div class="e">🏠</div><h2 id="wn">Merhaba!</h2><p>Sorunuzu yazın, size yardımcı olayım.</p><div class="qb"><button onclick="q(this)">Ofisin adresi?</button><button onclick="q(this)">Nöbetçi kim?</button><button onclick="q(this)">Su bitti</button><button onclick="q(this)">Kapanış formu</button><button onclick="q(this)">Tapu evrakları</button><button onclick="q(this)">Pahalı diyor</button><button onclick="q(this)">Afiş bastır</button><button onclick="q(this)">PIN listesi</button></div></div></div><div class="ip"><textarea id="ti" rows="1" placeholder="Sorunuzu yazın..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}" oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px'"></textarea><button id="sb" onclick="send()">➤</button></div></div>
<script>
var KB="RE/MAX DOGUS BILGI BANKASI\n\nSIRKET: UMT GROUP GAYRIMENKUL, RE/MAX DOGUS\nAdres: Dumlupinar Mah. Ozen Sok. Nuhoglu Yenitepe Sit. 2.Etap A Blok Dukkan 14, Kadikoy/Istanbul\nTel: 0216 315 15 15 | E-posta: info@remaxdogus.com.tr\nVD: Goztepe | VN: 8920318332 | Yetki Belge: 3402699\nBroker: Umut Tokkus\nHizmet: Satilik %2+KDV (her iki taraf), Kiralik 1 aylik kira+KDV\nSirket Hesabi (Kaparo): NPara TR54 0015 7000 0000 0127 9656 20\nNOBET: 7 kisi dongu: Gamze-Gizem-Irem-Orhan-Evsen-Ozlem-Alpay. 23 Tem 2026=Gamze. Hafta sonu yok. Aysun nobet disi.\nPINler: Alpay:2824, Aysun:3847, Evsen:4657, Gamze:3286, Gizem:2679, Irem:9935, Orhan:7912, Ozlem:2535, Umut(Broker):1520\nUYGULAMALAR: Kapanis Formu: dogusremax.github.io/kapanis-formu | Matbu Evraklar: dogusremax.github.io/matbu-evraklar | Portfoy Takip: dogusremax.github.io/portfoy-takip | Musteri Takip: dogusremax.github.io/musteri-takip | Degerleme: dogusremax.github.io/remax-de-erleme | Danisman Takip ve Kibris Katalog: Apps Script Umut'tan link al | yenifikirtepeburada.com\nTelefona ekle: Safari-Paylas-Ana Ekrana Ekle\nOFIS: Hafta ici 09:30-18:00, hafta sonu 10:30-17:00. Gelme zorunlulugu yok (nobet/org/egitim haric).\nACILIS: Isiklar, sandalyeler disari, TV, duvar isik, bar isik, kapi ac, bilgisayar, cay (8 poset cay).\nKAPANIS: TV kapat, caydanlik kapat, isiklar kapat, sandalyeler iceri, kilit kontrol.\nTEDARIKCILER: Basim/Afis: Turgut Bey 0535 543 69 98 | Drone/Video: Ensar Bey 0533 197 34 53 | Su: Hamidiye 0216 504 52 16 veya 0532 360 10 97 (sirket oder) | Muameleci Kadikoy: Burak Bey 0537 549 90 00 | Muameleci Uskudar: Umut Bey 0532 562 58 6\nKAPARO: Min %5 sirket hesabina yatir, makbuz ver. Alici vazgecerse iade yok, satici vazgecerse iade+tazminat.\nTAPU: Randevu webtapu.tkgm.gov.tr veya ALO 181. Satici: kimlik+tapu+borcu yoktur+DASK. Alici: kimlik. Harc %2+%2.\nTAKYIDAT: e-Devlet Tapu Bilgileri Sorgulama. RAYIC: Belediye Gelirler Mudurlugu. EKSPERTIZ: Alici bankaya basvur, Web Tapu'dan yetki ver, 15-25K TL var GU="https://api.groq.com/openai/v1/chat/completions";
var user="",msgs=[];
function doLogin(){var s=document.getElementById("sel"),p=document.getElementById("pin").value,e=document.getElementById("err");if(!s.value){e.textContent="Danışman seçiniz";return;}if(p!==s.value){e.textContent="PIN hatalı";return;}user=s.options[s.selectedIndex].text;msgs=[{role:"system",content:"Sen RE/MAX Dogus ofisinin dijital asistanisin. SADECE asagidaki bilgi bankasindan cevap ver. Kisa, net, sicak cevap ver. Telefon, link, adres varsa aynen ver. Bilgi bankasinda yoksa Bu konuyu Umut Bey ile gorus de. Turkce cevapla. Konusan kisi: "+user+"\nBILGI BANKASI:\n"+KB}];document.getElementById("L").style.display="none";document.getElementById("A").style.display="flex";document.getElementById("wn").textContent="Merhaba "+user.split(" ")[0]+"!";document.getElementById("usr").textContent=user;document.getElementById("ti").focus();}
function q(b){document.getElementById("ti").value=b.textContent;send();}
function addMsg(t,u){var w=document.getElementById("W");if(w)w.style.display="none";var d=document.createElement("div");d.className="m "+(u?"mu":"mb");d.textContent=t;document.getElementById("ch").appendChild(d);setTimeout(function(){document.getElementById("ch").scrollTop=99999},50);}

async function send(){var ti=document.getElementById("ti"),txt=ti.value.trim();if(!txt)return;ti.value="";ti.style.height="auto";document.getElementById("sb").disabled=true;addMsg(txt,true);showT();msgs.push({role:"user",content:txt});try{var r=await fetch(GU,{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+GK},body:JSON.stringify({model:"llama-3.1-8b-instant",messages:msgs,temperature:0.3,max_tokens:800})});var d=await r.json();var t=document.getElementById("typ");if(t)t.remove();if(d.choices&&d.choices[0]){var reply=d.choices[0].message.content;msgs.push({role:"assistant",content:reply});addMsg(reply,false);if(msgs.length>8){var sys=msgs[0];msgs=[sys].concat(msgs.slice(-6));}}else{addMsg("30 saniye bekle tekrar dene.",false);}}catch(ex){var t=document.getElementById("typ");if(t)t.remove();addMsg("Baglanti hatasi.",false);}document.getElementById("sb").disabled=false;document.getElementById("ti").focus();}
document.getElementById("pin").addEventListener("input",function(){this.value=this.value.replace(/[^0-9]/g,"");});

</script></body></html>
