{title:'REFERRAL VE COOPERATION PROSEDÜRÜ (2026)',content:'## REFERRAL VE COOPERATION PROSEDÜRÜ (2026)\n\n### Tanımlar\nReferral (Yönlendirme): Bir gayrimenkule veya müşteriye ait bilgilerin başka bir RE/MAX ofisiyle paylaşılması. Amaç: müşteriye daha hızlı hizmet sunmak.\nCooperation (İş Birliği): İki danışman/ofisin aynı işlemde taraflı (alıcı-satıcı) birlikte çalışması. Her ofis kendi tarafının hizmet bedelini tahsil eder.\nTakım Çalışması (Team Work): Aynı portföy/müşteri üzerinde iki+ danışmanın yazılı paylaşım anlaşmasıyla ortak çalışması. Masraf ve kazanç %50-%50.\n\n### Genel İlkeler\n1. Her işlem kayıt altına alınmalı — MYRE/MAX Referral Co-operation listesi üzerinden yapılır\n2. Sözlü veya WhatsApp yönlendirmeleri resmi işlem sayılmaz\n3. Referral sözleşmeyi alan ofisindir\n4. Portföyü yönlendiren ofis sadece yönlendirme hakkı alır, hukuki haklar sözleşmeyi alan ofisindir\n5. Referral ödemesi en geç 3 iş günü içinde yapılmalı\n6. Ödeme banka aracılığıyla — elden veya makbuzsuz ödeme yasak\n7. Tüm anlaşmalar şeffaf olmalı\n8. Satış fiyatı, hizmet bedeli, müşteri iletişimi açık paylaşılmalı\n9. Her işlemde "ofis esastır" — portföyler ve referral hakları ofise aittir\n\n### Süreç Akışı\n1. MYRE/MAX\'ta "Referral Co-operation" menüsünden yeni talep oluştur\n2. Portföy türü (satılık/kiralık) ve bölgesini belirt\n3. Karşı ofis 24 saat içinde kabul/ret\n4. Kabul → yönlendirme tamamlanır\n\n### Paylaşım Oranları\n- Satış: %25 referral payı (yönlendiren ofis, hizmet bedelinin %25\'ini alır)\n- Kiralama: %12,5 referral payı\n- Cooperation: %50 / %50 (her taraf kendi müşterisinden)\n- Takım Çalışması: %50 / %50 (fiilen yer gösterimi zorunlu)\n\n### Süre ve Geçerlilik\n- Referral geçerlilik süresi maksimum 2 yıl\n- Aynı müşteri 1 yıl içinde aynı portföy için tekrar işlem yaparsa ilk referral ofisine hak doğar\n\n### Özel Durumlar\n- Fiyat/hizmet bedeli değişirse: Gerçekleşen fiyat üzerinden ödeme yapılır\n- Referral\'ın referral\'ı olmaz (transfer zinciri kuralı)\n- Üçlü paylaşımlarda her ofis kendi tarafına göre hak alır\n- RE/MAX dışı kişilere %25 kuralı geçersiz — mutabakat ile %5-%10 arası jest ödemesi\n- Tanıdık müşteri istisnası: Karşı ofisin son 1 yılda aktif iletişimde olduğu müşteri → referral geçersiz\n- %25 referral oranı değiştirilemez\n- Tüm ödemeler ofis hesabından — danışmanlar arası doğrudan para transferi yasak\n\n### Takım Çalışması Kuralları\n- Sözleşmeyi alan danışman portföyü sisteme girer ve brandayı kendi adına asar\n- Alıcıyı da kendileri buluyorsa toplam hizmet bedeli 2\'ye bölünür\n- Firma portföyünde hizmet bedeli firmadan A ofise ödenir, A ofis 3 iş günü içinde B\'ye aktarır\n- Parça parça ödeme geliyorsa her ödeme anında paylaşım yapılır\n\n---'},
{title:'REMAX TÜRKİYE OFİS PERFORMANS KARNESİ (2026)',content:'## REMAX TÜRKİYE OFİS PERFORMANS KARNESİ (2026)\n\n### 7 Kategori (her biri 100 puan)\n1. Ofis Cirosu — 100 puan\n2. Recruiting — 100 puan\n3. Retention — 100 puan\n4. GD Ciro Verimliliği — 100 puan\n5. Portföy Satış & Kiralama — 100 puan\n6. Müşteri Memnuniyeti — 100 puan\n7. Eğitim & Organizasyon — 100 puan\n\nHesaplama: 7 kategorinin puanları (+puanlar dahil) toplanarak 7\'ye bölünür.\nKarne notu: 100+ = A+, 85-99 = A, 65-84 = B, 0-64 = C\n\n### Ofis Cirosu (KDV dahil, sistemdeki rakamlar)\n119M TL+ = 100 puan, 95.2M-119M = 90, 83.3M-95.2M = 80, 71.4M-83.3M = 70, 59.5M-71.4M = 60, 47.6M-59.5M = 50, 35.7M-47.6M = 40\nBonus: 130.2M+ = +15, 135.85M+ = +30, 142.8M+ = +45, 154.7M+ = +60, 166.6M+ = +75, 178.5M+ = +90\n\n### Recruiting (Yeni GD sayısı, 31 Aralık 2026 itibariyle)\n45+ GD = 100, 40-44 = 90, 35-39 = 80, 30-34 = 70, 25-29 = 60, 20-24 = 50, 15-19 = 40\nBonus: 50+ GD = +10, 60+ = +20, 70+ = +30, 80+ = +40, 90+ = +50, 100+ = +60\n\n### Retention (01.01.2025-31.12.2025 arası katılan danışmanların 31.12.2026\'da kalma oranı)\n%70+ = 100, %60-%69 = 80, %45-%59 = 60, %30-%44 = 40\nMin 8 yeni recruiting koşulu var. 5 yıl+ kıdemli 1-5 GD\'li ofisler +10, 6+ GD\'li ofisler +20.\n\n### GD Ciro Verimliliği (Ofis GD Cirosu / Ortalama GD Sayısı, KDV dahil)\n1.428.000+ TL = 100, 1.309.000-1.428.000 = 90, 1.190.000-1.309.000 = 80, 1.071.000-1.190.000 = 70, 952.000-1.071.000 = 60, 833.000-952.000 = 50, 714.000-833.000 = 30\n\n### Portföy Satış & Kiralama\nFormül: (Satış & Kiralama gerçekleşen portföy sayısı / Sisteme girilen portföy sayısı) × 10.000 / 35\nHedef: Her 3 portföyden 1\'inin işleme dönmesi (%35 barem)\nBonus: Yılsonunda net portföy sayısı %10+ artış yapan ofislere +20 puan\n\n### Müşteri Memnuniyeti (Yorum sayısı / işlem sayısı oranı)\n%80+ = 100, %60-%80 = 80, %45-%60 = 60, %30-%45 = 40\nÇözülmeyen şikayet başına -20 puan. 3+ şikayetli ofisler değerlendirme dışı kalabilir.\nA+ için min 80, A için min 60 puan zorunlu.\n\n### Eğitim & Organizasyon\nMomentum 2.0 = 20, Broker Kampı = 20, 92 Günlük Oryantasyon = 15, Power Camp 2.0 = 15, Business By Design = 10, Kongre/Ödül Töreni (5+ RE/MAX\'li) = 20\nBonus: Avrupa/Amerika kongresi +20, 3+ kişi Collection eğitimi +20, 20+ kişi Powercamp/BBD +20\nA+ için min 80, A için min 60 puan zorunlu.\n\n---'},
{title:'REMAX TÜRKİYE DANIŞMAN PERFORMANS KARNESİ (2026)',content:'## REMAX TÜRKİYE DANIŞMAN PERFORMANS KARNESİ (2026)\n\n### 4 Ana Kategori\n1. Portföy — 120 puan (maks)\n2. İşlem-Ciro — 160 puan (maks)\n3. Müşteri Memnuniyeti — 100 puan\n4. Eğitim & Organizasyon — 100 puan\n\nHesaplama: 4 kategorinin puanları toplanarak 4\'e bölünür. Ek puanlar üzerine eklenir.\n\n### Portföy (maks 120 puan)\n- Yayına alınan her portföy = 3 puan\n- Video/sanal tur eklenmişse = +1 puan\n- Maks 120 puan\n\n### İşlem-Ciro (maks 160 puan, 5 alt kategori)\n\nKulüp Ödülü:\nWelcome veya Yıldızlar = 20, %100 = 40, Platinum = 50, Chairmans = 60, Excellence = 70, Diamond = 80, Crown = 90\n\nPortföylerin İşleme Dönme Oranı (min 3 portföy):\n%33-%50 = 10, %50-%75 = 15, %75+ = 20\n\nPortföy Fiyatı / İşlem Fiyatı Oranı (maks 40):\nİndirim %5\'ten az = 5 puan, %5-%10 arası = 3 puan\n\nCiro Artış Oranı (önceki yıl ciro 2M TL+ olmalı):\n%50 artış = 5, %100 artış = 10, %200 artış = 15\n\nİşlem Adedi (maks 40):\nHer satılık/kiralık ciro raporu = 1 puan, çift taraflı hizmet bedeli = 2 puan, RE/MAX paylaşımlı = 3 puan\n\n### Müşteri Memnuniyeti\nİşlemle eşleşen onaylı yorum = 4 puan, eşleşmeyen yorum = 1 puan (maks 10)\nÇözülmeyen şikayet başına -5 puan\n\n### Eğitim & Organizasyon\nMYRE/MAX üzerinden kaydolup katıldığı her eğitim/organizasyon = 25 puan\n\n### Ek Puanlar\nKıdem: 5 yıl = +2, 10 yıl = +4, 15 yıl = +6, 20 yıl = +8\nÜst üste 3 yıl kulüp ödülü = +3\nSisteme yeni GD kazandırma = her biri +2\nİç Denetim cezai işlem = her biri -5\n\n### Karne Notları\n100+ = Zirvedekiler (A+) 👑\n80-99 = Yükselenler (A) 🚀\n60-79 = Gelişenler (B) 🌱\n0-59 = Keşiftekiler (C) 🔍\n\n---\n\n---'},
{title:'REMAX TÜRKİYE MARKA STANDARTLARI (2024)',content:'## REMAX TÜRKİYE MARKA STANDARTLARI (2024)\n\nKaynak: 54 sayfalık resmi marka kılavuzu (PDF olarak mevcut — detay için Umut\'a sor)\n\n### RE/MAX Logosu Kullanım Kuralları\n- Logo her zaman orijinal oranlarında kullanılır — uzatma, sıkıştırma, döndürme yasak\n- Logo etrafında minimum boş alan (clear zone) bırakılmalı — logonun balon kısmının genişliği kadar\n- Logo minimum boyutun altında kullanılmaz\n- Arka plan üzerinde kontrast sağlanmalı — koyu arka planda beyaz/açık versiyon, açık arka planda renkli versiyon\n- Logo üzerine metin, şekil, efekt eklenmez\n- Logo renkleri değiştirilemez\n\n### Marka Renkleri\n- RE/MAX Mavi: #003DA5 (Pantone 293 C)\n- RE/MAX Kırmızı: #DC1C2E (Pantone 186 C)\n- Beyaz: #FFFFFF\n- Bu renkler tüm materyallerde tutarlı kullanılmalı\n\n### Tipografi\n- Resmi font ailesi marka kılavuzunda belirtilmiştir\n- Dijital materyallerde okunabilir, modern fontlar kullanılmalı\n- Sosyal medyada marka fontlarına uyum sağlanmalı\n\n### Ofis Tabelası ve Branda\n- Dış cephe tabelası RE/MAX standartlarına uygun olmalı\n- Balon logosu belirgin şekilde görünmeli\n- Ofis adı "RE/MAX [Ofis Adı]" formatında yazılmalı\n- Tabela tasarımı için RE/MAX Türkiye onayı gerekli\n\n### Kartvizit\n- RE/MAX standart kartvizit şablonu kullanılmalı\n- Danışman adı, unvanı, telefon, e-posta, ofis adresi\n- RE/MAX logosu ve ofis logosu belirtilen konumlarda\n- Canva\'da hazırlarken marka renklerine ve logo yerleşimine dikkat et\n\n### Araç Giydirme\n- Araç üzerinde RE/MAX balon logosu ve ofis bilgileri belirli standartlarda\n- Tasarım için RE/MAX Türkiye onayı gerekli\n\n### Sosyal Medya\n- Profil fotoğrafı ve kapak görseli marka standartlarına uygun\n- Paylaşımlarda RE/MAX logosu ve marka renkleri tutarlı kullanılmalı\n- Şablonlar için RE/MAX Türkiye pazarlama departmanından destek alınabilir (Kerem Çiçek — 0533 810 31 34)\n\n### Premium Markalar\n- RE/MAX Collection: Lüks konut segmenti\n- RE/MAX Commercial: Ticari gayrimenkul\n- Bu markaların ayrı logo ve renk standartları var\n\n### Genel Kurallar\n- Tüm basılı ve dijital materyallerde marka kılavuzuna uyulmalı\n- Onaysız tasarımlar kullanılmamalı\n- Şüphen varsa Umut\'a veya RE/MAX Türkiye pazarlama ekibine danış\n\n### Ödül Paylaşımı ve Basın Kuralları (Sosyal Medya / Yazılı Basın)\n- Ödülün ait olduğu ay ve yılı belirtilmeli\n- Sıralama doğru yayınlanmalı (tüm üyeler arasındaki sıralama)\n- Ay veya yıl bitmeden anlık ödül paylaşımı yapılmaz\n- Ödül alınan bölge yazılmalı\n- RE/MAX Türkiye resmi olarak yayınlamadan kişisel ödül paylaşımı yapılmaz\n- Yazılı/görsel basın çalışmalarında (dergi, gazete) baskıya girmeden önce onay alınmalı\n- Onay için: dogukany@remax.com.tr ve fundak@remax.com.tr\n\n---'},
{title:'REMAX\'Lİ GAYRİMENKUL DANIŞMANI YOL HARİTASI',content:'## REMAX\'Lİ GAYRİMENKUL DANIŞMANI YOL HARİTASI\n\n### Danışman Başlangıç Checklist\'i — Bölüm 1 (Temel Hazırlıklar)\n1. Hedeflerin belirlenmesi\n2. Günlük, haftalık ve aylık iş planının oluşturulması\n3. Sosyal medya hesaplarının güncellenmesi\n4. Kişisel tanıtım hazırlanması (broşür, kartvizit vb.)\n5. Etki çevresine bilgi verilmesi\n6. Video CV hazırlanması\n7. 1. Sunum dosyası hazırlanması\n8. Bölge çalışması\n9. Bölge seçimi\n10. Bölgede broşür dağıtılması\n11. Bölgede kilit kontaklara ulaşılması\n12. FSBO script oluşturulması\n\n### Danışman Başlangıç Checklist\'i — Bölüm 2 (Satış Süreçleri)\n13. FSBO aramaları yapılması\n14. Randevu öncesi hazırlıklar\n15. Randevu öncesi prova\n16. RPA analizi yapma\n17. 2. Sunum hazırlanması\n18. 2. Sunum provası\n19. Pazarlama faaliyetleri\n20. Alıcı sunumu hazırlama\n21. Alıcı sunumu prova\n22. İtiraz karşılama scriptlerinin hazırlanması\n23. İtiraz karşılama provaları\n24. Satış süreci checklist hazırlanması\n25. Satış sonrası hizmetler checklist hazırlanması\n\n### Yol Haritası Aşamaları\n\nAşama 1 — Kişisel Gelişim ve Hazırlık:\n- RE/MAX sistemini tanı (MyREMAX, portföy, CRM)\n- Kişisel markalaşma (kartvizit, sosyal medya, video CV)\n- Bölge seçimi ve bölge analizi\n- Hedef belirleme (günlük/haftalık/aylık)\n\nAşama 2 — İş Geliştirme ve Müşteri Bulma:\n- FSBO aramaları (sahibinden ilan sahiplerini arama)\n- Etki çevresi aramaları (tanıdıklar, referanslar)\n- Bölge çalışması (kapı kapı, broşür, kilit kontaklar)\n- Sosyal medya içerik üretimi\n\nAşama 3 — Sunum ve Yetki Alma:\n- 1. Sunum (tanışma, mülk analizi)\n- RPA (emsal) analizi hazırlama\n- 2. Sunum (fiyat analizi, pazarlama planı, yetki alma)\n- İtiraz karşılama provası\n\nAşama 4 — Pazarlama ve Satış:\n- Portföy yayınlama (remax.com.tr, sahibinden, hepsiemlak)\n- Profesyonel fotoğraf ve video\n- Sosyal medya reklamı\n- Gösterim ve takip\n- Müzakere ve kapanış\n\nAşama 5 — Kapanış ve Sonrası:\n- Sözleşme ve evrak hazırlığı\n- Tapu süreci takibi\n- Müşteri memnuniyeti\n- Referans ve yorum toplama\n- Satış sonrası hizmetler\n\n---'},
{title:'SEN DOLDUR — KALAN EKSİKLER',content:'## SEN DOLDUR — KALAN EKSİKLER\n\n[UMUT: Aşağıdaki ofise özel konuları doldur]\n\n### Afiş/Kartvizit Tedarikçisi\nTurgut Bey — 0535 543 69 98\nAfiş, kartvizit, tabela, broşür ve diğer basılı materyaller için Turgut Bey\'i arayın.\n\n### Drone Çekimi ve Profesyonel Video\nEnsar Bey — 0533 197 34 53\nPortföy tanıtım videosu, drone ile dış çekim, proje tanıtımı ve profesyonel video prodüksiyon için Ensar Bey\'i arayın.\n\n### Ofis Suyu\nHamidiye Su — 0216 504 52 16 veya 0532 360 10 97\nSu bitince arayıp sipariş ver. Ödeme yapmana gerek yok — şirket toplu ödeme yapıyor.\n\n### Tapu Muamelecisi\nSatış/devir işlemi başladığında tapu muamelecisi gerekir. Evrak hazırlığı, randevu ve tapu sürecini takip eder.\n\n- Kadıköy ve çevre ilçeler: Burak Bey — 0537 549 90 00\n- Sadece Üsküdar Tapu: Umut Bey — 0532 562 58 6\n\n### Ofis Kuralları\nÇalışma saatleri:\n- Hafta içi: 09:30 – 18:00\n- Hafta sonu: 10:30 – 17:00\n- Ofis her gün açık (7/7)\n\nDanışman gelme zorunluluğu:\n- Danışmanların her gün ofise gelme zorunluluğu yoktur\n- Zorunlu olduğun günler: nöbet günün, organizasyonlar ve eğitimler\n- Her gün 1 kişi nöbetçi olarak ofiste bulunur\n- Nöbet, organizasyon ve eğitim tarihleri Google Takvim üzerinden bildirilir — takvimine eklediğinden ve bildirimleri açtığından emin ol\n\n### Ofis Açılış Prosedürü (Nöbetçi Görevi)\nNöbetçi danışman ofise geldiğinde sırasıyla:\n1. Işıkları yak\n2. Dışarıdaki sandalyeleri çıkar\n3. Televizyonları aç\n4. Toplantı masasının arkasındaki duvardaki dekoratif ışığı aç\n5. Bardaki tezgah ışığını aç\n6. Kapıyı aç, ofisi havalandır\n7. Nöbet odasındaki bilgisayarı hazır et (aç, giriş yap)\n8. İstenirse çay demle: demliğe 8 adet poşet çay koy, yeteri kadar su ile demle\n\n### Ofis Kapanış Prosedürü (Nöbetçi Görevi)\nAkşam çıkarken sırasıyla:\n1. Televizyonları kapat\n2. Çaydanlığı kapat\n3. Tüm ışıkları kapat (tezgah ışığı, duvar ışığı dahil)\n4. Dışarıdaki sandalyeleri içeri al\n5. Kapının kilitlendiğinden emin ol\n6. Son kontrol yap ve git'}
];

let currentUser="";
let history=[];

function searchSections(query) {
  const q = query.toLowerCase().replace(/[?!.,]/g,'');
  const words = q.split(/\s+/).filter(w=>w.length>2);
  const scored = SECTIONS.map((s,i) => {
    const txt = (s.title + ' ' + s.content).toLowerCase();
    let score = 0;
    words.forEach(w => {
      const aliases = {
        'nöbet':['nöbet','nobetci','nöbetçi','görev'],
        'kapanış':['kapanış','kapanis','kapaniş'],
        'tapu':['tapu','devir','harç','takyidat','rayiç','ekspertiz'],
        'müşteri':['müşteri','musteri','itiraz','pahalı','komisyon','düşüneyim'],
        'kıbrıs':['kıbrıs','kibris','döveç','dovecç','cyprus'],
        'sunum':['sunum','1.sunum','2.sunum','presentasyon'],
        'instagram':['instagram','sosyal','medya','reklam','post'],
        'whatsapp':['whatsapp','grup','broadcast','toplu','mesaj'],
        'canva':['canva','görsel','afiş','tasarım','design'],
        'capcut':['capcut','video','edit','düzenleme','montaj'],
        'matbu':['matbu','evrak','sözleşme','kontrat','yetki'],
        'portföy':['portföy','portfolio','ilan','sahibinden'],
        'değerleme':['değerleme','degerleme','ekspertiz','fiyat','analiz'],
        'linkedin':['linkedin','profesyonel'],
        'linktree':['linktree','link','bio'],
        'referral':['referral','cooperation','paylaşım','yönlendirme'],
        'karne':['karne','performans','puan','sıralama'],
        'marka':['marka','logo','renk','standart','brand'],
        'ofis':['ofis','açılış','kapanış','kural','saat','nöbet','su','çay'],
        'pin':['pin','giriş','şifre','login'],
        'tedarikçi':['tedarikçi','matbaa','drone','ensar','turgut','su','hamidiye','muameleci'],
        'takvim':['takvim','calendar','google','bildirim'],
        'hesap':['hesap','iban','banka','npara'],
        'myremax':['myremax','myre','remax sistemi','sistem'],
        'eğitim':['eğitim','egitim','power','akademi','oryantasyon'],
        'chatgpt':['chatgpt','yapay','zeka','ai','gemini','notebooklm'],
        'yol':['yol','haritası','checklist','başlangıç'],
        'kariyer':['kariyer','danışman olmak','aday'],
      };
      let matched = false;
      for (const [key, vals] of Object.entries(aliases)) {
        if (vals.some(v => w.includes(v) || v.includes(w))) {
          if (vals.some(v => txt.includes(v))) { score += 3; matched = true; break; }
        }
      }
      if (!matched && txt.includes(w)) score += 2;
    });
    if (q.includes(s.title.toLowerCase().substring(0,10)) && s.title.length > 3) score += 5;
    return {idx:i, score:score};
  });
  scored.sort((a,b) => b.score - a.score);
  let result = '';
  let tokenEstimate = 0;
  for (const item of scored) {
    if (item.score <= 0) break;
    const sec = SECTIONS[item.idx].content;
    const est = sec.length / 3;
    if (tokenEstimate + est > 8000) break;
    result += sec + '\n\n';
    tokenEstimate += est;
  }
  if (!result) {
    result = SECTIONS.slice(0, 3).map(s => s.content).join('\n\n');
  }
  return result;
}

function login() {
  const sel=document.getElementById("nameSelect");
  const pin=document.getElementById("pinInput").value;
  const err=document.getElementById("loginError");
  if(!sel.value){err.textContent="Danışman seçiniz";return;}
  if(pin!==sel.value){err.textContent="PIN hatalı";return;}
  currentUser=sel.options[sel.selectedIndex].text;
  history=[];
  document.getElementById("loginScreen").style.display="none";
  document.getElementById("chatScreen").style.display="flex";
  document.getElementById("welcomeName").textContent="Merhaba "+currentUser.split(" ")[0]+"!";
  document.getElementById("chatInput").focus();
}

function askQuick(btn){document.getElementById("chatInput").value=btn.textContent;sendMessage();}

function addMsg(text,isUser){
  const w=document.getElementById("welcomeMsg");if(w)w.style.display="none";
  const d=document.createElement("div");
  d.className="msg "+(isUser?"msg-user":"msg-bot");
  d.textContent=text;
  document.getElementById("chatMessages").appendChild(d);
  const c=document.getElementById("chatMessages");
  setTimeout(()=>c.scrollTop=c.scrollHeight,50);
}

function showTyping(){
  const d=document.createElement("div");
  d.className="msg-typing";d.id="typing";
  d.innerHTML='<div class="typing-dots"><span></span><span></span><span></span></div>';
  document.getElementById("chatMessages").appendChild(d);
  const c=document.getElementById("chatMessages");
  setTimeout(()=>c.scrollTop=c.scrollHeight,50);
}

async function sendMessage(){
  const input=document.getElementById("chatInput");
  const text=input.value.trim();
  if(!text)return;
  input.value="";input.style.height="auto";
  document.getElementById("sendBtn").disabled=true;
  addMsg(text,true);
  showTyping();

  const relevantKB = searchSections(text);
  const sysMsg = PERSONA + "\n\nŞu an seninle konuşan: " + currentUser + "\n\nİLGİLİ BİLGİ BANKASI BÖLÜMLERİ:\n" + relevantKB;

  const msgs = [{role:"system",content:sysMsg}];
  history.push({role:"user",content:text});
  const recentHistory = history.slice(-6);
  msgs.push(...recentHistory);

  try{
    const res=await fetch(GROQ_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+GROQ_KEY},
      body:JSON.stringify({model:"llama-3.3-70b-versatile",messages:msgs,temperature:0.7,max_tokens:1500})
    });
    const data=await res.json();
    const t=document.getElementById("typing");if(t)t.remove();
    if(data.choices&&data.choices[0]){
      const reply=data.choices[0].message.content;
      history.push({role:"assistant",content:reply});
      addMsg(reply,false);
      if(history.length>10){history=history.slice(-8);}
    }else if(data.error){
      addMsg("Hata: "+(data.error.message||"Bilinmeyen hata"),false);
    }else{addMsg("Cevap alınamadı, tekrar dene.",false);}
  }catch(err){
    const t=document.getElementById("typing");if(t)t.remove();
    addMsg("Bağlantı hatası. İnternet bağlantını kontrol et.",false);
  }
  document.getElementById("sendBtn").disabled=false;
  document.getElementById("chatInput").focus();
}

document.getElementById("pinInput").addEventListener("input",function(){this.value=this.value.replace(/[^0-9]/g,"");});
document.getElementById("pinInput").addEventListener("keydown",function(e){if(e.key==="Enter")login();});
</script>
