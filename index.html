<!DOCTYPE html>

<head>

<title>Doğuş Asistan</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--blue:#003DA5;--red:#DC1C2E;--bg:#F0F2F5;--bot-bg:#E8EDF3;--text:#1a1a2e;--text-light:#6b7280}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100dvh;overflow:hidden}
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100dvh;background:linear-gradient(135deg,var(--blue) 0%,#001d52 100%);padding:24px}
.login-title{color:#fff;font-size:28px;font-weight:700;margin-bottom:4px}
.login-subtitle{color:rgba(255,255,255,0.7);font-size:14px;margin-bottom:32px}
.login-box{background:#fff;border-radius:16px;padding:32px 24px;width:100%;max-width:340px}
.login-box label{display:block;font-size:13px;color:var(--text-light);margin-bottom:6px;font-weight:500}
.login-box select,.login-box input{width:100%;padding:14px 16px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:16px;margin-bottom:16px;outline:none;background:#fafbfc;-webkit-appearance:none}
.login-box select:focus,.login-box input:focus{border-color:var(--blue)}
.login-btn{width:100%;padding:14px;background:var(--red);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer}
.login-btn:active{transform:scale(0.97)}
.login-error{color:var(--red);font-size:13px;text-align:center;margin-top:8px;min-height:20px}
.login-version{color:rgba(255,255,255,0.4);font-size:11px;margin-top:24px}
.chat-screen{display:none;flex-direction:column;height:100dvh}
.chat-header{background:var(--blue);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:12px;z-index:10}
.chat-avatar{width:38px;height:38px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;flex-shrink:0}
.chat-header-info{flex:1}
.chat-header-name{font-size:16px;font-weight:600}
.chat-header-status{font-size:11px;color:rgba(255,255,255,0.7)}
.chat-logout{background:none;border:none;color:rgba(255,255,255,0.7);font-size:22px;cursor:pointer;padding:4px 8px}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px;-webkit-overflow-scrolling:touch}
.msg{max-width:85%;padding:10px 14px;border-radius:16px;font-size:15px;line-height:1.5;word-wrap:break-word;white-space:pre-wrap;animation:msgIn .2s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg-user{background:var(--blue);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.msg-bot{background:var(--bot-bg);color:var(--text);align-self:flex-start;border-bottom-left-radius:4px}
.msg-typing{align-self:flex-start;background:var(--bot-bg);padding:12px 18px;border-radius:16px;border-bottom-left-radius:4px}
.typing-dots{display:flex;gap:4px}
.typing-dots span{width:8px;height:8px;background:var(--text-light);border-radius:50%;animation:bounce 1.2s infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.chat-input-area{padding:10px 12px;background:#fff;border-top:1px solid #e8e8e8;display:flex;gap:8px;align-items:flex-end}
.chat-input-area textarea{flex:1;padding:12px 16px;border:1.5px solid #e0e0e0;border-radius:22px;font-size:15px;font-family:inherit;resize:none;outline:none;max-height:120px;min-height:44px;line-height:1.4;background:#fafbfc}
.chat-input-area textarea:focus{border-color:var(--blue)}
.send-btn{width:44px;height:44px;background:var(--red);color:#fff;border:none;border-radius:50%;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.send-btn:active{transform:scale(0.9)}
.send-btn:disabled{opacity:.4}
.welcome-msg{text-align:center;padding:40px 20px;color:var(--text-light)}
.welcome-msg .emoji{font-size:48px;margin-bottom:12px}
.welcome-msg h2{color:var(--text);font-size:20px;margin-bottom:8px}
.welcome-msg p{font-size:14px;line-height:1.5}
.quick-btns{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:16px}
.quick-btn{background:#fff;border:1.5px solid #e0e0e0;border-radius:20px;padding:8px 14px;font-size:13px;color:var(--blue);cursor:pointer}
.quick-btn:hover{border-color:var(--blue);background:#f0f4ff}
</style>
</head>

const SECTIONS=[
{title:'DOĞUŞ BİLGİ BANKASI — RE/MAX DOĞUŞ OFİS ASISTANI',content:'# DOĞUŞ BİLGİ BANKASI — RE/MAX DOĞUŞ OFİS ASISTANI'},
{title:'ASISTAN KİŞİLİĞİ — UMUT TOKKUŞ GİBİ CEVAP VER',content:'## ASISTAN KİŞİLİĞİ — UMUT TOKKUŞ GİBİ CEVAP VER\n\nSen RE/MAX Doğuş\'un dijital asistanısın. Cevaplarını broker Umut Tokkuş\'un tarzında ver. Sanki Umut cevap veriyor gibi konuş.\n\nUmut\'un iletişim tarzı:\n- Sıcak ama profesyonel. "Sen" dili kullanır, saygılı ama mesafeyi korur.\n- Direkt ve nettir. Lafı dolandırmaz, ne demek istiyorsa söyler.\n- Hata gördüğünde yuvarlak konuşmaz, açıkça belirtir ama saygıyla.\n- Motivasyon verirken hem enerji hem veri hem de kendi deneyimlerinden hikayeler kullanır.\n\nUmut\'un sık kullandığı yaklaşımlar:\n- "Haydi, yapabilirsin!" — ateşleyici, cesaret verici\n- "Sana güveniyorum" — güven veren, destekleyici\n- "Hadi bakalım, işe koyulalım" — aksiyona yönlendiren\n- "Senden beklentim yüksek" — standartları hatırlatan\n\nUmut\'un temel değerleri (öncelik sırasıyla):\n1. Disiplin ve süreklilik — her gün düzenli çalışmak, biriktirmemek\n2. Dürüstlük ve şeffaflık — müşteriye ve ekibe karşı dürüst olmak\n3. Müşteri memnuniyeti — işin sonunda müşteriyi mutlu etmek\n\nCevap verme kuralları:\n- Kısa ve net cevap ver, gereksiz uzatma\n- Adım adım açıkla, karmaşık bırakma\n- Danışmanı cesaretlendir, eleştirirken bile yapıcı ol\n- "Bilmiyorum" deme — bilgi bankasında yoksa "Bu konuyu Umut\'a sor" de\n- Türkçe cevap ver, sade dil kullan, jargondan kaçın\n- Danışmana ismiyle hitap et (giriş yapınca kim olduğunu bilirsin)'},
{title:'ŞİRKET BİLGİLERİ',content:'## ŞİRKET BİLGİLERİ\n\nŞirket Ünvanı: UMT GROUP GAYRİMENKUL YATIRIM DANIŞMANLIK İNŞ. SAN. TİC. LTD. ŞTİ.\nMarka: RE/MAX DOĞUŞ\nVergi Dairesi: Göztepe VD.\nVergi Numarası: 8920318332\nYetki Belge Numarası: 3402699\nAdres: Dumlupınar Mah. Özen Sok. Nuhoğlu Yenitepe Sitesi 2. Etap A Blok Dükkan 14, Kadıköy / İstanbul\nTelefon: 0216 315 15 15\nE-posta: info@remaxdogus.com.tr\nBroker: Umut Tokkuş\n\nHizmet Bedelleri:\n- Satılık işlemlerde: Satış bedelinin %2 + KDV (her iki taraftan ayrı ayrı)\n- Kiralık işlemlerde: 1 aylık kira bedeli + KDV\n\n---'},
{title:'NÖBET DÜZENİ',content:'## NÖBET DÜZENİ\n\nNöbet 7 kişilik döngüyle çalışır. Sıralama:\n1. Gamze Yetkin\n2. Gizem Gök\n3. İrem Aleyna Tetik\n4. Orhan Özazman\n5. Evşen Özazman\n6. Özlem Varol\n7. Ayşegül Alpay\n\nBaşlangıç noktası: 23 Temmuz 2026 = Gamze. Her gün bir sonraki kişiye geçer.\nHafta sonları nöbet yoktur, sadece hafta içi sayılır.\nAysun Yılmaz sağlık sebebiyle nöbet dışıdır.\n\nNöbetçi danışman o gün ofiste bulunur ve gelen müşterileri karşılar.\n\n---'},
{title:'UYGULAMALAR',content:'## UYGULAMALAR\n\n### Uygulama Linkleri (Tam Liste)\n- Kapanış Formu: dogusremax.github.io/kapanis-formu\n- Matbu Evraklar: dogusremax.github.io/matbu-evraklar\n- Portföy Takip: dogusremax.github.io/portfoy-takip\n- Müşteri Takip: dogusremax.github.io/musteri-takip\n- RE/MAX Değerleme: dogusremax.github.io/remax-de-erleme\n- Danışman Takip (Performans/Karne): Apps Script üzerinden çalışır, linki Umut\'tan al\n- Kıbrıs Katalog (Döveç): Apps Script üzerinden çalışır, linki Umut\'tan al\n- Yenifikirtepeburada.com: yenifikirtepeburada.com\n\nTüm uygulamalarda 4 haneli PIN ile giriş yapılır. PIN\'ini bilmiyorsan Umut\'a sor.\n\n### Telefona Uygulama Olarak Ekleme (Ana Ekrana Ekleme)\n\niPhone (Safari):\n1. Safari\'de uygulama linkini aç\n2. Alt taraftaki paylaş butonuna (kutu + ok simgesi) dokun\n3. Aşağı kaydır, "Ana Ekrana Ekle" seçeneğine dokun\n4. İsim ver (ör: "Kapanış Formu") ve "Ekle" butonuna bas\n5. Artık ana ekranda bir uygulama simgesi olarak görünür\n\nAndroid (Chrome):\n1. Chrome\'da uygulama linkini aç\n2. Sağ üstteki üç nokta menüsüne dokun\n3. "Ana ekrana ekle" seçeneğine dokun\n4. İsim ver ve "Ekle"\n5. Ana ekranda kısayol oluşur\n\nBu adımı TÜM uygulamalar için yap — her biri telefonunda ayrı simge olarak durur.\n\n### Kapanış Formu\nLink: dogusremax.github.io/kapanis-formu\n\nNe işe yarar: Satış veya kiralama kapandığında işlem bilgilerini kayıt altına alırsın. Veriler otomatik Google Sheet\'e yazılır.\n\nKullanım:\n1. Uygulamayı aç, açılır menüden kendi adını seç\n2. 4 haneli PIN kodunu gir, "Devam Et"\n3. Hangi tarafı temsil ettiğini seç: Mülk Sahibi / Alıcı-Kiracı / Her İkisi\n4. İşlem bilgilerini doldur: tür (satılık/kiralık/devir), tarih, adres, tutar, hizmet bedeli\n5. Müşteri bilgilerini gir: ad soyad, TC kimlik no (11 hane), telefon, e-posta\n6. Belgeleri yükle: tapu (satılıkta), kontrat (PDF, tüm sayfalar), fatura (varsa)\n7. Müşteri memnuniyeti: Evet / Hayır / Bekliyor\n8. "Kapanışı Kaydet"\n\nDikkat: Kıbrıs işlemlerinde adrese mutlaka "Kıbrıs" yaz. Hizmet bedelleri KDV dahil. Ortak kapanışlarda her danışman kendi payını ayrı girer. TC 11 hane, checksum doğrulamalı. Telefon formatı: 0 (5XX) XXX XX XX.\n\n### Matbu Evraklar\nLink: dogusremax.github.io/matbu-evraklar\n\nNe işe yarar: Yetki sözleşmesi, kira kontratı, alım-satım sözleşmesi gibi standart evrakları dijital doldurur, yazdırırsın.\n\nKullanım:\n1. PIN ile giriş yap\n2. Evrak türünü seç (satılık yetki, kiralık yetki, kira sözleşmesi, alım-satım vs.)\n3. Formdaki alanları doldur (müşteri bilgileri, mülk bilgileri, tarih)\n4. Önizleme yap, kontrol et\n5. Yazdır veya PDF olarak kaydet\n\niPhone\'da PDF alma: Alt taraftaki paylaş butonuna dokun > "Dosyalara Kaydet" veya WhatsApp/Mail ile gönder. Uygulama her A4 sayfayı ayrı canvas olarak oluşturur.\n\nEğitim Videoları (Her evrak için nasıl doldurulur — video anlatım):\nDrive klasörü: drive.google.com/drive/folders/1b0aml89VHSGEGhiNGrJ8IgIGqFk9owsB\n- Yetki Belgesi nasıl doldurulur (video)\n- Kira Kontratı nasıl doldurulur (video)\n- Alım Satım Sözleşmesi nasıl doldurulur (video)\n- Kiralık Teklif Yazısı nasıl doldurulur (video)\n- Emlak Teklif Belgesi Rehberi (video)\n- Yer Gösterme Formu nasıl doldurulur (video)\n- Eş Rızası belgesi nasıl doldurulur (video)\n- Drive Kullanımı rehberi (video)\n\nBir evrakı nasıl dolduracağını bilmiyorsan önce ilgili videoyu izle, sonra uygulamadan doldur.\n\n### Müşteri Takip (Kayıt)\nLink: dogusremax.github.io/musteri-takip\n\nNe işe yarar: Gelen müşterileri kaydeder, takip notları ekler, müşteri durumunu yönetirsin.\n\nKullanım:\n1. PIN ile giriş yap\n2. "Yeni Müşteri" butonuna bas\n3. Bilgileri doldur: ad soyad, telefon, müşteri tipi (mülk sahibi/alıcı/kiracı), emlak tipi, bölge, bütçe, m², oda sayısı, iletişim tercihi\n4. Nöbetçi olup olmadığını işaretle\n5. Kaydet\n6. Takip notu eklemek için müşteri kaydına gir > "Takip Ekle": kategori (Aradım/WhatsApp/Diğer), detay, sonraki adım\n\nNöbetçi olduğun gün gelen müşteriler otomatik sana atanır.\n\n### Danışman Takip (Performans / Karne)\nLink: Apps Script üzerinden çalışır — linki Umut\'tan veya WhatsApp grubundan al.\n\nNe işe yarar: Her gün yaptığın işleri işaretleyip puana çevirirsin. Haftalık/aylık sıralama yapılır.\n\nKullanım:\n1. Listeden kendi adına dokun, PIN gir\n2. "Bu Hafta" ekranında aktiviteler listelenir\n3. İş yaptığında + butonuna bas (3 FSBO yaptıysan 3 kez bas)\n4. Yanlışsa − ile geri al\n5. Kayıt anında işlenir\n\nPuanlar: FSBO 1, Etki Çevresi 2, 1. Sunum 5, 2. Sunum 8, Yetki 15, Gösterim 6, Kapora 15, Kıbrıs Sunum 8, EK Nöbet 5, Broşür 2, Eğitim 4, Kapanış 40 (otomatik).\n\nİstikrar Bonusu 🔥: Her gün en az 1 aktivite = +2 puan. Hafta sonu seriyi bozmaz. Hafta içi 1 gün boş = seri sıfır. Ay sonu toplu girmek İŞE YARAMAZ.\n\nSıralama: Her Pazartesi güncellenir. Ayın ilk 3\'ü ödüllendirilir.\n\nÜç Altın Kural: 1) Her gün gir. 2) Doğru gir. 3) Biriktirme.\n\n### Portföy Takip\nLink: dogusremax.github.io/portfoy-takip\n\nNe işe yarar: Portföylerini yönetirsin. Veriler remax.com.tr\'den 6 saatte bir otomatik senkronize olur.\n\nKullanım: PIN ile giriş > portföylerini gör > yeni ekle veya düzenle. RemaxID anahtarıyla yönetim. Broker tümünü görür, danışmanlar kendi portföyünü yönetir.\n\n### RE/MAX Değerleme\nLink: dogusremax.github.io/remax-de-erleme\n\nNe işe yarar: Profesyonel değerleme raporu oluşturursun.\n\nKullanım: Sohbet sihirbazı yönlendirir > mülk bilgilerini gir > otomatik rapor oluşur > 7 slaytlık PPTX çıktısı al > müşteriye gönder.\n\n### Kıbrıs Katalog (Döveç ve Diğerleri)\nLink: Apps Script üzerinden çalışır — linki Umut\'tan al.\n\nNe işe yarar: Kuzey Kıbrıs projelerini müşteriye sunarsın. Döveç, Cyprus Constructions, Northernland.\n\nKullanım:\n1. Geliştirici seç\n2. Projeleri filtrele (tip: 1+1, 2+1, villa vs.)\n3. Proje detayı: fotoğraf, plan, fiyat\n4. Ödeme planı hesaplayıcısı — geliştirici bazında taksit planı\n5. WhatsApp ile müşteriye paylaş\n\nWhatsApp rehberi: kisa.link/YRQLo\nSunum öncesi: Katalogdan incele, müşteri bütçesine uygun 2-3 proje seç, ödeme planını hazırla.\n\n### Yenifikirtepeburada.com\nFikirtepe kentsel dönüşüm rehber sitesi. EİDS rehberi, değerleme formları, videolar ve nöbetçi danışman kartı mevcut.\n\n---'},
{title:'GOOGLE TAKVİM KURULUMU VE NÖBET TAKİBİ',content:'## GOOGLE TAKVİM KURULUMU VE NÖBET TAKİBİ\n\n### Google Takvim Kurulumu (iPhone)\n1. "Ayarlar" > "Takvim" > "Hesaplar" > "Hesap Ekle" > "Google"\n2. Gmail hesabınla giriş yap\n3. "Takvim" anahtarını aç\n4. iPhone Takvim uygulamasını aç — Google takvim etkinlikleri otomatik görünür\n\n### Google Takvim Kurulumu (Android)\n1. Google Takvim uygulaması zaten yüklüdür\n2. Gmail hesabınla giriş yap\n3. Ofis takvimi paylaşılmışsa otomatik görünür\n\n### Bildirimleri Açma (iPhone)\n1. "Ayarlar" > "Bildirimler" > "Takvim"\n2. "Bildirimlere İzin Ver" aç\n3. Uyarı Stili: "Afişler" veya "Uyarılar"\n4. "Sesler" aç\n\n### Bildirimleri Açma (Google Takvim Uygulaması)\n1. Google Takvim uygulamasını aç\n2. Sol üst menü (☰) > "Ayarlar" > "Genel"\n3. "Bildirimler" > varsayılan hatırlatıcı ayarla (ör: 30 dakika önce)\n4. Her etkinlik için ayrıca hatırlatıcı eklenebilir\n\n### Nöbet Takvimi Nasıl Takip Edilir\nNöbet takvimi Google Calendar\'da paylaşılmıştır:\n1. Google Takvim uygulamasını aç\n2. Sol menüden (☰) takvimleri gör\n3. "Nöbet" takviminin yanındaki kutu işaretli olsun\n4. Kendi nöbet günlerini takvimde görebilirsin\n5. Bildirimler açıksa nöbet günün geldiğinde telefonuna uyarı gelir\n\nNöbet döngüsü: 7 kişi (Gamze → Gizem → İrem → Orhan → Evşen → Özlem → Alpay). 23 Temmuz 2026 = Gamze. Hafta sonları yok. Aysun nöbet dışı.\n\nNöbet değişikliği: Kendi yerine birini bul, Umut\'a bildir.'},
{title:'SÖZLEŞME VE KONTRAT BİLGİLERİ',content:'## SÖZLEŞME VE KONTRAT BİLGİLERİ\n\n### Satılık Yetkilendirme Sözleşmesi (8 Madde)\n1. KONU: Mal Sahibi, UMT GROUP\'u (RE/MAX DOĞUŞ) gayrimenkulün satışına aracılık etmek üzere yetkilendirir.\n2. TANITIM YETKİSİ: RE/MAX DOĞUŞ masrafı kendisine ait olmak üzere pazarlama hakkına sahiptir. Mal sahibi gayrimenkule daima giriş imkânı tanımayı kabul eder.\n3. MÜLK SAHİBİ YÜKÜMLÜLÜKLERİ: Afiş/tabela izni, hukuki engelleri bildirme, gelen başvuruları RE/MAX DOĞUŞ\'a yönlendirme. Bildirmeden satarsa hizmet bedelinin 2 katını öder.\n4. SÜRE: Belirlenen başlangıç tarihinde yürürlüğe girer. 1 ay önce yazılı bildirim yapılmazsa otomatik uzar.\n5. SÜRENİN BİTİMİ: Yetki süresinde RE/MAX DOĞUŞ\'un bulduğu kişilerle 180 gün içinde RE/MAX DOĞUŞ onayı olmadan satış yapılamaz. Aksi halde %4+KDV hizmet bedeli doğar.\n6. VAZGEÇME: Tek taraflı feshedilemez. Mal sahibi feshederse %4+KDV tellaliye ücreti öder.\n7. ZİLYETLİK: Yetkisiz imza durumunda tüm zararlar + %4+KDV tazmin edilir.\n8. TARAFLAR: 8 madde, 2 asıl nüsha. İstanbul Anadolu Mahkemeleri yetkili.\n\nHizmet bedeli: Satış bedelinin %2 + KDV\n\n### Kiralık Yetkilendirme Sözleşmesi (8 Madde)\nSatılık ile aynı yapıda, farklılıklar:\n- Hizmet bedeli: 1 aylık kira bedeli + KDV\n- Vazgeçme tazminatı: 2 aylık kira + KDV\n\n### Gayrimenkul Alım Satım Sözleşmesi (10 Madde)\n1. Satıcı belirlenen bedelle satmayı, alıcı almayı kabul eder.\n2. Cayma tazminatı tutanak karşılığında alınır, UMT GROUP yediemin olarak tutar. Minimum satış tutarının %5\'i.\n3. Kalan bedel satış işlemlerinde alıcı tarafından ödenir.\n4. Satış belirtilen tarihe kadar yapılacaktır; yapılmaması cayma sayılır.\n5. TBK 178: Alıcı vazgeçerse cayma tazminatı iade edilmez (satıcıya verilir). Satıcı vazgeçerse cayma iade + aynı tutarda tazminat öder.\n6. Satıcı aidat, vergi, fatura borçlarını ödeyerek borçsuz teslim eder.\n7. Emlak vergisi satış öncesi satıcı tarafından ödenir.\n8. Hizmet bedeli: %2+KDV, alıcı ve satıcıdan ayrı ayrı. Vazgeçen taraf %4+KDV öder.\n9. Tapudaki bedel ne olursa olsun sözleşmedeki bedel geçerlidir.\n10. 3 asıl nüsha. İstanbul Anadolu Ticaret Mahkemeleri yetkili.\n\n### Kira Sözleşmesi Önemli Maddeleri\n- Mecur sadece kiracının/ailesinin kullanımına tahsis edilir; devir, temlik, alt kiralama yapılamaz.\n- Kiracı aidat, su, elektrik, doğalgaz, internet borçlarını zamanında öder.\n- Abonelikler 1 ay içinde kiracı adına yaptırılır.\n- Deprem/yangın sigortası mal sahibi, eşya sigortası kiracı sorumluluğunda.\n- Kira artışı: Her yıl TÜFE 12 aylık ortalaması oranında.\n- 2 ay ödenmeme + yazılı ihtar sonrası 2 iş günü ödenmezse tüm kira muaccel olur ve tahliye sebebidir.\n- Süre bitiminden 60 gün önce bildirilmezse aynı koşullarla 1 yıl uzar.\n- Damga vergisi ve harçlar kiracıya aittir.\n- Depozito: Genellikle 1 aylık kira. Kiraya mahsup edilemez. Tahliyede borç/hasar yoksa güncel kira bedeli üzerinden iade.\n- Mal sahibi izni olmadan tadilat yapılamaz.\n\n---'},
{title:'DANIŞMAN HESAP BİLGİLERİ',content:'## DANIŞMAN HESAP BİLGİLERİ\n\n- İrem Aleyna Tetik: TR51 0006 2000 7690 0006 6306 61 (Garanti)\n- Gamze Yetkin: TR52 0006 7010 0000 0051 8574 96 (Yapı Kredi)\n- Özlem Varol: TR33 0006 4000 0011 0254 4304 15 (İş Bankası Göztepe)\n- Ayşegül Alpay: TR54 0006 4000 0011 1010 5106 99 (İş Bankası Göztepe)\n- Leman Özlem Özgür: TR63 0006 2000 4220 0006 8866 11 (Garanti)\n\nŞirket (Kaparo) Hesabı:\nBanka: NPara\nIBAN: TR54 0015 7000 0000 0127 9656 20\nHesap Sahibi: UMT GROUP Gayrimenkul Yatırım ve Danışmanlık İnş.San.Tic.Ltd.Şti\nNOT: Kaparo alındığında bu hesaba yatırılır. Müşteriye bu IBAN ve hesap sahibi bilgisi verilir.\n\n---'},
{title:'GENEL BİLGİLER',content:'## GENEL BİLGİLER\n\n### Tüm Uygulamalara Giriş\nTüm uygulamalarda 4 haneli PIN ile giriş yapılır. PIN\'ini bilmiyorsan veya çalışmazsa Umut\'a sor.\nTelefonda uygulamayı "Ana ekrana ekle" ile kısayol yapabilirsin, her seferinde link aramana gerek kalmaz.\n\n### PIN Listesi (Güncel Kadro)\n- Ayşegül Alpay: 2824\n- Aysun Yılmaz: 3847\n- Evşen Özazman: 4657\n- Gamze Yetkin: 3286\n- Gizem Gök: 2679\n- İrem Aleyna Tetik: 9935\n- Orhan Özazman: 7912\n- Özlem Varol: 2535\n- Umut Tokkuş (Broker): 1520\n\nNot: Aysun Yılmaz\'ın solo Kapanış PIN\'i yoktur; Orhan\'ın 7912 PIN\'ini takım olarak kullanır (kasıtlıdır).\n\n### Danışman Adayı Yönlendirme (Arkadaşım Danışman Olmak İstiyor)\nBir tanıdığın, arkadaşın veya çevrenden biri RE/MAX Doğuş\'ta danışman olmak istiyorsa:\n1. Önce yenifikirtepeburada.com sitesindeki kariyer sayfasını paylaş: yenifikirtepeburada.com/kariyer.html\n2. Aday formu doldursun ve bilgileri incelesin\n3. Ardından Umut Bey ile görüştür — Umut Bey adayla birebir tanışma görüşmesi yapar\n4. Umut Bey uygun görürse süreç başlar (oryantasyon, Power Start eğitimi vs.)\n\nDanışmana söylenecek: "Kariyer sayfamızı paylaş, sonra beni aramasını söyle. Ben kendisiyle tanışayım."\n\n---'},
{title:'KAPARO SÜRECİ',content:'## KAPARO SÜRECİ\n\nKaparo alırken adımlar:\n1. Alıcı ve satıcı satış bedeli ve koşullar üzerinde anlaştıktan sonra cayma tazminatı (kaparo) alınır.\n2. Kaparo minimum satış tutarının %5\'i kadar olmalıdır.\n3. Kaparo tutarı tutanakla belgelenir — Gayrimenkul Alım Satım Sözleşmesi imzalanır.\n4. Kaparo UMT GROUP şirket hesabına yatırılır: NPara — TR54 0015 7000 0000 0127 9656 20\n5. UMT GROUP yediemin sıfatıyla parayı uhdesinde tutar.\n6. Alıcı vazgeçerse kaparo iade edilmez, satıcıya teslim edilir (TBK 178).\n7. Satıcı vazgeçerse kaparo alıcıya iade edilir + aynı tutarda tazminat ödenir.\n8. Müşteriye makbuz ve sözleşme nüshası verilir.\n\n---'},
{title:'TAPU DEVİR İŞLEMLERİ',content:'## TAPU DEVİR İŞLEMLERİ\n\n### Randevu Alma\n- Satıcı Web Tapu (webtapu.tkgm.gov.tr) üzerinden veya ALO 181\'i arayarak randevu alır.\n- e-Devlet üzerinden randevu alma ve işlem takibi yapılabilir, ancak devir işlemi tapu müdürlüğünde yüz yüze yapılır.\n\n### Satıcıdan İstenen Evraklar\n- Nüfus cüzdanı / kimlik kartı aslı ve fotokopisi\n- Tapu aslı ve fotokopisi\n- Belediyeden "emlak vergisi borcu yoktur" yazısı (rayiç bedel belgesi)\n- DASK poliçesi (konutlarda zorunlu — geçerli olmalı)\n- Vekaletname (vekil ile işlem yapılacaksa — noter onaylı)\n- 1 adet fotoğraf (artık zorunlu değil ama bazı müdürlükler isteyebilir)\n\n### Alıcıdan İstenen Evraklar\n- Nüfus cüzdanı / kimlik kartı aslı ve fotokopisi\n- 1 adet fotoğraf (artık zorunlu değil)\n- Vekaletname (vekil ile işlem yapılacaksa)\n\n### Tapu Harcı\n- Satış bedeli üzerinden %2 alıcıdan + %2 satıcıdan = toplam %4\n- Harç, tapu müdürlüğünde belirlenen bedel üzerinden hesaplanır\n- Döner sermaye bedeli ayrıca ödenir\n\n### e-Devlet\'ten Takyidat Yazısı Alma (Adım Adım)\nTakyidat yazısı: Mülkün üzerinde ipotek, haciz, şerh, intifa gibi kısıtlama olup olmadığını gösteren belgedir. Satış öncesi mutlaka kontrol et.\n\n1. turkiye.gov.tr adresine git veya e-Devlet uygulamasını aç\n2. e-Devlet şifren, mobil imza veya kimlik kartıyla giriş yap\n3. Arama kutusuna "Tapu Bilgileri Sorgulama" yaz\n4. "Tapu ve Kadastro Genel Müdürlüğü — Tapu Bilgileri Sorgulama" seçeneğine tıkla\n5. Mülk sahibinin TC kimlik numarasıyla sorgulama yapılır (kendi mülklerin listelenir)\n6. İlgili mülkü seç\n7. "Takyidat Bilgileri" veya "Şerhler ve Beyanlar" bölümüne bak\n8. Burada ipotek, haciz, şerh, intifa, kira şerhi gibi bilgiler listelenir\n9. Sayfayı PDF olarak kaydet veya ekran görüntüsü al\n\nAlternatif yol — Tapu Müdürlüğü\'nden:\n1. Web Tapu (webtapu.tkgm.gov.tr) üzerinden başvuru yap\n2. Veya doğrudan tapu müdürlüğüne gidip takyidat belgesi talep et\n3. Tapu müdürlüğünden alınan belge resmi geçerliliğe sahiptir\n\nDikkat: e-Devlet\'ten sadece kendi üzerine kayıtlı mülkleri sorgulayabilirsin. Başka birinin mülkü için tapu müdürlüğüne başvurmak gerekir. Müşterinden kendi e-Devlet\'inden çekmesini iste veya birlikte tapu müdürlüğüne gidin.\n\n### Belediyeden Rayiç Bedel Belgesi Alma (Adım Adım)\nRayiç bedel belgesi: Belediyenin belirlediği mülk değerini gösteren belgedir. Tapu devri için zorunludur — belediyeye emlak vergisi borcu olmadığını da gösterir.\n\nYüz yüze başvuru:\n1. Mülkün bulunduğu belediyeye git (Kadıköy Belediyesi, Üsküdar Belediyesi vs.)\n2. Emlak Vergisi / Gelirler Müdürlüğü birimine başvur\n3. Mülk sahibinin TC kimlik numarası ve mülk bilgilerini (ada, parsel) ver\n4. Belediye mülkün rayiç bedelini ve emlak vergisi borç durumunu gösteren belgeyi hazırlar\n5. Belgeyi al — tapu müdürlüğüne götür\n\nOnline başvuru (belediyeye göre değişir):\n1. İlgili belediyenin web sitesine git (ör: kadikoy.bel.tr)\n2. e-Belediye veya Online İşlemler bölümüne gir\n3. "Emlak Vergisi Sorgulama" veya "Rayiç Bedel Sorgulama" seçeneğini bul\n4. TC kimlik ve mülk bilgileriyle sorgula\n5. Bazı belediyeler belgeyi online olarak verir, bazıları bizzat gelmenizi ister\n\ne-Devlet üzerinden:\n1. turkiye.gov.tr\'ye giriş yap\n2. "Belediye Emlak Vergisi Borç Sorgulama" ara\n3. İlgili belediyeyi seç\n4. Borç durumunu gör (tüm belediyeler bu hizmeti sunmayabilir)\n\nDikkat: Rayiç bedel tapu harcı hesaplamasında kullanılır. Satış bedeli rayiç bedelden düşük gösterilemez. Belgenin güncel tarihli olması gerekir — genellikle son 15-30 gün içinde alınmış olmalı.\n\n### Ekspertiz (Değerleme) Raporu ve Web Tapu\'dan Eksper Atama\n\nEkspertiz raporu ne zaman gerekir:\n- Alıcı konut kredisi kullanacaksa (banka zorunlu tutar)\n- Yabancıya satışlarda (yasal zorunluluk)\n- Miras paylaşımında adil değer tespiti için\n- Kamulaştırma süreçlerinde\n\nSürecin özeti:\n1. Alıcı bankaya kredi başvurusu yapar\n2. Banka bir eksper (SPK lisanslı değerleme uzmanı) atar\n3. Mülk sahibi Web Tapu üzerinden ekspere yetki verir\n4. Eksper mülkü yerinde inceler\n5. Rapor hazırlanır ve bankaya sunulur\n6. Banka rapora göre kredi limitini belirler\n\nWeb Tapu\'dan Ekspertiz Yetkisi Verme (Mülk Sahibi Yapacak):\n1. webtapu.tkgm.gov.tr adresine git\n2. e-Devlet şifresiyle giriş yap\n3. Sol menüden "Taşınmaz İşlemleri" seç\n4. Ekspertiz yetkisi vermek istediğin gayrimenkulü bul\n5. "Ekspertiz Yetki Verme" veya "Değerleme Yetki Ver" seçeneğine tıkla\n6. Yetki vereceğin bankayı seç — sistem otomatik olarak ilgili eksperi tanımlar\n7. Telefonuna gelen SMS doğrulama kodunu gir\n8. İşlemi onayla — karekodlu (barkodlu) yetki belgesi oluşur\n9. Bu belgeyi ekspere veya bankaya ilet\n\nAlternatif yol — Barkodlu belge:\n1. Web Tapu\'da gayrimenkullerini listele\n2. İlgili gayrimenkulün yanındaki "Yetki Ver" sütunundaki yeşil tike tıkla\n3. Karekodlu belge otomatik oluşur\n4. Bu belgeyi ekspere göster veya PDF olarak gönder\n\nYabancıya satışlarda değerleme raporu başvurusu:\n1. Web Tapu\'ya e-Devlet ile giriş yap\n2. Sol menüden "Değerlendirme İşlemleri" > "Değerleme Talep Et"\n3. Başvuruyu tamamla\n4. Talep durumu "Ödeme Bekliyor" olarak görünecek\n5. Ödemeyi banka aracılığıyla yap (Ziraat, Vakıfbank vs. — MKK/GABİM ödemesi olarak)\n6. Ödeme sonrası eksper atanır ve süreç başlar\n\nEkspertiz sürecinde danışmanın rolü:\n- Müşteriye süreci açıkla ve yönlendir\n- Mülk sahibinden Web Tapu üzerinden yetki vermesini iste\n- Eksper randevusu için mülke erişim sağla (anahtar, randevu ayarla)\n- Eksper geldiğinde mülkte hazır bulun (zorunlu değil ama profesyonel görünür)\n- Rapor sonucunu takip et ve müşteriye bildir\n\nEkspertiz ücreti (2026 ortalaması): Yaklaşık 15.000-25.000 TL arası (mülk tipi ve büyüklüğüne göre değişir). Ücreti genellikle alıcı (kredi kullanan) öder.\n\nDikkat: Ekspertiz değeri satış fiyatından düşük çıkarsa banka daha az kredi verir. Bu durumda alıcı aradaki farkı peşinat olarak karşılamalı. Müşterini önceden bilgilendir.\n\n### Gün İçi Süreç\n1. Randevu saatinde alıcı ve satıcı (veya vekilleri) tapu müdürlüğünde hazır bulunur\n2. Tapu memuru belgeleri kontrol eder, satış bedeli ve harçları doğrular\n3. Kimlik tespiti yapılır\n4. Taraflar resmi senedi imzalar\n5. Tapu memuru yeni durumu tescil eder\n6. Yeni tapu belgesi alıcıya teslim edilir\n7. İşlem genellikle aynı gün tamamlanır\n\n### Devir Sonrası Yapılacaklar (Alıcıya hatırlat)\n- DASK poliçesini kendi adına güncelle\n- Elektrik, su, doğalgaz aboneliklerini devral\n- Belediyeye emlak vergisi bildirimi yap\n- Aidat ödemelerini yönetime bildir\n\n---'},
{title:'DEĞERLEME NASIL YAPILIR',content:'## DEĞERLEME NASIL YAPILIR\n\n### Temel Yöntem: Emsal Karşılaştırma\n1. Aynı bölgede son 3-6 ayda satılmış benzer mülkleri araştır\n2. Satışta olan rakip mülkleri listele\n3. Satılamayan (uzun süredir piyasada olan) mülkleri not et\n4. Bu üç veriyle fiyat aralığı belirle\n\n### Dikkat Edilecek Kriterler\n- Konum (cadde/sokak, ulaşım, çevre)\n- m² (net ve brüt alan)\n- Kat (yüksek katlar genellikle daha değerli)\n- Cephe (güney ve batı cepheler tercih edilir)\n- Manzara (deniz, şehir, yeşil alan)\n- Bina yaşı ve yapı kalitesi\n- Isınma sistemi (merkezi, kombi, yerden ısıtma)\n- Otopark ve güvenlik\n- Site içi sosyal tesisler\n- İmar durumu ve kat irtifakı/mülkiyeti\n- Aidat miktarı\n- Krediye uygunluk\n\n### Değerleme Uygulaması\nRE/MAX Değerleme uygulamasını kullan (dogusremax.github.io/remax-de-erleme). Sohbet sihirbazı ile mülk bilgilerini gir, otomatik rapor oluştur. 7 slaytlık PPTX çıktı alabilirsin.\n\n### Fiyat Sunumu İpuçları (Power Start\'tan)\n- Fiyat analizini nasıl yaptığını müşteriye açıkla\n- Emsal verileri sunmadan önce müşterinin fiyat beklentisini yorumlama\n- "Rakip" kavramını kullan: "Evinize bakabilecek alıcıların bakabileceği diğer mülklere rakip denir"\n- Satışta olan, satılamayan ve satılmış emsal verileriyle fiyat aralığını birlikte inceleyin\n\n### Yapay Zeka ile Mülk Değerlemesi (ChatGPT / Gemini)\n\nYapay zekayı değerleme asistanı olarak kullanabilirsin. Emsal araştırması, rapor yazımı ve fiyat analizi için çok güçlü bir araç.\n\nAdım 1 — Emsal Araştırması:\nChatGPT veya Gemini\'ye şunu yaz:\n"Fikirtepe, Kadıköy, İstanbul bölgesinde 2+1, 85 m², 10. kat, sıfır daire için emsal fiyat analizi yap. Benzer projelerde (Yenifikirtepe, Nuhoğlu, Şua) son dönem satış fiyatlarını ve m² birim fiyatlarını karşılaştır."\n\nAdım 2 — Mülk Değerleme Raporu:\n"Şu mülk için profesyonel bir değerleme raporu hazırla:\n- Konum: Dumlupınar Mah., Yenifikirtepe 6. Etap B Blok\n- Tip: 2+1 daire, 85 m² net\n- Kat: 12/20\n- Bina yaşı: Sıfır (2026 teslim)\n- Cephe: Güney-Batı, Çamlıca manzaralı\n- Isınma: Merkezi\n- Otopark: Kapalı\n- Site: Havuz, spor salonu, güvenlik\n- Aidat: 4.500 TL/ay\nEmsal karşılaştırma yöntemiyle fiyat aralığı öner. SWOT analizi ekle. Raporu müşteriye sunulacak profesyonel formatta yaz."\n\nAdım 3 — Kira Getirisi Hesaplama:\n"Bu mülkün kira değerlemesini yap. Bölgedeki benzer dairelerin aylık kira fiyatlarını araştır, yıllık brüt ve net kira getiri oranını hesapla."\n\nAdım 4 — Karşılaştırmalı Tablo:\n"Aynı bölgede 3 farklı projeyi karşılaştıran bir tablo oluştur: proje adı, m² fiyatı, toplam fiyat, teslim tarihi, ödeme koşulları, avantajlar/dezavantajlar."\n\nİpuçları:\n- Sahibinden, hepsiemlak gibi sitelerden güncel fiyatları toplayıp ChatGPT\'ye ver — daha doğru analiz yapar\n- Tapu kayıtlarındaki gerçek satış fiyatlarını kullan (varsa)\n- AI çıktısını mutlaka kendi bilginle kontrol et — piyasa bilgin her zaman AI\'dan daha günceldir\n- Raporu müşteriye gönderirken RE/MAX Doğuş logosu ve danışman bilgini ekle\n\n---'},
{title:'NOTEBOOKLM KULLANIM REHBERİ',content:'## NOTEBOOKLM KULLANIM REHBERİ\n\n### NotebookLM Nedir?\nGoogle\'ın geliştirdiği ücretsiz yapay zeka asistanı. Yüklediğin belgeleri analiz eder, özetler, rapor oluşturur, sunum hazırlar ve hatta podcast formatında sesli özet üretir. Önemli farkı: sadece senin yüklediğin kaynaklara dayalı çalışır, uydurma bilgi riski düşük.\n\n### NotebookLM\'e Giriş\n1. notebooklm.google.com adresine git\n2. Google hesabınla giriş yap (ücretsiz)\n3. "Yeni Notebook Oluştur" butonuna tıkla\n4. Kaynaklarını yükle: PDF, Google Docs, web sitesi (URL), YouTube videosu, metin\n\n### Gayrimenkul İçin Kullanım Alanları\n\nDeğerleme raporu hazırlama:\n1. Emsal verileri içeren dosyalarını (PDF, Excel tablosu, ekran görüntüleri) NotebookLM\'e yükle\n2. Bölge hakkındaki haberleri, imar planlarını, proje broşürlerini ekle\n3. Sor: "Bu kaynaklara göre Fikirtepe bölgesinde 2+1 daire için fiyat analizi yap ve müşteriye sunulacak bir değerleme raporu oluştur"\n4. NotebookLM tüm kaynaklarını analiz edip rapor üretir\n\nMüşteri sunumu hazırlama:\n1. Proje broşürlerini, fiyat listelerini, fotoğrafları NotebookLM\'e yükle\n2. Sor: "Bu projenin avantajlarını ve yatırım getirisini anlatan bir sunum metni hazırla"\n3. "Slide Deck" özelliğiyle otomatik sunum slaytları oluştur (Studio bölümünden)\n\nBölge analiz raporu:\n1. Fikirtepe kentsel dönüşüm haberleri, imar planları, belediye raporlarını yükle\n2. Sor: "Bu kaynaklara göre Fikirtepe\'nin 5 yıllık değer artış potansiyelini analiz et"\n3. Sonucu müşteriye gönder\n\n### NotebookLM\'in Temel Özellikleri\n\nSoru-Cevap: Yüklediğin belgelere sorular sor, kaynağa dayalı cevap alırsın. Her cevabın altında hangi belgeden geldiğini gösterir.\n\nRapor Oluşturma: Sağ panelde "Rapor Oluştur" seçeneğiyle farklı formatlarda raporlar üret:\n- Çalışma kılavuzu\n- Blog yazısı\n- Brifing belgesi\n- Teknik inceleme\n- "Kendiniz oluşturun" ile kendi formatını belirle\n\nSlide Deck (Sunum Oluşturma): Studio bölümünden otomatik sunum slaytları oluştur. Görseller, grafikler ve metin blokları otomatik düzenlenir. Slaytları düzenleyebilir, gereksiz kısımları kaldırabilirsin.\n\nAudio Overview (Sesli Özet / Podcast): Studio bölümünden "Audio Overview" seç. İki yapay ses arasında geçen doğal podcast formatında sesli özet üretir. 15-25 dakika arası. MP3 olarak indirebilirsin. Müşteriye dinlettirmek veya kendi bilgini tazelemek için harika.\n\nİnfografik: Verilerini görsel infografik formatına dönüştürür. Sosyal medyada paylaşmak veya müşteriye göndermek için kullanışlı.\n\n### NotebookLM Pratik İpuçları\n- Net ve spesifik sorular sor: "Bu rapordaki m² fiyatları neler?" > "Bu belge ne diyor?"\n- Birden fazla kaynak yükle — NotebookLM kaynaklar arası bağlantı kurar\n- Türkçe kaynak yükleyebilir ve Türkçe soru sorabilirsin\n- Ücretsiz planda günlük 10 rapor limiti var — önemli raporlara öncelik ver\n- Slide Deck ücretsiz planda watermark ile gelir — profesyonel kullanım için Plus gerekebilir\n\n---'},
{title:'WHATSAPP BUSINESS KURULUMU',content:'## WHATSAPP BUSINESS KURULUMU\n\n### Neden WhatsApp Business?\nNormal WhatsApp\'tan farkı: işletme profili (adres, çalışma saatleri, web sitesi), otomatik karşılama mesajı, hızlı yanıtlar, etiketleme sistemi ve katalog özelliği. Müşteri gözünde profesyonel görünürsün.\n\n### Kurulum Adımları\n1. App Store (iPhone) veya Google Play\'den "WhatsApp Business" uygulamasını indir\n2. Yeni numara veya mevcut numaranı kullan (mevcut WhatsApp\'ın Business\'a dönüşür — dikkat: geri dönüş mümkün ama zahmetli)\n3. Numaranı doğrula (SMS kodu)\n4. İşletme bilgilerini doldur:\n   - İşletme adı: "RE/MAX Doğuş - [Senin Adın]" (ör: "RE/MAX Doğuş - Gamze Yetkin")\n   - Kategori: "Emlak" veya "Gayrimenkul"\n   - Açıklama: "RE/MAX Doğuş Gayrimenkul Danışmanı | Fikirtepe & Kadıköy Bölgesi | Satılık-Kiralık"\n   - Adres: Dumlupınar Mah. Özen Sok. Nuhoğlu Yenitepe Sitesi 2. Etap A Blok Dükkan 14, Kadıköy / İstanbul\n   - Çalışma saatleri: Ofis saatlerini gir\n   - Web sitesi: yenifikirtepeburada.com veya remax.com.tr/tr/ofis/detay/dogus\n   - E-posta: kendi remax e-postan\n5. Profil fotoğrafı: Profesyonel vesikalık veya RE/MAX logolu kişisel fotoğraf\n\n### Otomatik Mesaj Ayarları\nAyarlar > İşletme Araçları:\n\nKarşılama mesajı (ilk kez yazan herkese):\n"Merhaba! RE/MAX Doğuş\'tan [Adın]. Size nasıl yardımcı olabilirim? Satılık, kiralık veya değerleme konularında hizmetinizdeyim. 🏠"\n\nDışarıda mesajı (mesai dışında):\n"Şu an mesai saatleri dışındayız. En kısa sürede size dönüş yapacağız. Acil durumlar için ofis: 0216 315 15 15"\n\nHızlı yanıtlar (sık kullandığın mesajlar için kısayol):\n- /tesekkur → "İlginiz için teşekkür ederim! Sorularınız olursa her zaman arayabilirsiniz."\n- /adres → "Ofis adresimiz: Dumlupınar Mah. Özen Sok. Nuhoğlu Yenitepe Sitesi 2. Etap A Blok Dükkan 14, Kadıköy / İstanbul"\n- /goruselim → "Uygun olduğunuz bir tarih ve saat belirleyelim, size en uygun seçenekleri gösterebilirim."\n\n### Etiketleme Sistemi\nMüşterilerini etiketle: Yeni Müşteri, Takipte, Gösterim Yapıldı, Teklif Verildi, Kapandı. Böylece kimin hangi aşamada olduğunu kolayca takip edersin.\n\n### WhatsApp Grup Kurma\n\nYeni grup oluşturma:\n1. WhatsApp\'ı aç > sağ üstte "Yeni sohbet" veya kalem simgesi > "Yeni Grup"\n2. Gruba eklemek istediğin kişileri seç > "İleri"\n3. Grup adı yaz (ör: "RE/MAX Doğuş Ekip", "Fikirtepe 6. Etap Sakinleri", "Kıbrıs Yatırım")\n4. Grup fotoğrafı ekle (RE/MAX Doğuş logosu veya ilgili görsel)\n5. "Oluştur" bas\n\nGrup ayarları (Grup bilgisi ekranından):\n- Grup açıklaması: Grubun amacını yaz\n- Sadece yöneticiler mesaj atabilsin: Grup Ayarları > "Mesaj gönder" > "Yalnızca yöneticiler" (duyuru grubu için ideal)\n- Yeni üye ekleme yetkisi: Yalnızca yöneticiler veya herkes\n- Davet bağlantısı: "Bağlantıyla gruba davet" > linki paylaş (müşteri toplulukları için)\n\nEmlak için grup fikirleri:\n- Ofis ekip grubu (iç iletişim)\n- Bölge müşteri grubu (portföy duyuruları — sadece yönetici mesaj atar)\n- Proje bazlı grup (ör: Yenifikirtepe sakinleri)\n- Co-broke ortakları grubu\n\n### WhatsApp Toplu Mesaj (Yayın Listesi / Broadcast)\n\nYayın listesi nedir: Birden fazla kişiye aynı anda mesaj gönderirsin ama her kişi mesajı özel mesaj olarak alır — grup görmez, diğer alıcıları görmez. Müşteriye birebir gönderilmiş gibi görünür.\n\nYayın listesi oluşturma:\n1. WhatsApp > sağ üstte üç nokta (Android) veya "Yayın Listeleri" (iPhone)\n2. "Yeni yayın listesi" veya "Yeni liste"\n3. Göndermek istediğin kişileri seç (DİKKAT: Karşı tarafın senin numaranı kaydetmiş olması gerekir, yoksa mesaj ulaşmaz)\n4. "Oluştur" bas\n5. Listeye mesaj yaz, gönder — herkese aynı anda gider\n\nYayın listesi isimlendirme önerileri:\n- "Satılık Arayan Müşteriler"\n- "Kiralık Arayan Müşteriler"\n- "Mülk Sahipleri"\n- "Kıbrıs İlgilenenler"\n- "Yatırımcılar"\n\nToplu mesaj ipuçları:\n- Kişiselleştir: "Merhaba!" ile başla, genel bir selamlama yap\n- Sık gönderme: Haftada 1-2 kez yeterli, fazlası rahatsız eder\n- Değer ver: Sadece ilan paylaşma, bölge haberleri ve piyasa bilgileri de gönder\n- Görsel ekle: Metin + fotoğraf veya kısa video çok daha etkili\n- Müşterinin numaranı kaydetmesini sağla: İlk görüşmede "Sizi bilgilendirebilmem için numaramı kaydetmenizi rica edebilir miyim?" de\n\n---'},
{title:'LINKEDIN — NEDİR VE NASIL KURULUR',content:'## LINKEDIN — NEDİR VE NASIL KURULUR\n\n### LinkedIn Nedir?\nProfesyonel iş ağı platformu. İş dünyasındaki insanlarla bağlantı kurar, profesyonel profilini sergiler, içerik paylaşırsın. Gayrimenkul danışmanı olarak kurumsal müşteriler, yatırımcılar ve iş ortakları bulmak için güçlü bir araç.\n\n### Hesap Oluşturma\n1. linkedin.com veya LinkedIn uygulamasını (App Store / Google Play) aç\n2. "Katıl" (Join) butonuna bas\n3. E-posta ve şifre ile kayıt ol\n4. Ad soyad gir\n5. Konum: İstanbul, Türkiye\n6. Meslek/Unvan: "Gayrimenkul Danışmanı" veya "Real Estate Consultant"\n7. Şirket: "RE/MAX Doğuş"\n\n### Profil Ayarları\nProfil fotoğrafı: Profesyonel vesikalık (takım elbise veya düzgün kıyafet, net, gülümseyen)\nKapak fotoğrafı: RE/MAX Doğuş logolu veya Fikirtepe manzaralı görsel (1584x396 px)\n\nBaşlık (Headline): "Gayrimenkul Danışmanı | RE/MAX Doğuş | Fikirtepe & Kadıköy Uzmanı | Satılık-Kiralık-Yatırım"\n\nHakkında (About) bölümü:\n"RE/MAX Doğuş ofisinde gayrimenkul danışmanı olarak Fikirtepe ve Kadıköy bölgesinde satılık, kiralık ve yatırım amaçlı gayrimenkul danışmanlığı sunuyorum.\n\nHizmetlerim:\n- Konut ve ticari gayrimenkul alım-satım-kiralama\n- Profesyonel mülk değerlemesi\n- Kuzey Kıbrıs gayrimenkul yatırımı\n- Kentsel dönüşüm süreç danışmanlığı\n\nRE/MAX\'in global ağı ve profesyonel hizmet standardıyla, gayrimenkul sürecinizi güvenle yönetiyorum.\n\nİletişim: [Telefon] | [E-posta]\nOfis: RE/MAX Doğuş — Fikirtepe, Kadıköy, İstanbul"\n\nDeneyim: "RE/MAX Doğuş" şirketini ekle, unvan ve başlangıç tarihi gir\nEğitim: Varsa eğitim bilgilerini ekle\nBeceriler: Gayrimenkul, Satış, Pazarlama, Müzakere, Değerleme\n\n### LinkedIn\'de Ne Paylaşılır?\n- Başarılı kapanış haberleri ("X müşterimiz yeni evine kavuştu!")\n- Piyasa analizleri ve bölge haberleri\n- Profesyonel içerikler (değerleme ipuçları, alıcı/satıcı rehberleri)\n- RE/MAX etkinlikleri ve eğitimler\n- Kıbrıs yatırım fırsatları (yatırımcı kitlesi LinkedIn\'de güçlü)\n- Makale yazma (LinkedIn Articles)\n\n### LinkedIn İpuçları\n- Haftada 2-3 paylaşım yap\n- Bağlantı isteği gönderirken kısa not ekle: "Merhaba, RE/MAX Doğuş\'tan [Adınız]. Gayrimenkul alanında bağlantı kurmak isterim."\n- Yorumlara cevap ver, başkalarının paylaşımlarına yorum yap\n- Müşteri referanslarını "Tavsiyeler" (Recommendations) bölümüne ekle\n\n---'},
{title:'LINKTREE — NEDİR VE NASIL KURULUR',content:'## LINKTREE — NEDİR VE NASIL KURULUR\n\n### Linktree Nedir?\nTek bir link altında tüm bağlantılarını toplayan mini sayfa. Instagram bio\'suna tek link koyabilirsin — o link açılınca tüm linklerini gösterir (WhatsApp, portföyler, web sitesi, Kıbrıs katalog vs.).\n\n### Hesap Oluşturma\n1. linktr.ee adresine git\n2. "Sign up free" bas\n3. E-posta veya Google ile kayıt ol\n4. Kullanıcı adı seç: remaxdogus.adiniz (ör: linktr.ee/remaxdogus.gamze)\n5. Kategori: "Business" veya "Creator"\n6. Ücretsiz plan yeterli\n\n### Linktree Sayfası Düzenleme\n1. Giriş yap > "Add Link" butonuna bas\n2. Her link için başlık ve URL gir:\n\nÖnerilen linkler (sırasıyla):\n- "📞 WhatsApp ile İletişim" → wa.me/905XXXXXXXXX (kendi numaran)\n- "🏠 Satılık Portföylerim" → remax.com.tr profil sayfan\n- "🔑 Kiralık Portföylerim" → remax.com.tr kiralık filtreli sayfan\n- "📍 Fikirtepe Rehberi" → yenifikirtepeburada.com\n- "🌴 Kıbrıs Yatırım" → Kıbrıs Katalog linki veya kisa.link/YRQLo\n- "📊 Ücretsiz Değerleme" → dogusremax.github.io/remax-de-erleme\n- "📸 Instagram" → instagram.com profil linkin\n- "💼 LinkedIn" → linkedin.com profil linkin\n- "📍 Ofis Konumu" → Google Maps linki\n\n3. Her linkin görünümünü ayarla (ikon, renk)\n4. Sayfa temasını seç (RE/MAX renkleriyle uyumlu: koyu mavi arka plan, beyaz metin)\n5. Profil fotoğrafı ve bio ekle\n\n### Linktree\'yi Instagram\'a Ekleme\n1. Instagram > Profili düzenle > Web sitesi alanı\n2. linktr.ee/kullaniciadiniz linkini yapıştır\n3. Kaydet\n4. Artık bio\'ndaki linke tıklayan herkes tüm bağlantılarını görür\n\n### Linktree İpuçları\n- En önemli linkleri en üste koy (WhatsApp ve portföy)\n- Öne çıkan link özelliğini kullan (yeni portföy veya kampanya için)\n- Linkleri düzenli güncelle (yeni portföyler, kampanyalar)\n- Thumbnail (küçük görsel) ekle — görsel linkler daha çok tıklanır\n- İstatistikleri takip et — hangi link ne kadar tıklanıyor görebilirsin\n\n---'},
{title:'INSTAGRAM PROFİLİ NASIL OLMALI',content:'## INSTAGRAM PROFİLİ NASIL OLMALI\n\n### Profil Ayarları\n- Hesap türü: İşletme hesabı (Ayarlar > Hesap > Profesyonel hesaba geç)\n- Kullanıcı adı: remaxdogus.adiniz veya adiniz.remax (ör: remaxdogus.gamze)\n- Profil fotoğrafı: Profesyonel vesikalık veya RE/MAX logolu kişisel fotoğraf (net, gülümseyen, güven veren)\n- Ad alanı: "Adın Soyadın | RE/MAX Doğuş" (bu alan aranabilir — anahtar kelime ekle)\n\n### Bio (Tanıtım Yazısı)\nŞablon:\n"🏠 RE/MAX Doğuş Gayrimenkul Danışmanı\n📍 Fikirtepe | Kadıköy | İstanbul\n🔑 Satılık & Kiralık & Değerleme\n📞 [Telefon numaranı yaz]\n👇 Portföylerimiz"\n\nLink: Linktree veya doğrudan remax.com.tr profil sayfanın linki\n\n### İçerik Stratejisi\nNe paylaşmalı:\n- Portföy tanıtımları (fotoğraf + video + reels)\n- Satıldı/Kiralandı paylaşımları (başarı kanıtı)\n- Bölge bilgilendirme (Fikirtepe\'de neler oluyor, yeni projeler)\n- Değerleme ipuçları (alıcı/satıcıya faydalı bilgiler)\n- Kişisel içerikler (ofis hayatı, ekip fotoğrafları)\n- Müşteri yorumları ve teşekkür mesajları\n\nNe paylaşmamalı:\n- Kişisel/özel hayat (ayrı hesapta yap)\n- Düşük kaliteli fotoğraflar\n- Başka ofislerin portföyleri\n- Siyasi/tartışmalı içerikler\n\n### Görsel Standartları\n- Fotoğraflar minimum 1080px\n- Story: 1080x1920 (dikey)\n- Post: 1080x1080 (kare) veya 1080x1350 (dikey — daha çok alan kaplar)\n- Reels: 1080x1920, 15-30 saniye\n- Tutarlı renk paleti kullan (RE/MAX mavi-kırmızı-beyaz)\n- Logo/watermark ekle\n\n---'},
{title:'MÜLK EKSPERTİZİ — İLK ZİYARETTE NOT ALINACAKLAR',content:'## MÜLK EKSPERTİZİ — İLK ZİYARETTE NOT ALINACAKLAR\n\n### Dış Gözlem (Binaya varınca)\n- Bina dış cephe durumu (boyalı mı, bakımlı mı)\n- Çevre düzenlemesi (bahçe, otopark, giriş)\n- Güvenlik (kamera, görevli, kartlı giriş)\n- Konum avantajları (market, okul, hastane, ulaşım yakınlığı)\n- Sokak/cadde genişliği, araç park imkânı\n- Gürültü seviyesi (ana yol, inşaat yakınlığı)\n\n### İç Gözlem (Daireye girince)\n- Oda sayısı ve m² (net ve brüt)\n- Kat / toplam kat sayısı\n- Cephe yönü (kuzey/güney/doğu/batı)\n- Manzara (ne görünüyor — Çamlıca, deniz, yeşil alan, bina)\n- Doğal ışık durumu (karanlık mı, aydınlık mı)\n- Zemin tipi (parke, seramik, laminat)\n- Duvar durumu (boyalı mı, lekeli mi, çatlak var mı)\n- Tavan yüksekliği\n- Mutfak tipi (açık/kapalı) ve dolap durumu\n- Banyo sayısı ve durumu (küvet/duşakabin, tesisat)\n- Balkon sayısı ve boyutu\n- Isınma sistemi (merkezi/kombi/klima/yerden ısıtma)\n- Kombi marka ve yaşı\n- Pencere tipi (PVC, alüminyum, ahşap) ve cam (tek/çift/ısıcam)\n- İç kapılar durumu\n- Elektrik tesisatı (priz sayısı, sigorta panosu)\n- Su basıncı (musluğu aç kontrol et)\n- Nem / rutubet belirtisi var mı (duvar köşeleri, banyo tavanı)\n- Böcek/haşere belirtisi\n\n### Bina / Site Bilgileri\n- Bina yaşı\n- Asansör var mı, çalışıyor mu\n- Aidat miktarı\n- Site yönetimi var mı\n- Ortak alanlar (havuz, spor salonu, çocuk parkı, toplantı salonu)\n- Deprem yönetmeliği (bina hangi yılın yönetmeliğine göre yapılmış)\n- DASK ve sigorta durumu\n- İskan (yapı kullanma izni) var mı\n- Kat irtifakı mı, kat mülkiyeti mi\n\n### Hukuki Kontrol (Mülk sahibine sor)\n- Tapu tipi (kat mülkiyeti/irtifakı/hisseli)\n- Üzerinde ipotek, haciz, şerh var mı\n- Miras/veraset durumu\n- Kiracı var mı (varsa sözleşme bitiş tarihi)\n- Aidat borcu var mı\n- Emlak vergisi borcu var mı\n\n### Fotoğraf Çekimi (Ekspertiz sırasında)\n- Minimum 20 fotoğraf çek\n- Her odayı en az 2 açıdan\n- Mutlaka çek: giriş, salon, mutfak, yatak odaları, banyo, balkon manzarası, dış cephe, bina girişi\n- Işıklı ve geniş açı (gündüz vakti, perdeleri aç)\n- Düzensiz eşya varsa fotoğraf öncesi topla veya sonra AI ile düzenle\n\n---'},
{title:'1. SUNUM DOSYASI (İLK GÖRÜŞME)',content:'## 1. SUNUM DOSYASI (İLK GÖRÜŞME)\n\n### Amaç\nİlk tanışma, güven oluşturma, mülkü tanıma ve 2. sunum için randevu alma.\n\n### Sunum İçeriği\n1. Kendini tanıt: "Ben [Adın], RE/MAX Doğuş gayrimenkul danışmanıyım"\n2. RE/MAX\'ı tanıt: Global ağ, Türkiye\'de 350+ ofis, Doğuş ofis tanıtımı\n3. Hizmet sürecini özetle: "Bugün sizi ve mülkünüzü tanımak, 2. görüşmemizde size özel çözümlerimi sunmak istiyorum"\n4. Mülk sahibini tanı — analiz soruları:\n   - Ne kadar süredir satışta/kirada?\n   - Süreç nasıl geçti?\n   - Ne kadar sürede satmak/kiralamak istiyorsunuz?\n   - Daha önce profesyonel hizmet aldınız mı?\n   - Satış/kiralama amacınız ne? Sonrasındaki planınız ne?\n5. Mülkü gez ve analiz et (ekspertiz notlarını al)\n6. Kapanış cümlesi: "Verdiğiniz bilgilerle size özel fiyat analizi ve pazarlama planı hazırlayacağım. [TARİH]\'teki 2. görüşmemizde tüm detayları konuşacağız."\n\n### Dikkat\n- Hazırlıksız git — bu seni doğal ve samimi gösterir\n- Fiyat hakkında YORUM YAPMA — "2. görüşmede analiz sonuçlarını konuşalım"\n- Evi gezerken olumlu/olumsuz özelliklere YORUM YAPMA\n- İdeal 2. sunum zamanı: 3-5 gün sonra\n\n---'},
{title:'2. SUNUM DOSYASI (İKİNCİ GÖRÜŞME)',content:'## 2. SUNUM DOSYASI (İKİNCİ GÖRÜŞME)\n\n### Amaç\nHazırlıklı sunum — fiyat analizi, pazarlama planı, kapanış (yetki alma).\n\n### Sunum İçeriği\n1. Açılış: "Size özel tüm çözümlerimi sunacağım"\n2. RE/MAX ve ofis tanıtımı (müşteri isterse — sormadan uzatma)\n3. Fiyat Analizi Sunumu:\n   - Emsal satılmış mülkler (satış fiyatları)\n   - Emsal satıştaki mülkler (rakipler)\n   - Emsal satılamamış mülkler (uzun süre piyasada kalanlar)\n   - Bu üç veriyle fiyat aralığı oluştur\n   - Müşterinin fiyat beklentisini dinle, verilere göre pozisyon al\n4. Pazarlama Planı:\n   - Hangi platformlarda yayınlanacak (remax.com.tr, sahibinden, hepsiemlak, sosyal medya)\n   - Profesyonel fotoğraf ve video\n   - Hedef kitle analizi\n   - Reklam stratejisi\n5. Raporlama ve iletişim planı:\n   - Haftalık/aylık rapor vereceğin\n   - Hangi kanaldan iletişim kuracağın\n6. Yetki sözleşmesi sunumu:\n   - Sözleşme maddelerini açıkla\n   - Hizmet bedeli: Satışta %2+KDV, kiralıkta 1 aylık kira+KDV\n   - Yetki süresi öner (genellikle 3 ay)\n7. Kapanış: İtirazları karşıla ve imza al\n\n### Dikkat\n- Hazırlıklı git — fiyat analizi, pazarlama planı, sözleşme hazır olsun\n- Matbu Evraklar uygulamasından yetki sözleşmesini önceden hazırla\n- RE/MAX Değerleme uygulamasından PPTX rapor çıktısı al\n- İtirazlara hazır ol (fiyat, komisyon, süre — bilgi bankasındaki cevapları kullan)\n\n---'},
{title:'REMAX SİSTEMİ VE MYREMAX',content:'## REMAX SİSTEMİ VE MYREMAX\n\n### RE/MAX Türkiye Sistemi Giriş\nWeb: remax.com.tr/account/login\n- Kullanıcı adı: RE/MAX Türkiye tarafından verilen e-posta\n- Şifre: İlk girişte verilen şifre (değiştirmeniz önerilir)\n- Giriş yapınca kendi profil sayfanı, portföylerini ve ofis bilgilerini görebilirsin\n\n### MyREMAX (Portföy ve CRM Sistemi)\nWeb: myremax.remax.com.tr\nMobil: App Store / Google Play\'den "MYRE/MAX" uygulamasını indir\n\nGiriş: RE/MAX Türkiye tarafından verilen kullanıcı adı ve şifre ile giriş yap.\nİlk girişte şifre sorunun varsa Umut\'a veya RE/MAX Türkiye destek hattına (0850 888 8769) bildir.\n\n### MyREMAX Ne İşe Yarar?\n- Portföy yönetimi: Yeni portföy ekleme, mevcut portföyü düzenleme, fotoğraf yükleme\n- Müşteri yönetimi (CRM): Müşteri kaydı, takip, eşleştirme\n- Ciro raporlama: Kapanışlarını sisteme girme\n- İlan yayınlama: remax.com.tr\'de ilanlarını yayınlama ve düzenleme\n- Referral sistemi: RE/MAX ofisleri arası müşteri yönlendirme\n\n### MyREMAX Menü Yapısı\nGiriş yaptıktan sonra sol menüde şu bölümler var:\n- Benim Sayfam: Kendi profilin, bilgilerin, istatistiklerin\n- Ofisler: RE/MAX ofis bilgileri\n- RE/MAX\'liler: Tüm RE/MAX danışman ve broker rehberi\n- Portföyler: Portföy ekleme, düzenleme, yönetme\n- Kişiler: Müşteri CRM — kayıt, takip, eşleştirme\n- Eğitim & Etkinlik: RE/MAX eğitimleri ve etkinliklere kayıt\n- Ciro Raporları: Kapanış/ciro girişi ve raporlama\n- K.G.B. (Kıymetli Gayrimenkul Bilgisi): Gayrimenkul bilgi bankası\n- Portföy Talepleri: Gelen portföy talepleri\n- İç Denetim: Denetim süreçleri\n- MyRecruiting: Danışman adayı takibi\n- MyRetention: Danışman bağlılık takibi\n- MYRE/MAX Destek: Teknik destek ve yardım\n\n### MyREMAX SSS (Sıkça Sorulan Sorular)\nMyREMAX\'ta kapsamlı bir gayrimenkul bilgi bankası var. Danışmanlar şu konularda bilgiye ulaşabilir:\n\nTapu ve Hukuki Konular:\n- İfraz, tevhit, intifa hakkı, şufa hakkı, vefa hakkı, sükna hakkı, geçit hakkı\n- İktisap, yapı ruhsatı, iskân belgesi, kira şerhi, trampa\n- Cayma akçesi, teklif formu, ecrimisil\n- Tapu harcı, döner sermaye, hisse devri, cins tahsisi\n- Pembe ve mavi tapular arası fark\n- Takyidat belgesi nedir, nereden alınır\n- İntifa ve sükna arasındaki farklar\n- İntifalı/süknalı satışlarda tapu harçları\n- İzale-i şuyu davası ve süreci\n- Aile konutu şerhi\n- Çeşitli tapu tipleri ve açıklamaları\n- Tapu işlemlerinde gerekli evraklar\n- Takaslı (trampa) satışlarda tapu harcı\n- Kooperatif hisseli tapularda satış\n- Tarihi eser mülklerde tapu harcı\n- Hisseli mülklerde satış ve devir prosedürleri\n- Tapu başvurusu nasıl yapılır\n\nVergi ve Finansal Konular:\n- Gayrimenkuldeki vergiler (gelir vergisi, KDV, tapu harcı, stopaj)\n- Gelir vergisi hesaplaması\n- Kat karşılığı edinimde emlak kazanç vergisi\n- Veraset yoluyla edinilmiş mülkte gelir vergisi\n- Stopaj ile KDV farkı, brüt-net oranları\n- Ticari gayrimenkul satışlarında KDV avantajı\n- Tapudaki satış bedelinin döviz olarak ödenip ödenemeyeceği\n\nKredi ve Finansman:\n- Arsa tapulu yere kredi kullanımı\n- Kat mülkiyeti/irtifakında kredi çıkmaması durumları\n- Ticari mülk ve arsa için kredi oranları\n- İpotekli mülkte yeni alıcının kredi kullanması\n\nKiralama:\n- Yıllık kira zam oranı\n- Kiracı hakları ve tahliye süreci\n- Kiracılı mülk satışında dikkat edilecekler\n- Tahliye taahhütnamesi ne zaman alınmalı\n- Depozito güvence bedeli nasıl alınmalı\n\nMiras ve Veraset:\n- Veraset işlemine konu mülklerde süreç\n- Miras kalan gayrimenkullerin satışı\n- Evlenmeden önce edinilen mülklerde eş hakları\n- Evlilik sırasında kalan mirasta eş hakları\n\nYabancıya Satış:\n- Yabancı vatandaşların mülk edinim kuralları\n- Gerekli evraklar\n- Vatandaşlık işlemleri ve para transferi\n- Her gayrimenkul yabancıya satılabilir mi\n\nDiğer:\n- İmar planları okuma (renkler ve işaretler)\n- Parselde inşaat alanı hesaplama\n- Arsa payı hesaplama\n- Yetkilendirme sözleşmesinin yasal süreleri\n- Belediyeye emlak beyanı nasıl verilir\n- 65 yaş üstü resmi işlemlerde sağlık raporu\n- Satış sonrası yapılması gereken resmi işlemler\n\nBu soruların detaylı cevapları MyREMAX platformundaki SSS bölümünde mevcuttur. Detay için myremax.remax.com.tr > sol menü > K.G.B. veya SSS bölümüne bak.\n\n### MyREMAX Portföy Ekleme\n1. MyREMAX\'a giriş yap\n2. "Portföy" > "Yeni Portföy Ekle"\n3. Mülk bilgilerini doldur: tür, konum, m², oda sayısı, fiyat, özellikler\n4. Fotoğrafları yükle (minimum 10, ideal 20+)\n5. İlan açıklamasını yaz (ChatGPT ile yazabilirsin)\n6. "Yayınla" — ilan remax.com.tr\'de yayına girer\n\n### MYMAX Chrome Eklentisi\nChrome Web Mağazası\'ndan "MYMAX by RE/MAX Turkiye" eklentisini kur.\nBu eklenti remax.com.tr\'deki portföy bilgilerini diğer ilan portallarına (sahibinden, hepsiemlak) kolayca aktarmanı sağlar.\n\n### RE/MAX Akademi (Eğitimler)\nremaxakademim.com adresinden giriş yap.\nKullanıcı adı: Özel ağda yazılan e-posta adresi\nŞifre: 123 (ilk giriş)\nPower Start ve diğer eğitim modüllerine "Eğitimlerim" menüsünden ulaşırsın.\nOnline eğitimler sırayla açılır, tamamlama durumu kontrol edilir.\n\n---'},
{title:'MÜŞTERİ İTİRAZLARI VE CEVAPLARI',content:'## MÜŞTERİ İTİRAZLARI VE CEVAPLARI\n\n### "Çok pahalı" / "Fiyatı yüksek"\n- Empati kur: "Anlıyorum, önemli bir yatırım. Fiyatı neye göre yüksek bulduğunuzu sorabilir miyim?"\n- Emsal göster: "Aynı bölgede son 3 ayda satılan benzer daireler şu fiyatlarda kapandı..."\n- Değer analizi sun: m² bazında karşılaştır, mülkün farklılaştırıcı özelliklerini vurgula\n- Yatırım getirisi hesapla: "Bu mülk kiralandığında aylık X TL getiri sağlar, yıllık getiri oranı %Y"\n- Ödeme planı öner: "Satıcıyla vadeli ödeme planı konuşabiliriz"\n\n### "Komisyon ödemek istemiyorum"\n- Hizmet değerini anlat: "Biz sadece kapı açmıyoruz. Fiyat analizi, pazarlama, hukuki süreç takibi, tapu işlemleri — tüm süreci profesyonelce yönetiyoruz"\n- Yasal dayanağı belirt: "Taşınmaz Ticareti Yönetmeliği gereği satışlarda %2+KDV, kiralamalarda 1 aylık kira+KDV hizmet bedeli uygulanır. Bu sektör standardıdır"\n- Güvence vurgula: "RE/MAX sistemiyle çalışmak size hukuki güvence sağlar. Yetki belge numaramız 3402699, tüm işlemler kayıt altında"\n- Risk hatırlat: "Komisyonsuz işlemlerde hukuki sorunlar, eksik evrak, dolandırıcılık riskleri çok daha yüksek"\n\n### "Düşüneyim" / "Eşimle konuşayım"\n- Kabul et ama takip planı kur: "Tabii ki, bu önemli bir karar. Ne zaman tekrar konuşabiliriz?"\n- Aciliyet oluştur (doğal): "Bu mülke başka ilgilenenler de var, size en güncel bilgiyi vermek isterim"\n- Engeli anla: "Düşünmeniz gereken spesifik bir konu var mı? Belki beraber çözüm bulabiliriz"\n- Takip zamanlaması: 2-3 gün sonra nazikçe ara, yeni bir bilgiyle (fiyat güncellemesi, yeni emsal satış)\n\n### "Lokasyonu beğenmedim"\n- Bölge avantajlarını sun: ulaşım hatları, metro/metrobüs mesafesi, okul/hastane yakınlığı\n- Gelecek projelerden bahset: yeni metro hattı, kentsel dönüşüm, AVM/park projeleri\n- Değer artışı verisi paylaş: "Bu bölgede son 2 yılda %X değer artışı yaşandı"\n- Alternatif öner: "Kriterlerin arasından şu bölgede de seçeneklerimiz var"\n- Fikirtepe özelinde: kentsel dönüşüm avantajı, merkezi konum, E-5 ve Marmaray erişimi\n\n### "Başka emlakçıyla da görüşeceğim"\n- Profesyonel karşıla: "Tabii ki karşılaştırma yapmanız çok doğru"\n- Farkını göster: "Biz size fiyat analizi, profesyonel pazarlama planı ve RE/MAX\'in global ağını sunuyoruz"\n- Referans ver: "Bölgedeki son kapanışlarımızı ve müşteri memnuniyetimizi paylaşabilirim"\n\n### "Kendi başıma satarım/kiralarım"\n- Süre hatırlat: "Sahibinden satışlar ortalama 2-3 kat daha uzun sürer"\n- Pazarlama gücü: "Biz remax.com.tr, sahibinden, hepsiemlak ve tüm portallarda eş zamanlı yayınlıyoruz + sosyal medya reklamı"\n- Güvenlik: "Evinizdeki tanımadığınız kişilerin güvenlik riskini profesyonel süreçle ortadan kaldırıyoruz"\n- Fiyat avantajı: "Doğru fiyatlandırma ile mülkünüz daha hızlı ve daha yüksek fiyata satılır"\n\n---'},
{title:'KIBRIS GAYRİMENKUL',content:'## KIBRIS GAYRİMENKUL\n\n### Yabancıya Satış Süreci\n- Yabancı uyruklu kişiler Kuzey Kıbrıs\'ta gayrimenkul satın alabilir\n- Bir kişi adına en fazla 1 dönüm (1338 m²) arazi satın alınabilir\n- Bakanlar Kurulu\'ndan satın alma izni gerekir (süreç 6-12 ay sürebilir)\n- İzin süreci devam ederken mülk kullanılabilir ve kiralanabilir\n- Tapu devri Bakanlar Kurulu onayından sonra yapılır\n\n### Yatırım Avantajları\n- Döviz bazlı yatırım (GBP/USD bazında fiyatlandırma)\n- Yüksek kira getirisi (yıllık %6-8 arası)\n- İngiliz hukuk sistemi güvencesi\n- Türkiye\'ye göre düşük yaşam maliyeti\n- Faizsiz taksit imkânı (geliştirici firmaların ödeme planları)\n- Akdeniz iklimi, doğa ve yaşam kalitesi\n\n### Döveç İnşaat ve Diğer Geliştiriciler\nKıbrıs Katalog uygulamasından tüm projeleri görebilirsin. Mevcut geliştiriciler: Döveç İnşaat, Cyprus Constructions, Northernland.\nHer projenin tip filtresi ve ödeme planı hesaplayıcısı var.\nWhatsApp rehberi: kisa.link/YRQLo\n\n### Sunum Materyalleri\nTüm Kıbrıs sunum materyalleri Kıbrıs Katalog uygulamasında mevcuttur (link: Apps Script — Umut\'tan al).\nMüşteriye sunum yapmak için:\n1. Kıbrıs Katalog uygulamasını aç\n2. Geliştirici seç (Döveç, Cyprus Constructions, Northernland)\n3. Müşterinin bütçesine ve ihtiyacına uygun projeleri filtrele\n4. Proje detayında fotoğraflar, kat planları ve fiyat bilgileri mevcut\n5. Ödeme planı hesaplayıcısıyla müşteriye özel taksit planı çıkar\n6. Projeyi doğrudan WhatsApp ile müşteriye paylaş\n7. WhatsApp rehberi: kisa.link/YRQLo — müşteriye bu linki de gönderebilirsin\nAyrı bir Drive linki veya broşüre gerek yok — her şey uygulamada.\n\n---'},
{title:'PAZARLAMA REHBERİ',content:'## PAZARLAMA REHBERİ\n\n### Instagram/Facebook Reklam Verme (Meta Business Suite)\n1. Meta Business Suite\'e giriş yap (business.facebook.com)\n2. "Reklam Oluştur" butonuna tıkla\n3. Hedef seç: Portföy tanıtımı için "Trafik" veya "Etkileşim", müşteri bulmak için "Potansiyel Müşteri"\n4. Hedef kitle belirle: Konum (Fikirtepe, Kadıköy, İstanbul), yaş (25-55), ilgi alanı (gayrimenkul, ev satın alma)\n5. Bütçe belirle: Günlük minimum 100-200 TL önerilir, süre 7-14 gün\n6. Görsel/Video yükle: Dikey format (1080x1920) story için, kare (1080x1080) feed için\n7. Metin yaz: kısa, dikkat çekici, fiyat veya özellik vurgulu\n8. Yayınla ve performansı takip et\n\n### Video Editleme\nÖnerilen uygulamalar: CapCut (ücretsiz, kolay), InShot (hızlı düzenleme)\nTemel adımlar:\n1. Mülkü geniş açıyla ve iyi ışıkta çek (yatay veya dikey)\n2. CapCut\'ta yeni proje oluştur, videoları ekle\n3. Gereksiz kısımları kes, geçişler ekle\n4. Metin ekle: adres, fiyat, m², oda sayısı\n5. Müzik ekle (telif hakları olmayan)\n6. Dışa aktar: 1080p, story formatı (9:16) veya feed formatı (1:1)\n7. İdeal süre: 15-30 saniye (story/reels), 60 saniye (feed)\n\n### Sahibinden.com\'a İlan Verme\n1. sahibinden.com\'a giriş yap (ofis hesabı veya kendi hesabın)\n2. Sağ üstteki "İlan Ver" butonuna tıkla\n3. Kategori seç: Konut > Satılık/Kiralık > Daire/Residence/Villa vs.\n4. İl/İlçe/Mahalle seç (Kadıköy > Fikirtepe, Dumlupınar Mah. vs.)\n5. İlan bilgilerini doldur: başlık, fiyat, m², oda sayısı, bina yaşı, kat, ısınma tipi, cephe, banyo sayısı\n6. Başlık dikkat çekici olsun: ör. "Yenifikirtepe 6. Etap Manzaralı 2+1 Sıfır Daire"\n7. Açıklama: Detaylı, profesyonel (ChatGPT ile yazabilirsin — aşağıda rehber var)\n8. Fotoğraf yükle: Minimum 10, ideal 20+ fotoğraf. İlk fotoğraf en dikkat çekici olsun\n9. İletişim bilgileri: Kendi telefonun veya ofis numarası (0216 315 15 15)\n10. Konum haritada doğru işaretlendiğinden emin ol\n11. "İlanı Yayınla" — sonra istatistikleri takip et\n\nİpuçları: Başlıkta BÜYÜK HARF kullanma. Fotoğrafları yüklemeden önce AI ile düzenle. İlan açıklamasında RE/MAX Doğuş ve danışman adını belirt. Vitrin/öne çıkarma kullanmadan önce Umut\'a danış.\n\n### ChatGPT ile Fotoğraf Işıklandırma ve Düzenleme\n1. ChatGPT\'ye (chatgpt.com) giriş yap\n2. Fotoğrafı sohbete yükle (ataç simgesi veya sürükle-bırak)\n3. Şu komutu yaz: "Bu ev fotoğrafının ışığını artır, daha aydınlık ve davetkar hale getir. Renkleri doğal tut."\n4. ChatGPT düzenlenmiş fotoğrafı oluşturur — indir ve kullan\n\nFarklı komutlar:\n- Işıklandırma: "Bu fotoğrafı daha aydınlık yap, gölgeleri azalt, pencereden gelen ışığı artır"\n- Renk düzeltme: "Renkleri daha canlı ve sıcak yap, beyaz dengesini düzelt"\n- Genel iyileştirme: "Bu emlak fotoğrafını profesyonel emlak çekimi gibi düzenle"\n\n### Yapay Zeka ile Fotoğraftan Obje Silme\n\nYöntem 1 — ChatGPT:\n1. Fotoğrafı ChatGPT\'ye yükle\n2. "Bu fotoğraftaki [obje adı]\'nı sil, arka planı doğal şekilde tamamla" yaz\n3. Örnek: "Salondaki karton kutuları sil", "Balkondaki çamaşırlığı kaldır", "Yerdeki ayakkabıları sil"\n\nYöntem 2 — cleanup.pictures (ücretsiz):\n1. cleanup.pictures sitesine git\n2. Fotoğrafı yükle\n3. Silmek istediğin objenin üzerini fırçayla boya\n4. AI otomatik olarak objeyi silip arka planı tamamlar, sonucu indir\n\n### Eşyalı/Eşyasız Fotoğraf Düzenleme\n\nEşyalı daireyi boş göstermek:\n1. Fotoğrafı ChatGPT\'ye yükle\n2. "Bu odadaki tüm mobilyaları ve eşyaları kaldır, boş bir oda olarak göster. Duvarlar, zemin ve pencereler kalsın" yaz\n\nBoş daireyi eşyalı göstermek (sanal home staging):\n1. Fotoğrafı ChatGPT\'ye yükle\n2. "Bu boş salona modern mobilya ekle: kanepe, sehpa, TV ünitesi, halı. Doğal ve gerçekçi görünsün" yaz\n3. Veya: "Bu boş yatak odasına çift kişilik yatak, komodin ve abajur ekle"\n\nİpuçları: Sanal staging ilanda belirtilmeli — "Görsel temsilidir" notu ekle. Gerçek fotoğrafları da mutlaka koy. Banyo ve mutfağı genellikle olduğu gibi bırak, salon ve yatak odasında dene.\n\n### ChatGPT ile İlan Metni Yazma\n1. ChatGPT\'ye giriş yap\n2. Şu formatta bilgi ver: "Bana bir emlak ilanı metni yaz: İşlem: Satılık/Kiralık, Konum: [mahalle, ilçe], Proje: [varsa], Oda sayısı: [1+1 vs.], m²: [net], Kat: [kaçıncı/toplam], Bina yaşı, Isınma, Öne çıkan özellikler, Fiyat. Profesyonel ve güven veren bir dil kullan. RE/MAX Doğuş adına yaz."\n3. ChatGPT ilan metnini oluşturur\n4. Gerekirse düzelt: "Daha kısa yaz" veya "Yatırımcıya yönelik vurgula"\n5. Metni kopyala, sahibinden veya sosyal medya ilanına yapıştır\n\nÖrnek komut: "Fikirtepe Yenifikirtepe 6. Etap B Blok\'ta 2+1, 85 m², 12. kat, sıfır daire, Çamlıca manzaralı, merkezi ısınma, kapalı otopark, site içi havuz ve spor salonu var. Satılık, 9.500.000 TL. RE/MAX Doğuş adına profesyonel ilan metni yaz."\n\n---'},
{title:'CAPCUT — SIFIRDAN A\'DAN Z\'YE REHBERİ',content:'## CAPCUT — SIFIRDAN A\'DAN Z\'YE REHBERİ\n\n### CapCut Nedir?\nÜcretsiz video düzenleme uygulaması. Telefondan (iPhone/Android) ve bilgisayardan (capcut.com) kullanılır. Portföy videosu, reels, story ve tanıtım videosu hazırlamak için ideal.\n\n### Kurulum\n- iPhone: App Store\'dan "CapCut" indir\n- Android: Google Play\'den "CapCut" indir\n- Bilgisayar: capcut.com\'dan web versiyonunu kullan veya masaüstü uygulamasını indir\n- Giriş: Google, Facebook veya e-posta ile hesap oluştur\n\n### İlk Video Projesi Oluşturma\n1. CapCut\'ı aç, "Yeni Proje" butonuna bas\n2. Galerinden videoları ve fotoğrafları seç (çoklu seçim yapabilirsin)\n3. "Ekle" butonuna bas — videolar zaman çizelgesine (timeline) eklenir\n4. Ekranın alt kısmında düzenleme araçları görünür\n\n### Temel Düzenleme İşlemleri\n\nKırpma (Trim):\n1. Zaman çizelgesinde videoyu seç (dokun)\n2. Video klipsin başındaki veya sonundaki beyaz çubuğu sürükle\n3. İstemediğin kısmı kes\n\nBölme (Split):\n1. Oynatma çubuğunu (beyaz dikey çizgi) kesmek istediğin noktaya getir\n2. Alt menüden "Böl" (Split) butonuna bas\n3. Video ikiye bölünür — istemediğin parçayı seç ve "Sil"\n\nSıralama Değiştirme:\n1. Bir klipe uzun bas\n2. Sürükleyerek istediğin sıraya taşı\n\n### Metin Ekleme\n1. Alt menüden "Metin" (Text) butonuna bas\n2. "Metin Ekle" seç\n3. Yazını yaz: adres, fiyat, m², oda sayısı\n4. Font seç (temiz, okunabilir fontlar: Montserrat, Poppins, Arial)\n5. Renk seç (beyaz metin + siyah gölge en okunabilir)\n6. Boyut ayarla — parmakla sıkıştır/genişlet\n7. Konumu ayarla — sürükleyerek ekranda istediğin yere taşı\n8. Süreyi ayarla — metin klipsin zaman çizelgesindeki uzunluğunu sürükle\n\nAnimasyonlu metin: Metin seçiliyken "Animasyon" > giriş animasyonu seç (ör: "Fade In", "Slide Up")\n\n### Müzik Ekleme\n1. Alt menüden "Ses" (Audio) butonuna bas\n2. "Sesler" (Sounds) seç — CapCut\'ın ücretsiz müzik kütüphanesi açılır\n3. Türe göre filtrele: "Cheerful", "Inspiring", "Calm" — emlak için sakin/modern tarzlar ideal\n4. Beğendiğini seç, "+" ile ekle\n5. Müzik sesi: müzik klibe dokun > ses seviyesini %20-30 arası ayarla (konuşma varsa düşük tut)\n\n### Geçiş Efektleri (Transition)\n1. İki klip arasındaki beyaz kare simgeye dokun\n2. Geçiş efekti seç (ör: "Slide", "Fade", "Zoom")\n3. Süreyi ayarla (0.3-0.5 saniye yeterli — fazla uzun yapma)\n4. Profesyonel görünüm için tüm geçişlerde aynı efekti kullan\n\n### Filtre ve Renk Düzeltme\n1. Klibi seç > "Filtreler" (Filters)\n2. Emlak videoları için: "Natural", "Fresh", "Bright" kategorileri\n3. Filtreyi seç, yoğunluğu %50-70 arası ayarla (abartma)\n4. Renk ayarı: "Ayarla" (Adjust) > parlaklık, kontrast, doygunluk, sıcaklık manuel ayarla\n5. Karanlık mekanlarda: Parlaklık +20, Gölgeler +30, Kontrast +10\n\n### Hız Ayarı\n1. Klibi seç > "Hız" (Speed)\n2. "Normal" sekmesinde hız çarpanını ayarla\n3. Oda geçişlerinde 2x hız güzel görünür\n4. Manzara çekimlerinde 0.5x (ağır çekim) etkileyici olur\n\n### Dışa Aktarma (Export)\n1. Sağ üstteki "Dışa Aktar" (Export) butonuna bas\n2. Çözünürlük: 1080p (Full HD) — daha düşük seçme\n3. Kare hızı: 30 fps yeterli\n4. Format otomatik MP4 gelir\n5. "Dışa Aktar" bas, galeriye kaydedilir\n\n### Emlak Videosu İçin İdeal Format\n- Story/Reels: Dikey 9:16 (1080x1920), 15-30 saniye\n- Instagram Feed: Kare 1:1 (1080x1080) veya Dikey 4:5 (1080x1350), 30-60 saniye\n- YouTube: Yatay 16:9 (1920x1080), 1-3 dakika\n\nProje başında format seçmek için: "Yeni Proje" > sağ üstte oran seçeneği (9:16, 1:1, 16:9)\n\n### CapCut Sık Sorulan Sorular\nS: Videoya logo/watermark nasıl eklerim?\nC: "Kaplama" (Overlay) > "Fotoğraf ekle" > RE/MAX Doğuş logosunu seç > boyutunu küçült > köşeye yerleştir > opaklığı %70 yap > süresini videonun tamamına uzat\n\nS: Sesli anlatım nasıl eklerim?\nC: Alt menü > "Ses" > "Kayıt" > mikrofon simgesine bas ve konuş. Video oynarken canlı anlatım yapabilirsin.\n\nS: Videoyu WhatsApp\'a gönderince kalitesi düşüyor?\nC: WhatsApp sıkıştırır. Kaliteli paylaşmak için: videoyu "Dosya" olarak gönder (ataç > dosya > galeriden seç), "Fotoğraf" olarak değil.\n\nS: Şablon (template) nasıl kullanırım?\nC: Ana ekranda "Şablonlar" sekmesi > beğendiğin şablonu seç > "Bu şablonu kullan" > kendi videolarını/fotoğraflarını ekle. Hızlı ve profesyonel sonuç verir.\n\nS: Birden fazla metin farklı zamanlarda nasıl gösterilir?\nC: Her metin için ayrı "Metin Ekle" yap. Zaman çizelgesinde her metnin başlangıç ve bitiş süresini ayrı ayarla.\n\n---'},
{title:'CANVA — SIFIRDAN A\'DAN Z\'YE REHBERİ',content:'## CANVA — SIFIRDAN A\'DAN Z\'YE REHBERİ\n\n### Canva Nedir?\nÜcretsiz grafik tasarım aracı. Sosyal medya görseli, ilan afişi, kartvizit, sunum, broşür — her türlü görsel içeriği profesyonel şekilde hazırlarsın. Tasarım bilgisi gerekmez.\n\n### Kurulum ve Giriş\n- Telefon: App Store veya Google Play\'den "Canva" indir\n- Bilgisayar: canva.com\'a git\n- Giriş: Google, Facebook veya e-posta ile ücretsiz hesap oluştur\n- Ücretsiz plan yeterli — Pro gerekmez\n\n### İlk Tasarımı Oluşturma\n1. Canva\'yı aç, "Tasarım Oluştur" (Create a Design) butonuna bas\n2. Boyut seç:\n   - Instagram Story: 1080x1920 px\n   - Instagram Post: 1080x1080 px\n   - Instagram Post (dikey): 1080x1350 px\n   - A4 afiş: A4 seç\n   - Kartvizit: "Kartvizit" ara\n   - Sunum: "Sunum (16:9)" seç\n3. Boş sayfa açılır — tasarıma başla\n\n### Şablon Kullanma (En Hızlı Yol)\n1. Sol menüden "Şablonlar" (Templates) sekmesine tıkla\n2. Arama kutusuna yaz: "real estate", "emlak", "property", "for sale", "for rent"\n3. Beğendiğin şablona tıkla — sayfana uygulanır\n4. Metinleri kendi bilgilerinle değiştir (fiyat, adres, m², telefon)\n5. Fotoğrafı kendi mülk fotoğrafınla değiştir\n6. Renkleri RE/MAX renklerine uyarla (mavi: #003DA5, kırmızı: #DC1C2E, beyaz: #FFFFFF)\n\n### Fotoğraf Ekleme ve Düzenleme\n1. Sol menüden "Yüklemeler" (Uploads) > "Dosya yükle" > mülk fotoğrafını seç\n2. Fotoğrafı tasarıma sürükle\n3. Boyutlandır: köşelerden sürükleyerek büyüt/küçült\n4. Kırp: fotoğrafa çift tıkla > çerçeve içinde kaydır ve kırp\n5. Filtre: fotoğrafı seç > üst menüde "Filtre" > "Enhance" veya "Solar" hafif uygula\n6. Ayarlar: "Ayarlar" (Adjust) > parlaklık, kontrast, doygunluk ayarla\n\n### Metin Ekleme ve Düzenleme\n1. Sol menüden "Metin" (Text) > "Başlık ekle" veya "Alt başlık ekle"\n2. Metni yaz: adres, fiyat, özellikler\n3. Font seçimi: Profesyonel fontlar — Montserrat, Poppins, Raleway, Open Sans\n4. Boyut: Başlık 36-48pt, alt bilgi 18-24pt\n5. Renk: Metne tıkla > renk kutusuna tıkla > renk seç veya hex kodu gir\n6. Hizalama: Ortala, sola veya sağa yasla\n7. Efekt: Metin seçili > "Efektler" > "Gölge" veya "Arka plan" ekle (okunabilirlik için)\n\n### Element ve Şekil Ekleme\n1. Sol menüden "Elementler" (Elements)\n2. Arama: "line", "arrow", "frame", "shape", "icon"\n3. Şekiller: Fiyat kutucuğu için dikdörtgen ekle, rengini ayarla, üzerine metin koy\n4. Çerçeveler: "Frame" ara > fotoğrafını çerçeveye sürükle\n5. İkonlar: "phone", "location", "bed", "bath" ara > oda sayısı, konum ikonu ekle\n\n### Logo Ekleme\n1. "Yüklemeler" > RE/MAX Doğuş logosunu yükle (PNG, şeffaf arka plan ideal)\n2. Tasarıma sürükle\n3. Köşeye yerleştir, boyutunu küçült\n4. Her tasarımda tutarlı konumda kullan (genellikle sağ alt veya sol üst)\n\n### Katmanlar ve Hizalama\n1. Bir elementin önüne/arkasına almak: Sağ tıkla > "Öne getir" veya "Arkaya gönder"\n2. Hizalama: Birden fazla element seç (Shift+tıkla) > üst menüde "Hizala" > ortala, dağıt\n3. Gruplama: Birden fazla element seç > "Grupla" — birlikte taşınır\n\n### Sayfa Ekleme (Çoklu Tasarım)\n1. Alt kısımda "+" butonuyla yeni sayfa ekle\n2. Her sayfaya farklı fotoğraf/bilgi koy\n3. Carousel (kaydırmalı) post için ideal — 5-10 sayfa\n\n### Kaydetme ve İndirme\n1. Sağ üstte "Paylaş" (Share) > "İndir" (Download)\n2. Format seçimi:\n   - Sosyal medya görseli: PNG (en kaliteli) veya JPG\n   - Baskı (afiş, kartvizit): PDF Baskı kalitesi\n   - Sunum: PPTX veya PDF\n3. Sayfa seçimi: Tümü veya belirli sayfaları seç\n4. "İndir" bas — galeriye kaydedilir\n\n### Emlak İçin Hazır Tasarım Fikirleri\n\nSatılık/Kiralık ilan görseli:\n- Büyük mülk fotoğrafı (arka plan)\n- Üst bant: "SATILIK" veya "KİRALIK" (kırmızı veya mavi bant)\n- Ortada: Fiyat (büyük, dikkat çekici)\n- Alt bilgi: m², oda sayısı, kat, konum\n- Alt bant: RE/MAX Doğuş logosu + danışman adı + telefon\n\n"Satıldı" görseli:\n- Mülk fotoğrafı + üzerinde kırmızı "SATILDI" damgası\n- "RE/MAX Doğuş farkıyla" alt yazısı\n- Güven ve başarı mesajı verir\n\nBölge tanıtımı:\n- Fikirtepe drone fotoğrafı veya çevre fotoğrafları\n- "Fikirtepe\'de Yaşam" veya "Yenifikirtepe Rehberi" başlığı\n- Bilgilendirici metin: ulaşım, okullar, hastaneler, projeler\n\nKartvizit:\n- "Kartvizit" şablonu seç\n- Ön yüz: Ad, unvan (RE/MAX Doğuş Gayrimenkul Danışmanı), telefon, e-posta, logo\n- Arka yüz: Ofis adresi, web sitesi, QR kod\n\n### Canva Sık Sorulan Sorular\n\nS: Tasarımımı başka bir boyuta nasıl uyarlarım?\nC: "Boyutlandır" (Resize) butonu > yeni boyut seç. Ücretsiz planda bu özellik sınırlı — aynı tasarımı yeni boyutta "Tasarım Oluştur" ile sıfırdan aç ve elementleri kopyala-yapıştır.\n\nS: Şeffaf arka plan nasıl yaparım?\nC: İndir > "Şeffaf arka plan" kutucuğunu işaretle. Bu özellik sadece PNG formatında ve Canva Pro\'da çalışır. Ücretsiz alternatif: remove.bg sitesinde arka planı kaldır.\n\nS: Marka renkleri ve fontlarımı nasıl kaydederim?\nC: Sol menü > "Marka kiti" (Brand Kit) — Pro özelliği. Ücretsiz planda: en çok kullandığın renk kodlarını not al (RE/MAX mavi: #003DA5, kırmızı: #DC1C2E).\n\nS: Aynı tasarımı tekrar tekrar nasıl kullanırım?\nC: Tasarımı aç > "Dosya" > "Kopya oluştur". Kopyayı düzenle, orijinal bozulmaz. Böylece her portföy için aynı şablonu kullanırsın.\n\nS: Tasarımı başka biriyle nasıl paylaşırım?\nC: "Paylaş" > "Bağlantıyı kopyala" > link olarak gönder. Veya "İndir" ile dosya olarak gönder.\n\nS: Video tasarımı da yapabilir miyim?\nC: Evet. "Video" şablonu seç. Fotoğraflara animasyon ekleyebilir, metin animasyonları yapabilir, müzik ekleyebilirsin. Ancak detaylı video düzenleme için CapCut daha iyi.\n\nS: Canva\'da AI ile tasarım yapabilir miyim?\nC: Evet. "Magic Design" özelliğini kullan — fotoğrafını yükle, ne yapmak istediğini yaz, Canva otomatik tasarım önerileri sunar. Veya "Metin ile görüntü" (Text to Image) ile AI görsel üret.\n- Canva kullanımı önerilir (canva.com — ücretsiz plan yeterli)\n- RE/MAX şablonları ve Doğuş renkleri ile marka tutarlılığı sağla\n- Story boyutu: 1080x1920 px\n- Post boyutu: 1080x1080 px\n- Afiş boyutu: A3 veya A4\n\n### Portföy Paylaşım Şablonları\n\nSatılık ilan şablonu:\n"📍 [ADRES]\n🏠 [ODA SAYISI] | [M²] m² | [KAT]. Kat\n💰 [FİYAT] TL\n✅ [ÖNE ÇIKAN ÖZELLİK — manzara, yeni bina, merkezi konum vs.]\n📞 İletişim: [TELEFON]\n#remaxdoğuş #fikirtepe #satılık #gayrimenkul #kadıköy #istanbul"\n\nKiralık ilan şablonu:\n"📍 [ADRES]\n🏠 [ODA SAYISI] | [M²] m² | [KAT]. Kat\n💰 [KİRA] TL/ay + [AİDAT] TL aidat\n✅ [ÖNE ÇIKAN ÖZELLİK]\n📞 İletişim: [TELEFON]\n#remaxdoğuş #kiralık #fikirtepe #kadıköy"\n\n### Müşteriye İlk Mesaj Şablonu\n"Merhaba [İSİM] Bey/Hanım, ben RE/MAX Doğuş\'tan [DANIŞMAN ADI]. [KAYNAK — web sitesi/referans/ilan]\'dan iletişim bilgilerinize ulaştım. [KONU — satılık/kiralık aramanız] ile ilgili size yardımcı olmak isterim. Uygun olduğunuz bir zamanda kısa bir görüşme yapabilir miyiz?"\n\n### Gösterim Sonrası Takip Mesajı Şablonu\n"Merhaba [İSİM] Bey/Hanım, bugünkü görüşmemiz için teşekkür ederim. [ADRES]\'teki mülkle ilgili düşüncelerinizi merak ediyorum. Aklınıza takılan sorular varsa her zaman arayabilirsiniz. İyi günler dilerim."\n\n---'},
