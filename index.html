<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Doğuş Asistan</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--blue:#003DA5;--red:#DC1C2E;--bg:#F0F2F5;--card:#fff;--text:#1a1a2e;--text-light:#6b7280;--green:#059669}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100dvh;overflow:hidden}

.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100dvh;background:linear-gradient(135deg,var(--blue) 0%,#001d52 100%);padding:24px}
.login-title{color:#fff;font-size:28px;font-weight:700;margin-bottom:4px}
.login-subtitle{color:rgba(255,255,255,0.7);font-size:14px;margin-bottom:32px}
.login-box{background:#fff;border-radius:16px;padding:32px 24px;width:100%;max-width:340px}
.login-box label{display:block;font-size:13px;color:var(--text-light);margin-bottom:6px;font-weight:500}
.login-box select,.login-box input{width:100%;padding:14px 16px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:16px;margin-bottom:16px;outline:none;background:#fafbfc;-webkit-appearance:none}
.login-btn{width:100%;padding:14px;background:var(--red);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer}
.login-btn:active{transform:scale(0.97)}
.login-error{color:var(--red);font-size:13px;text-align:center;margin-top:8px;min-height:20px}
.login-version{color:rgba(255,255,255,0.4);font-size:11px;margin-top:24px}

.app{display:none;flex-direction:column;height:100dvh}
.app-header{background:var(--blue);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:12px;z-index:10}
.app-header-icon{width:38px;height:38px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.app-header-info{flex:1}
.app-header-name{font-size:16px;font-weight:600}
.app-header-sub{font-size:11px;color:rgba(255,255,255,0.7)}
.app-logout{background:none;border:none;color:rgba(255,255,255,0.7);font-size:22px;cursor:pointer}

.search-area{padding:12px 16px;background:#fff;border-bottom:1px solid #e8e8e8}
.search-box{display:flex;gap:8px}
.search-box input{flex:1;padding:12px 16px;border:1.5px solid #e0e0e0;border-radius:22px;font-size:15px;outline:none;background:#fafbfc}
.search-box input:focus{border-color:var(--blue)}
.search-box button{padding:0 18px;background:var(--red);color:#fff;border:none;border-radius:22px;font-size:15px;font-weight:600;cursor:pointer}

.results{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}

.welcome{text-align:center;padding:30px 20px}
.welcome .emoji{font-size:48px;margin-bottom:12px}
.welcome h2{font-size:20px;margin-bottom:8px}
.welcome p{font-size:14px;color:var(--text-light);line-height:1.5;margin-bottom:16px}
.topics{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.topic{background:#fff;border:1.5px solid #e0e0e0;border-radius:20px;padding:8px 14px;font-size:13px;color:var(--blue);cursor:pointer;transition:all .15s}
.topic:hover,.topic:active{border-color:var(--blue);background:#f0f4ff}

.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,0.06);animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card-title{font-size:15px;font-weight:700;color:var(--blue);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.card-title::before{content:'📋';font-size:16px}
.card-body{font-size:14px;line-height:1.7;white-space:pre-wrap;word-wrap:break-word;color:#333}
.card-body .highlight{background:#FEF3C7;padding:1px 4px;border-radius:3px;font-weight:600}

.no-result{text-align:center;padding:40px 20px;color:var(--text-light)}
.no-result .emoji{font-size:40px;margin-bottom:12px}
.no-result p{font-size:14px;line-height:1.5}
.no-result b{color:var(--text)}

.match-count{font-size:12px;color:var(--green);font-weight:600;padding:0 16px 8px;display:none}
</style>
</head>

{t:'DOĞUŞ BİLGİ BANKASI — RE/MAX DOĞUŞ OFİS ASISTANI',c:'# DOĞUŞ BİLGİ BANKASI — RE/MAX DOĞUŞ OFİS ASISTANI\n\n## ASISTAN KİŞİLİĞİ — UMUT TOKKUŞ GİBİ CEVAP VER\n\nSen RE/MAX Doğuş\'un dijital asistanısın. Cevaplarını broker Umut Tokkuş\'un tarzında ver. Sanki Umut cevap veriyor gibi konuş.\n\nUmut\'un iletişim tarzı:\n- Sıcak ama profesyonel. "Sen" dili kullanır, saygılı ama mesafeyi korur.\n- Direkt ve nettir. Lafı dolandırmaz, ne demek istiyorsa söyler.\n- Hata gördüğünde yuvarlak konuşmaz, açıkça belirtir ama saygıyla.\n- Motivasyon verirken hem enerji hem veri hem de kendi deneyimlerinden hikayeler kullanır.\n\nUmut\'un sık kullandığı yaklaşımlar:\n- "Haydi, yapabilirsin!" — ateşleyici, cesaret verici\n- "Sana güveniyorum" — güven veren, destekleyici\n- "Hadi bakalım, işe koyulalım" — aksiyona yönlendiren\n- "Senden beklentim yüksek" — standartları hatırlatan\n\nUmut\'un temel değerleri (öncelik sırasıyla):\n1. Disiplin ve süreklilik — her gün düzenli çalışmak, biriktirmemek\n2. Dürüstlük ve şeffaflık — müşteriye ve ekibe karşı dürüst olmak\n3. Müşteri memnuniyeti — işin sonunda müşteriyi mutlu etmek\n\nCevap verme kuralları:\n- Kısa ve net cevap ver, gereksiz uzatma\n- Adım adım açıkla, karmaşık bırakma\n- Danışmanı cesaretlendir, eleştirirken bile yapıcı ol\n- "Bilmiyorum" deme — bilgi bankasında yoksa "Bu konuyu Umut\'a sor" de\n- Türkçe cevap ver, sade dil kullan, jargondan kaçın\n- Danışmana ismiyle hitap et (giriş yapınca kim olduğunu bilirsin)\n\n## ŞİRKET BİLGİLERİ\n\nŞirket Ünvanı: UMT GROUP GAYRİMENKUL YATIRIM DANIŞMANLIK İNŞ. SAN. TİC. LTD. ŞTİ.\nMarka: RE/MAX DOĞUŞ\nVergi Dairesi: Göztepe VD.\nVergi Numarası: 8920318332\nYetki Belge Numarası: 3402699\nAdres: Dumlupınar Mah. Özen Sok. Nuhoğlu Yenitepe Sitesi 2. Etap A Blok Dükkan 14, Kadıköy / İstanbul\nTelefon: 0216 315 15 15\nE-posta: info@remaxdogus.com.tr\nBroker: Umut Tokkuş\n\nHizmet Bedelleri:\n- Satılık işlemlerde: Satış bedelinin %2 + KDV (her iki taraftan ayrı ayrı)\n- Kiralık işlemlerde: 1 {t:'Uygulama Linkleri (Tam Liste)',c:'### Uygulama Linkleri (Tam Liste)\n- Kapanış Formu: dogusremax.github.io/kapanis-formu\n- Matbu Evraklar: dogusremax.github.io/matbu-evraklar\n- Portföy Takip: dogusremax.github.io/portfoy-takip\n- Müşteri Takip: dogusremax.github.io/musteri-takip\n- RE/MAX Değerleme: dogusremax.github.io/remax-de-erleme\n- Danışman Takip (Performans/Karne): Apps Script üzerinden çalışır, linki Umut\'tan al\n- Kıbrıs Katalog (Döveç): Apps Script üzerinden çalışır, linki Umut\'tan al\n- Yenifikirtepeburada.com: yenifikirtepeburada.com\n\nTüm uygulamalarda 4 haneli PIN ile giriş yapılır. PIN\'ini bilmiyorsan Umut\'a sor.',k:['formu','re','danışman','umut','max','döveç','üzerinden','portföy','dogusremax','erleme','değerleme','script','github','müşteri','matbu','uygulama','io','çalışır','portfoy','yenifikirte','kapanis','linkleri','tan','yenifikirtepeburada','karne','katalog','al','evraklar','tam','musteri']},

{t:'Kapanış Formu',c:'### Kapanış Formu\nLink: dogusremax.github.io/kapanis-formu\n\nNe işe yarar: Satış veya kiralama kapandığında işlem bilgilerini kayıt altına alırsın. Veriler otomatik Google Sheet\'e yazılır.\n\nKullanım:\n1. Uygulamayı aç, açılır menüden kendi adını seç\n2. 4 haneli PIN kodunu gir, "Devam Et"\n3. Hangi tarafı temsil ettiğini seç: Mülk Sahibi / Alıcı-Kiracı / Her İkisi\n4. İşlem bilgilerini doldur: tür (satılık/kiralık/devir), tarih, adres, tutar, hizmet bedeli\n5. Müşteri bilgilerini gir: ad soyad, TC kimlik no (11 hane), telefon, e-posta\n6. Belgeleri yükle: tapu (satılıkta), kontrat (PDF, tüm sayfalar), fatura (varsa)\n7. Müşteri memnuniyeti: Evet / Hayır / Bekliyor\n8. "Kapanışı Kaydet"\n\nDikkat: Kıbrıs işlemlerinde adrese mutlaka "Kıbrıs" yaz. Hizmet bedelleri KDV dahil. Ortak kapanışlarda her danışman kendi payını ayrı girer. TC 11 hane, checksum doğrulamalı. Telefon formatı: 0 (5XX) XXX XX XX.',k:['formu','kapandığında','kim','temsil','soyad','tc','kullanım','haneli','her','dogusremax','kiralama','ne','sahibi','alıcı','tarafı','doldur','devam','github','pin','mülk','kisi','müşteri','ettiğini','tarih','io','kiracı','kendi','kodunu','şlem','altına']},
{t:'Matbu Evraklar',c:'### Matbu Evraklar\nLink: dogusremax.github.io/matbu-evraklar\n\nNe işe yarar: Yetki sözleşmesi, kira kontratı, alım-satım sözleşmesi gibi standart evrakları dijital doldurur, yazdırırsın.\n\nKullanım:\n1. PIN ile giriş yap\n2. Evrak türünü seç (satılık yetki, kiralık yetki, kira sözleşmesi, alım-satım vs.)\n3. Formdaki alanları doldur (müşteri bilgileri, mülk bilgileri, tarih)\n4. Önizleme yap, kontrol et\n5. Yazdır veya PDF olarak kaydet\n\niPhone\'da PDF alma: Alt taraftaki paylaş butonuna dokun > "Dosyalara Kaydet" veya WhatsApp/Mail ile gönder. Uygulama her A4 sayfayı ayrı canvas olarak oluşturur.\n\nEğitim Videoları (Her evrak için nasıl doldurulur — video anlatım):\nDrive klasörü: drive.google.com/drive/folders/1b0aml89VHSGEGhiNGrJ8IgIGqFk9owsB\n- Yetki Belgesi nasıl doldurulur (video)\n- Kira Kontratı nasıl doldurulur (video)\n- Alım Satım Sözleşmesi nasıl doldurulur (video)\n- Kiralık Teklif Yazısı nasıl doldurulur (video)\n- Emlak Teklif Belgesi Rehberi (video)\n- Yer Gösterme Formu nasıl doldurulur (video)\n- Eş Rızası belgesi nasıl doldurulur (video)\n- Drive Kullanımı rehberi (video)\n\nBir evrakı nasıl dolduracağını bilmiyorsan önce ilgili videoyu izle, sonra uygulamadan doldur.',k:['evrak','vs','dijital','yazdır','da','alt','dosyal','pdf','sözleşmesi','kullanım','dokun','iphone','dogusremax','yetki','kaydet','ne','doldur','satım','giriş','github','pin','ile','matbu','müşteri','mülk','doldurur','io','formdaki','kira','işe']},
{t:'Müşteri Takip (Kayıt)',c:'### Müşteri Takip (Kayıt)\nLink: dogusremax.github.io/musteri-takip\n\nNe işe yarar: Gelen müşterileri kaydeder, takip notları ekler, müşteri durumunu yönetirsin.\n\nKullanım:\n1. PIN ile giriş yap\n2. "Yeni Müşteri" butonuna bas\n3. Bilgileri doldur: ad soyad, telefon, müşteri tipi (mülk sahibi/alıcı/kiracı), emlak tipi, bölge, bütçe, m², oda sayısı, iletişim tercihi\n4. Nöbetçi olup olmadığını işaretle\n5. Kaydet\n6. Takip notu eklemek için müşteri kaydına gir > "Takip Ekle": kategori (Aradım/WhatsApp/Diğer), detay, sonraki adım\n\nNöbetçi olduğun gün gelen müşteriler otomatik sana atanır.',k:['için','soyad','tercihi','telefon','kullanım','dogusremax','ekler','kaydet','ne','doldur','sahibi','giriş','kaydına','müşteri','github','pin','ile','durumunu','mülk','emlak','bas','io','kiracı','nöbetçi','olup','işe','kategori','ekle','yeni','olmadığını']},

{t:'Portföy Takip',c:'### Portföy Takip\nLink: dogusremax.github.io/portfoy-takip\n\nNe işe yarar: Portföylerini yönetirsin. Veriler remax.com.tr\'den 6 saatte bir otomatik senkronize olur.\n\nKullanım: PIN ile giriş > portföylerini gör > yeni ekle veya düzenle. RemaxID anahtarıyla yönetim. Broker tümünü görür, danışmanlar kendi portföyünü yönetir.',k:['düzenle','saatte','kullanım','gör','portföy','dogusremax','ne','yönetim','giriş','github','tr','pin','ile','görür','io','bir','kendi','portfoy','tümünü','işe','ekle','senkronize','yeni','anahtarıyla','portföylerini','veya','yönetir','yarar','broker','portföyünü']},

{t:'Kıbrıs Katalog (Döveç ve Diğerleri)',c:'### Kıbrıs Katalog (Döveç ve Diğerleri)\nLink: Apps Script üzerinden çalışır — linki Umut\'tan al.\n\nNe işe yarar: Kuzey Kıbrıs projelerini müşteriye sunarsın. Döveç, Cyprus Constructions, Northernland.\n\nKullanım:\n1. Geliştirici seç\n2. Projeleri filtrele (tip: 1+1, 2+1, villa vs.)\n3. Proje detayı: fotoğraf, plan, fiyat\n4. Ödeme planı hesaplayıcısı — geliştirici bazında taksit planı\n5. WhatsApp ile müşteriye paylaş\n\nWhatsApp rehberi: kisa.link/YRQLo\nSunum öncesi: Katalogdan incele, müşteri bütçesine uygun 2-3 proje seç, ödeme planını hazırla.',k:['vs','umut','döveç','plan','filtrele','kullanım','üzerinden','kisa','bütçesine','diğerleri','script','constructions','ne','müşteri','ile','taksit','sunum','tip','cyprus','çalışır','işe','hesaplayıcısı','sunarsın','yrqlo','detayı','tan','projelerini','katalog','incele','kuzey']},

{t:'Nöbet Takvimi Nasıl Takip Edilir',c:'### Nöbet Takvimi Nasıl Takip Edilir\nNöbet takvimi Google Calendar\'da paylaşılmıştır:\n1. Google Takvim uygulamasını aç\n2. Sol menüden (☰) takvimleri gör\n3. "Nöbet" takviminin yanındaki kutu işaretli olsun\n4. Kendi nöbet günlerini takvimde görebilirsin\n5. Bildirimler açıksa nöbet günün geldiğinde telefonuna uyarı gelir\n\nNöbet döngüsü: 7 kişi (Gamze → Gizem → İrem → Orhan → Evşen → Özlem → Alpay). 23 Temmuz 2026 = Gamze. Hafta sonları yok. Aysun nöbet dışı.\n\nNöbet değişikliği: Kendi yerine birini bul, Umut\'a bildir.\n\n\n## SÖZLEŞME VE KONTRAT BİLGİLERİ',k:['gamze','değişikliği','da','rem','evşen','döngüsü','yanındaki','gör','gelir','uyarı','temmuz','sol','orhan','yerine','takvim','nasıl','hafta','işaretli','takvimde','kutu','kendi','geldiğinde','takvimi','yok','takvimleri','google','alpay','edilir','paylaşılmıştır','sonları']},
{t:'Satılık Yetkilendirme Sözleşmesi (8 Madde)',c:'### Satılık Yetkilendirme Sözleşmesi (8 Madde)\n1. KONU: Mal Sahibi, UMT GROUP\'u (RE/MAX DOĞUŞ) gayrimenkulün satışına aracılık etmek üzere yetkilendirir.\n2. TANITIM YETKİSİ: RE/MAX DOĞUŞ masrafı kendisine ait olmak üzere pazarlama hakkına sahiptir. Mal sahibi gayrimenkule daima giriş imkânı tanımayı kabul eder.\n3. MÜLK SAHİBİ YÜKÜMLÜLÜKLERİ: Afiş/tabela izni, hukuki engelleri bildirme, gelen başvuruları RE/MAX DOĞUŞ\'a yönlendirme. Bildirmeden satarsa hizmet bedelinin 2 katını öder.\n4. SÜRE: Belirlenen başlangıç tarihinde yürürlüğe girer. 1 ay önce yazılı bildirim yapılmazsa otomatik uzar.\n5. SÜRENİN BİTİMİ: Yetki süresinde RE/MAX DOĞUŞ\'un bulduğu kişilerle 180 gün içinde RE/MAX DOĞUŞ onayı olmadan satış yapılamaz. Aksi halde %4+KDV hizmet bedeli doğar.\n6. VAZGEÇME: Tek taraflı feshedilemez. Mal sahibi feshederse %4+KDV tellaliye ücreti öder.\n7. ZİLYETLİK: Yetkisiz imza durumunda tüm zararlar + %4+KDV tazmin edilir.\n8. TARAFLAR: 8 madde, 2 asıl nüsha. İstanbul Anadolu Mahkemeleri yetkili.\n\nHizmet bedeli: Satış bedelinin %2 + KDV',k:['eder','re','engelleri','max','izni','umt','sözleşmesi','öder','kendisine','yetki','imkânı','yetkilendirir','sahibi','mal','si','kabul','yükümlülükleri','giriş','aracılık','başvuruları','mülk','yetkilendirme','tabela','gayrimenkulün','hukuki','bildirmeden','sahi','satarsa','bildirme','gayrimenkule']},
{t:'Kiralık Yetkilendirme Sözleşmesi (8 Madde)',c:'### Kiralık Yetkilendirme Sözleşmesi (8 Madde)\nSatılık ile aynı yapıda, farklılıklar:\n- Hizmet bedeli: 1 aylık kira bedeli + KDV\n- Vazgeçme tazminatı: 2 aylık kira + KDV',k:['ile','satılık','yetkilendirme','aynı','farklılıklar','vazgeçme','hizmet','kiralık','sözleşmesi','yapıda','kdv','bedeli','kira','tazminatı','madde','aylık']},
{t:'Gayrimenkul Alım Satım Sözleşmesi (10 Madde)',c:'### Gayrimenkul Alım Satım Sözleşmesi (10 Madde)\n1. Satıcı belirlenen bedelle satmayı, alıcı almayı kabul eder.\n2. Cayma tazminatı tutanak karşılığında alınır, UMT GROUP yediemin olarak tutar. Minimum satış tutarının %5\'i.\n3. Kalan bedel satış işlemlerinde alıcı tarafından ödenir.\n4. Satış belirtilen tarihe kadar yapılacaktır; yapılmaması cayma sayılır.\n5. TBK 178: Alıcı vazgeçerse cayma tazminatı iade edilmez (satıcıya verilir). Satıcı vazgeçerse cayma iade + aynı tutarda tazminat öder.\n6. Satıcı aidat, vergi, fatura borçlarını ödeyerek borçsuz teslim eder.\n7. Emlak vergisi satış öncesi satıcı tarafından ödenir.\n8. Hizmet bedeli: %2+KDV, alıcı ve satıcıdan ayrı ayrı. Vazgeçen taraf %4+KDV öder.\n9. Tapudaki bedel ne olursa olsun sözleşmedeki bedel geçerlidir.\n10. 3 asıl nüsha. İstanbul Anadolu Ticaret Mahkemeleri yetkili.',k:['eder','yapılmaması','umt','sözleşmesi','öder','kabul','karşılığında','satmayı','satım','yediemin','tutanak','tutarda','aynı','işlemlerinde','tarafından','ödenir','satıcıya','alınır','satıcı','belirlenen','cayma','tarihe','tazminatı','minimum','kadar','satı','olarak','bedelle','kalan','alım']},
{t:'Kira Sözleşmesi Önemli Maddeleri',c:'### Kira Sözleşmesi Önemli Maddeleri\n- Mecur sadece kiracının/ailesinin kullanımına tahsis edilir; devir, temlik, alt kiralama yapılamaz.\n- Kiracı aidat, su, elektrik, doğalgaz, internet borçlarını zamanında öder.\n- Abonelikler 1 ay içinde kiracı adına yaptırılır.\n- Deprem/yangın sigortası mal sahibi, eşya sigortası kiracı sorumluluğunda.\n- Kira artışı: Her yıl TÜFE 12 aylık ortalaması oranında.\n- 2 ay ödenmeme + yazılı ihtar sonrası 2 iş günü ödenmezse tüm kira muaccel olur ve tahliye sebebidir.\n- Süre bitiminden 60 gün önce bildirilmezse aynı koşullarla 1 yıl uzar.\n- Damga vergisi ve harçlar kiracıya aittir.\n- Depozito: Genellikle 1 aylık kira. Kiraya mahsup edilemez. Tahliyede borç/hasar yoksa güncel kira bedeli üzerinden iade.\n- Mal sahibi izni olmadan tadilat yapılamaz.\n\n---\n\n## DANIŞMAN HESAP BİLGİLERİ\n\n- İrem Aleyna Tetik: TR51 0006 2000 7690 0006 6306 61 (Garanti)\n- Gamze Yetkin: TR52 0006 7010 0000 0051 8574 96 (Yapı Kredi)\n- Özlem Varol: TR33 0006 4000 0011 0254 4304 15 (İş Bankası Göztepe)\n- Ayşegül Alpay: TR54 0006 4000 0011 1010 5106 99 (İş Bankası Göztepe)\n- Leman Özlem Özgür: TR63 0006 2000 4220 0006 8866 11 (Garanti)\n\nŞirket (Kaparo) Hesabı:\nBanka: NPara\nIBAN: TR54 0015 7000 0000 0127 9656 20\nHesap Sahibi: UMT GROUP Gayrimenkul Yatırım ve Danışmanlık İnş.San.Tic.Ltd.Şti\nNOT: Kaparo alındığında bu hesaba yatırılır. Müşteriye bu IBAN ve hesap sahibi bilgisi verilir.\n\n---\n\n## GENEL BİLGİLER',k:['maddeleri','sonrası','sorumluluğunda','alt','ailesinin','zamanında','ortalaması','sözleşmesi','sigortası','kiracının','su','öder','her','iş','eşya','tahsis','kiralama','sahibi','mal','kullanımına','yangın','tüfe','tahliye','artışı','sebebidir','muaccel','oranında','önemli','yazılı','kiracı']},
{t:'Tüm Uygulamalara Giriş',c:'### Tüm Uygulamalara Giriş\nTüm uygulamalarda 4 haneli PIN ile giriş yapılır. PIN\'ini bilmiyorsan veya çalışmazsa Umut\'a sor.\nTelefonda uygulamayı "Ana ekrana ekle" ile kısayol yapabilirsin, her seferinde link aramana gerek kalmaz.',k:['aramana','kısayol','umut','haneli','her','seferinde','ini','giriş','pin','ile','sor','ekrana','uygulamalara','ekle','veya','yapabilirsin','uygulamayı','link','gerek','bilmiyorsan','tüm','ana','uygulamalarda','telefonda','yapılır','kalmaz','çalışmazsa']},

{t:'Danışman Adayı Yönlendirme (Arkadaşım Danışman Olmak İstiyor)',c:'### Danışman Adayı Yönlendirme (Arkadaşım Danışman Olmak İstiyor)\nBir tanıdığın, arkadaşın veya çevrenden biri RE/MAX Doğuş\'ta danışman olmak istiyorsa:\n1. Önce yenifikirtepeburada.com sitesindeki kariyer sayfasını paylaş: yenifikirtepeburada.com/kariyer.html\n2. Aday formu doldursun ve bilgileri incelesin\n3. Ardından Umut Bey ile görüştür — Umut Bey adayla birebir tanışma görüşmesi yapar\n4. Umut Bey uygun görürse süreç başlar (oryantasyon, Power Start eğitimi vs.)\n\nDanışmana söylenecek: "Kariyer sayfamızı paylaş, sonra beni aramasını söyle. Ben kendisiyle tanışayım."\n\n---\n\n## KAPARO SÜRECİ\n\nKaparo alırken adımlar:\n1. Alıcı ve satıcı satış bedeli ve koşullar üzerinde anlaştıktan sonra cayma tazminatı (kaparo) alınır.\n2. Kaparo minimum satış tutarının %5\'i kadar olmalıdır.\n3. Kaparo tutarı tutanakla belgelenir — Gayrimenkul Alım Satım Sözleşmesi imzalanır.\n4. Kaparo UMT GROUP şirket hesabına yatırılır: NPara — TR54 0015 7000 0000 0127 9656 20\n5. UMT GROUP yediemin sıfatıyla parayı uhdesinde tutar.\n6. Alıcı vazgeçerse kaparo iade edilmez, satıcıya teslim edilir (TBK 178).\n7. Satıcı vazgeçerse kaparo alıcıya iade edilir + aynı tutarda tazminat ödenir.\n8. Müşteriye makbuz ve sözleşme nüshası verilir.\n\n---\n\n## TAPU DEVİR İŞLEMLERİ',k:['vs','re','danışman','tanıdığın','formu','umut','max','söylenecek','arkadaşım','birebir','html','aday','adayı','görüşmesi','ile','kariyer','tanışma','sitesindeki','oryantasyon','bir','ta','power','arkadaşın','süreç','adayla','yapar','yenifikirtepeburada','ardından','danışmana','olmak']},

{t:'Satıcıdan İstenen Evraklar',c:'### Satıcıdan İstenen Evraklar\n- Nüfus cüzdanı / kimlik kartı aslı ve fotokopisi\n- Tapu aslı ve fotokopisi\n- Belediyeden "emlak vergisi borcu yoktur" yazısı (rayiç bedel belgesi)\n- DASK poliçesi (konutlarda zorunlu — geçerli olmalı)\n- Vekaletname (vekil ile işlem yapılacaksa — noter onaylı)\n- 1 adet fotoğraf (artık zorunlu değil ama bazı müdürlükler isteyebilir)',k:['yazısı','noter','kartı','vekil','ama','belediyeden','dask','değil','vergisi','yoktur','nüfus','tapu','yapılacaksa','ile','bazı','emlak','belgesi','konutlarda','müdürlükler','satıcıdan','zorunlu','rayiç','cüzdanı','adet','evraklar','vekaletname','onaylı','aslı','fotokopisi','kimlik']},

{t:'Tapu Harcı',c:'### Tapu Harcı\n- Satış bedeli üzerinden %2 alıcıdan + %2 satıcıdan = toplam %4\n- Harç, tapu müdürlüğünde belirlenen bedel üzerinden hesaplanır\n- Döner sermaye bedeli ayrıca ödenir',k:['tapu','harcı','harç','sermaye','müdürlüğünde','ödenir','satıcıdan','hesaplanır','üzerinden','satış','belirlenen','alıcıdan','bedeli','bedel','döner','ayrıca','toplam']},
{t:'e-Devlet\'ten Takyidat Yazısı Alma (Adım Adım)',c:'### e-Devlet\'ten Takyidat Yazısı Alma (Adım Adım)\nTakyidat yazısı: Mülkün üzerinde ipotek, haciz, şerh, intifa gibi kısıtlama olup olmadığını gösteren belgedir. Satış öncesi mutlaka kontrol et.\n\n1. turkiye.gov.tr adresine git veya e-Devlet uygulamasını aç\n2. e-Devlet şifren, mobil imza veya kimlik kartıyla giriş yap\n3. Arama kutusuna "Tapu Bilgileri Sorgulama" yaz\n4. "Tapu ve Kadastro Genel Müdürlüğü — Tapu Bilgileri Sorgulama" seçeneğine tıkla\n5. Mülk sahibinin TC kimlik numarasıyla sorgulama yapılır (kendi mülklerin listelenir)\n6. İlgili mülkü seç\n7. "Takyidat Bilgileri" veya "Şerhler ve Beyanlar" bölümüne bak\n8. Burada ipotek, haciz, şerh, intifa, kira şerhi gibi bilgiler listelenir\n9. Sayfayı PDF olarak kaydet veya ekran görüntüsü al\n\nAlternatif yol — Tapu Müdürlüğü\'nden:\n1. Web Tapu (webtapu.tkgm.gov.tr) üzerinden başvuru yap\n2. Veya doğrudan tapu müdürlüğüne gidip takyidat belgesi talep et\n3. Tapu müdürlüğünden alınan belge resmi geçerliliğe sahiptir\n\nDikkat: e-Devlet\'ten sadece kendi üzerine kayıtlı mülkleri sorgulayabilirsin. Başka birinin mülkü için tapu müdürlüğüne başvurmak gerekir. Müşterinden kendi e-Devlet\'inden çekmesini iste veya birlikte tapu müdürlüğüne gidin.',k:['imza','yazısı','adım','mutlaka','tc','ten','üzerinde','şerh','belgedir','takyidat','haciz','devlet','giriş','tapu','tr','şifren','mülk','git','olup','gov','numarasıyla','arama','olmadığını','kısıtlama','gösteren','mobil','veya','adresine','sahibinin','yap']},
{t:'Belediyeden Rayiç Bedel Belgesi Alma (Adım Adım)',c:'### Belediyeden Rayiç Bedel Belgesi Alma (Adım Adım)\nRayiç bedel belgesi: Belediyenin belirlediği mülk değerini gösteren belgedir. Tapu devri için zorunludur — belediyeye emlak vergisi borcu olmadığını da gösterir.\n\nYüz yüze başvuru:\n1. Mülkün bulunduğu belediyeye git (Kadıköy Belediyesi, Üsküdar Belediyesi vs.)\n2. Emlak Vergisi / Gelirler Müdürlüğü birimine başvur\n3. Mülk sahibinin TC kimlik numarası ve mülk bilgilerini (ada, parsel) ver\n4. Belediye mülkün rayiç bedelini ve emlak vergisi borç durumunu gösteren belgeyi hazırlar\n5. Belgeyi al — tapu müdürlüğüne götür\n\nOnline başvuru (belediyeye göre değişir):\n1. İlgili belediyenin web sitesine git (ör: kadikoy.bel.tr)\n2. e-Belediye veya Online İşlemler bölümüne gir\n3. "Emlak Vergisi Sorgulama" veya "Rayiç Bedel Sorgulama" seçeneğini bul\n4. TC kimlik ve mülk bilgileriyle sorgula\n5. Bazı belediyeler belgeyi online olarak verir, bazıları bizzat gelmenizi ister\n\ne-Devlet üzerinden:\n1. turkiye.gov.tr\'ye giriş yap\n2. "Belediye Emlak Vergisi Borç Sorgulama" ara\n3. İlgili belediyeyi seç\n4. Borç durumunu gör (tüm belediyeler bu hizmeti sunmayabilir)\n\nDikkat: Rayiç bedel tapu harcı hesaplamasında kullanılır. Satış bedeli rayiç bedelden düşük gösterilemez. Belgenin güncel tarihli olması gerekir — genellikle son 15-30 gün içinde alınmış olmalı.',k:['vs','borç','için','zorunludur','yüze','da','adım','başvuru','tc','ver','belediyeden','devri','belgedir','başvur','ada','belirlediği','vergisi','yüz','üsküdar','tapu','mülk','değerini','birimine','emlak','belgesi','parsel','git','numarası','rayiç','belediyeye']},
{t:'Ekspertiz (Değerleme) Raporu ve Web Tapu\'dan Eksper Atama',c:'### Ekspertiz (Değerleme) Raporu ve Web Tapu\'dan Eksper Atama\n\nEkspertiz raporu ne zaman gerekir:\n- Alıcı konut kredisi kullanacaksa (banka zorunlu tutar)\n- Yabancıya satışlarda (yasal zorunluluk)\n- Miras paylaşımında adil değer tespiti için\n- Kamulaştırma süreçlerinde\n\nSürecin özeti:\n1. Alıcı bankaya kredi başvurusu yapar\n2. Banka bir eksper (SPK lisanslı değerleme uzmanı) atar\n3. Mülk sahibi Web Tapu üzerinden ekspere yetki verir\n4. Eksper mülkü yerinde inceler\n5. Rapor hazırlanır ve bankaya sunulur\n6. Banka rapora göre kredi limitini belirler\n\nWeb Tapu\'dan Ekspertiz Yetkisi Verme (Mülk Sahibi Yapacak):\n1. webtapu.tkgm.gov.tr adresine git\n2. e-Devlet şifresiyle giriş yap\n3. Sol menüden "Taşınmaz İşlemleri" seç\n4. Ekspertiz yetkisi vermek istediğin gayrimenkulü bul\n5. "Ekspertiz Yetki Verme" veya "Değerleme Yetki Ver" seçeneğine tıkla\n6. Yetki vereceğin bankayı seç — sistem otomatik olarak ilgili eksperi tanımlar\n7. Telefonuna gelen SMS doğrulama kodunu gir\n8. İşlemi onayla — karekodlu (barkodlu) yetki belgesi oluşur\n9. Bu belgeyi ekspere veya bankaya ilet\n\nAlternatif yol — Barkodlu belge:\n1. Web Tapu\'da gayrimenkullerini listele\n2. İlgili gayrimenkulün yanındaki "Yetki Ver" sütunundaki yeşil tike tıkla\n3. Karekodlu belge otomatik oluşur\n4. Bu belgeyi ekspere göster veya PDF olarak gönder\n\nYabancıya satışlarda değerleme raporu başvurusu:\n1. Web Tapu\'ya e-Devlet ile giriş yap\n2. Sol menüden "Değerlendirme İşlemleri" > "Değerleme Talep Et"\n3. Başvuruyu tamamla\n4. Talep durumu "Ödeme Bekliyor" olarak görünecek\n5. Ödemeyi banka aracılığıyla yap (Ziraat, Vakıfbank vs. — MKK/GABİM ödemesi olarak)\n6. Ödeme sonrası eksper atanır ve süreç başlar\n\nEkspertiz sürecinde danışmanın rolü:\n- Müşteriye süreci açıkla ve yönlendir\n- Mülk sahibinden Web Tapu üzerinden yetki vermesini iste\n- Eksper randevusu için mülke erişim sağla (anahtar, randevu ayarla)\n- Eksper geldiğinde mülkte hazır bulun (zorunlu değil ama profesyonel görünür)\n- Rapor sonucunu takip et ve müşteriye bildir\n\nEkspertiz ücreti (2026 ortalaması): Yaklaşık 15.000-25.000 TL arası (mülk tipi ve büyüklüğüne göre değişir). Ücreti genellikle alıcı (kredi kullanan) öder.\n\nDikkat: Ekspertiz değeri satış fiyatından düşük çıkarsa banka daha az kredi verir. Bu durumda alıcı aradaki farkı peşinat olarak karşılamalı. Müşterini önceden bilgilendir.',k:['spk','için','banka','tespiti','raporu','kredisi','üzerinden','değerleme','değer','yetki','hazırlanır','ne','sahibi','adil','kredi','verir','tapu','mülk','bankaya','yabancıya','zaman','kullanacaksa','sürecin','web','konut','bir','zorunlu','uzmanı','mülkü','miras']},
{t:'Gün İçi Süreç',c:'### Gün İçi Süreç\n1. Randevu saatinde alıcı ve satıcı (veya vekilleri) tapu müdürlüğünde hazır bulunur\n2. Tapu memuru belgeleri kontrol eder, satış bedeli ve harçları doğrular\n3. Kimlik tespiti yapılır\n4. Taraflar resmi senedi imzalar\n5. Tapu memuru yeni durumu tescil eder\n6. Yeni tapu belgesi alıcıya teslim edilir\n7. İşlem genellikle aynı gün tamamlanır',k:['eder','genellikle','tespiti','çi','taraflar','randevu','tapu','aynı','belgesi','imzalar','resmi','satıcı','tescil','süreç','şlem','bedeli','belgeleri','yapılır','yeni','edilir','veya','vekilleri','satış','durumu','memuru','tamamlanır','kimlik','müdürlüğünde','senedi','kontrol']},
{t:'Devir Sonrası Yapılacaklar (Alıcıya hatırlat)',c:'### Devir Sonrası Yapılacaklar (Alıcıya hatırlat)\n- DASK poliçesini kendi adına güncelle\n- Elektrik, su, doğalgaz aboneliklerini devral\n- Belediyeye emlak vergisi bildirimi yap\n- Aidat ödemelerini yönetime bildir\n\n---\n\n## DEĞERLEME NASIL YAPILIR',k:['sonrası','dask','su','değerleme','vergisi','devral','emlak','kendi','doğalgaz','poliçesini','güncelle','belediyeye','hatırlat','yapılacaklar','elektrik','yönetime','yap','bildirimi','nasil','adına','bildir','ödemelerini','alıcıya','aboneliklerini','aidat','yapilir','devir']},
{t:'Temel Yöntem: Emsal Karşılaştırma',c:'### Temel Yöntem: Emsal Karşılaştırma\n1. Aynı bölgede son 3-6 ayda satılmış benzer mülkleri araştır\n2. Satışta olan rakip mülkleri listele\n3. Satılamayan (uzun süredir piyasada olan) mülkleri not et\n4. Bu üç veriyle fiyat aralığı belirle',k:['karşılaştırma','yöntem','mülkleri','emsal','üç','aynı','süredir','son','satışta','benzer','ayda','temel','bölgede','olan','araştır','rakip','bu','listele','belirle','aralığı','et','satılamayan','veriyle','fiyat','uzun','satılmış','piyasada','not']},
{t:'Dikkat Edilecek Kriterler',c:'### Dikkat Edilecek Kriterler\n- Konum (cadde/sokak, ulaşım, çevre)\n- m² (net ve brüt alan)\n- Kat (yüksek katlar genellikle daha değerli)\n- Cephe (güney ve batı cepheler tercih edilir)\n- Manzara (deniz, şehir, yeşil alan)\n- Bina yaşı ve yapı kalitesi\n- Isınma sistemi (merkezi, kombi, yerden ısıtma)\n- Otopark ve güvenlik\n- Site içi sosyal tesisler\n- İmar durumu ve kat irtifakı/mülkiyeti\n- Aidat miktarı\n- Krediye uygunluk',k:['brüt','otopark','genellikle','yerden','batı','yaşı','konum','alan','uygunluk','sokak','miktarı','cepheler','krediye','çevre','site','ulaşım','kombi','net','içi','kalitesi','güney','güvenlik','kriterler','manzara','yeşil','edilir','bina','tesisler','ısıtma','daha']},
{t:'Değerleme Uygulaması',c:'### Değerleme Uygulaması\nRE/MAX Değerleme uygulamasını kullan (dogusremax.github.io/remax-de-erleme). Sohbet sihirbazı ile mülk bilgilerini gir, otomatik rapor oluştur. 7 slaytlık PPTX çıktı alabilirsin.',k:['re','max','oluştur','dogusremax','erleme','değerleme','çıktı','github','ile','mülk','alabilirsin','io','kullan','rapor','slaytlık','gir','sihirbazı','uygulamasını','de','pptx','otomatik','uygulaması','sohbet','remax','bilgilerini']},
{t:'Fiyat Sunumu İpuçları (Power Start\'tan)',c:'### Fiyat Sunumu İpuçları (Power Start\'tan)\n- Fiyat analizini nasıl yaptığını müşteriye açıkla\n- Emsal verileri sunmadan önce müşterinin fiyat beklentisini yorumlama\n- "Rakip" kavramını kullan: "Evinize bakabilecek alıcıların bakabileceği diğer mülklere rakip denir"\n- Satışta olan, satılamayan ve satılmış emsal verileriyle fiyat aralığını birlikte inceleyin',k:['diğer','açıkla','bakabileceği','denir','aralığını','mülklere','inceleyin','emsal','beklentisini','nasıl','yaptığını','bakabilecek','evinize','kavramını','power','alıcıların','puçları','satışta','kullan','tan','sunmadan','olan','yorumlama','birlikte','verileri','rakip','verileriyle','sunumu','start','analizini']},
{t:'Yapay Zeka ile Mülk Değerlemesi (ChatGPT / Gemini)',c:'### Yapay Zeka ile Mülk Değerlemesi (ChatGPT / Gemini)\n\nYapay zekayı değerleme asistanı olarak kullanabilirsin. Emsal araştırması, rapor yazımı ve fiyat analizi için çok güçlü bir araç.\n\nAdım 1 — Emsal Araştırması:\nChatGPT veya Gemini\'ye şunu yaz:\n"Fikirtepe, Kadıköy, İstanbul bölgesinde 2+1, 85 m², 10. kat, sıfır daire için emsal fiyat analizi yap. Benzer projelerde (Yenifikirtepe, Nuhoğlu, Şua) son dönem satış fiyatlarını ve m² birim fiyatlarını karşılaştır."\n\nAdım 2 — Mülk Değerleme Raporu:\n"Şu mülk için profesyonel bir değerleme raporu hazırla:\n- Konum: Dumlupınar Mah., Yenifikirtepe 6. Etap B Blok\n- Tip: 2+1 daire, 85 m² net\n- Kat: 12/20\n- Bina yaşı: Sıfır (2026 teslim)\n- Cephe: Güney-Batı, Çamlıca manzaralı\n- Isınma: Merkezi\n- Otopark: Kapalı\n- Site: Havuz, spor salonu, güvenlik\n- Aidat: 4.500 TL/ay\nEmsal karşılaştırma yöntemiyle fiyat aralığı öner. SWOT analizi ekle. Raporu müşteriye sunulacak profesyonel formatta yaz."\n\nAdım 3 — Kira Getirisi Hesaplama:\n"Bu mülkün kira değerlemesini yap. Bölgedeki benzer dairelerin aylık kira fiyatlarını araştır, yıllık brüt ve net kira getiri oranını hesapla."\n\nAdım 4 — Karşılaştırmalı Tablo:\n"Aynı bölgede 3 farklı projeyi karşılaştıran bir tablo oluştur: proje adı, m² fiyatı, toplam fiyat, teslim tarihi, ödeme koşulları, avantajlar/dezavantajlar."\n\nİpuçları:\n- Sahibinden, hepsiemlak gibi sitelerden güncel fiyatları toplayıp ChatGPT\'ye ver — daha doğru analiz yapar\n- Tapu kayıtlarındaki gerçek satış fiyatlarını kullan (varsa)\n- AI çıktısını mutlaka kendi bilginle kontrol et — piyasa bilgin her zaman AI\'dan daha günceldir\n- Raporu müşteriye gönderirken RE/MAX Doğuş logosu ve danışman bilgini ekle\n\n---\n\n## NOTEBOOKLM KULLANIM REHBERİ',k:['zekayı','gemini','için','adım','raporu','yazımı','chatgpt','değerleme','zeka','şunu','sıfır','emsal','mülk','ile','araç','bir','ye','son','nuhoğlu','bölgesinde','benzer','rapor','olarak','fiyatlarını','değerlemesi','veya','birim','araştırması','kullanabilirsin','yapay']},
{t:'NotebookLM Nedir?',c:'### NotebookLM Nedir?\nGoogle\'ın geliştirdiği ücretsiz yapay zeka asistanı. Yüklediğin belgeleri analiz eder, özetler, rapor oluşturur, sunum hazırlar ve hatta podcast formatında sesli özet üretir. Önemli farkı: sadece senin yüklediğin kaynaklara dayalı çalışır, uydurma bilgi riski düşük.',k:['eder','dayalı','riski','özet','zeka','analiz','bilgi','oluşturur','hatta','notebooklm','önemli','yüklediğin','geliştirdiği','sunum','senin','çalışır','ın','özetler','belgeleri','nedir','google','rapor','üretir','yapay','düşük','sadece','farkı','kaynaklara','hazırlar','uydurma']},
{t:'NotebookLM\'e Giriş',c:'### NotebookLM\'e Giriş\n1. notebooklm.google.com adresine git\n2. Google hesabınla giriş yap (ücretsiz)\n3. "Yeni Notebook Oluştur" butonuna tıkla\n4. Kaynaklarını yükle: PDF, Google Docs, web sitesi (URL), YouTube videosu, metin',k:['notebook','oluştur','pdf','sitesi','ücretsiz','giriş','kaynaklarını','git','web','url','google','yeni','adresine','yükle','yap','metin','tıkla','com','youtube','hesabınla','butonuna','videosu','notebooklm','docs']},
{t:'Gayrimenkul İçin Kullanım Alanları',c:'### Gayrimenkul İçin Kullanım Alanları\n\nDeğerleme raporu hazırlama:\n1. Emsal verileri içeren dosyalarını (PDF, Excel tablosu, ekran görüntüleri) NotebookLM\'e yükle\n2. Bölge hakkındaki haberleri, imar planlarını, proje broşürlerini ekle\n3. Sor: "Bu kaynaklara göre Fikirtepe bölgesinde 2+1 daire için fiyat analizi yap ve müşteriye sunulacak bir değerleme raporu oluştur"\n4. NotebookLM tüm kaynaklarını analiz edip rapor üretir\n\nMüşteri sunumu hazırlama:\n1. Proje broşürlerini, fiyat listelerini, fotoğrafları NotebookLM\'e yükle\n2. Sor: "Bu projenin avantajlarını ve yatırım getirisini anlatan bir sunum metni hazırla"\n3. "Slide Deck" özelliğiyle otomatik sunum slaytları oluştur (Studio bölümünden)\n\nBölge analiz raporu:\n1. Fikirtepe kentsel dönüşüm haberleri, imar planları, belediye raporlarını yükle\n2. Sor: "Bu kaynaklara göre Fikirtepe\'nin 5 yıllık değer artış potansiyelini analiz et"\n3. Sonucu müşteriye gönder',k:['için','edip','raporu','oluştur','ekran','pdf','kullanım','planlarını','değerleme','hakkındaki','analiz','emsal','çin','kaynaklarını','müşteri','dosyalarını','sor','bir','bölgesinde','excel','ekle','içeren','sunulacak','rapor','tablosu','imar','alanları','yükle','proje','üretir']},
{t:'NotebookLM\'in Temel Özellikleri',c:'### NotebookLM\'in Temel Özellikleri\n\nSoru-Cevap: Yüklediğin belgelere sorular sor, kaynağa dayalı cevap alırsın. Her cevabın altında hangi belgeden geldiğini gösterir.\n\nRapor Oluşturma: Sağ panelde "Rapor Oluştur" seçeneğiyle farklı formatlarda raporlar üret:\n- Çalışma kılavuzu\n- Blog yazısı\n- Brifing belgesi\n- Teknik inceleme\n- "Kendiniz oluşturun" ile kendi formatını belirle\n\nSlide Deck (Sunum Oluşturma): Studio bölümünden otomatik sunum slaytları oluştur. Görseller, grafikler ve metin blokları otomatik düzenlenir. Slaytları düzenleyebilir, gereksiz kısımları kaldırabilirsin.\n\nAudio Overview (Sesli Özet / Podcast): Studio bölümünden "Audio Overview" seç. İki yapay ses arasında geçen doğal podcast formatında sesli özet üretir. 15-25 dakika arası. MP3 olarak indirebilirsin. Müşteriye dinlettirmek veya kendi bilgini tazelemek için harika.\n\nİnfografik: Verilerini görsel infografik formatına dönüştürür. Sosyal medyada paylaşmak veya müşteriye göndermek için kullanışlı.',k:['dayalı','oluşturun','yazısı','bölümünden','oluştur','farklı','her','görseller','oluşturma','inceleme','slide','altında','ile','slaytları','kılavuzu','belgesi','formatını','panelde','üret','bloklar','cevap','yüklediğin','sor','blog','teknik','kendi','sunum','çalışma','sorular','gösterir']},
{t:'NotebookLM Pratik İpuçları',c:'### NotebookLM Pratik İpuçları\n- Net ve spesifik sorular sor: "Bu rapordaki m² fiyatları neler?" > "Bu belge ne diyor?"\n- Birden fazla kaynak yükle — NotebookLM kaynaklar arası bağlantı kurar\n- Türkçe kaynak yükleyebilir ve Türkçe soru sorabilirsin\n- Ücretsiz planda günlük 10 rapor limiti var — önemli raporlara öncelik ver\n- Slide Deck ücretsiz planda watermark ile gelir — profesyonel kullanım için Plus gerekebilir\n\n---\n\n## WHATSAPP BUSINESS KURULUMU',k:['raporlara','için','fiyatları','ver','kullanım','gelir','ne','bağlantı','business','kurulumu','ücretsiz','slide','diyor','planda','ile','günlük','belge','kurar','gerekebilir','önemli','sor','fazla','net','birden','puçları','öncelik','watermark','var','sorular','arası']},
{t:'Neden WhatsApp Business?',c:'### Neden WhatsApp Business?\nNormal WhatsApp\'tan farkı: işletme profili (adres, çalışma saatleri, web sitesi), otomatik karşılama mesajı, hızlı yanıtlar, etiketleme sistemi ve katalog özelliği. Müşteri gözünde profesyonel görünürsün.',k:['işletme','karşılama','sitesi','yanıtlar','business','müşteri','web','özelliği','çalışma','görünürsün','tan','katalog','whatsapp','neden','farkı','hızlı','normal','etiketleme','gözünde','otomatik','saatleri','sistemi','profesyonel','profili','adres','mesajı','ve']},

{t:'WhatsApp Grup Kurma',c:'### WhatsApp Grup Kurma\n\nYeni grup oluşturma:\n1. WhatsApp\'ı aç > sağ üstte "Yeni sohbet" veya kalem simgesi > "Yeni Grup"\n2. Gruba eklemek istediğin kişileri seç > "İleri"\n3. Grup adı yaz (ör: "RE/MAX Doğuş Ekip", "Fikirtepe 6. Etap Sakinleri", "Kıbrıs Yatırım")\n4. Grup fotoğrafı ekle (RE/MAX Doğuş logosu veya ilgili görsel)\n5. "Oluştur" bas\n\nGrup ayarları (Grup bilgisi ekranından):\n- Grup açıklaması: Grubun amacını yaz\n- Sadece yöneticiler mesaj atabilsin: Grup Ayarları > "Mesaj gönder" > "Yalnızca yöneticiler" (duyuru grubu için ideal)\n- Yeni üye ekleme yetkisi: Yalnızca yöneticiler veya herkes\n- Davet bağlantısı: "Bağlantıyla gruba davet" > linki paylaş (müşteri toplulukları için)\n\nEmlak için grup fikirleri:\n- Ofis ekip grubu (iç iletişim)\n- Bölge müşteri grubu (portföy duyuruları — sadece yönetici mesaj atar)\n- Proje bazlı grup (ör: Yenifikirtepe sakinleri)\n- Co-broke ortakları grubu',k:['re','max','oluştur','oluşturma','yaln','üstte','grubun','grup','yöneticiler','istediğin','mesaj','etap','görsel','gruba','bas','adı','kurma','leri','ilgili','açıklaması','ekle','yatırım','yeni','fotoğrafı','doğuş','veya','whatsapp','sağ','sadece','sakinleri']},
{t:'WhatsApp Toplu Mesaj (Yayın Listesi / Broadcast)',c:'### WhatsApp Toplu Mesaj (Yayın Listesi / Broadcast)\n\nYayın listesi nedir: Birden fazla kişiye aynı anda mesaj gönderirsin ama her kişi mesajı özel mesaj olarak alır — grup görmez, diğer alıcıları görmez. Müşteriye birebir gönderilmiş gibi görünür.\n\nYayın listesi oluşturma:\n1. WhatsApp > sağ üstte üç nokta (Android) veya "Yayın Listeleri" (iPhone)\n2. "Yeni yayın listesi" veya "Yeni liste"\n3. Göndermek istediğin kişileri seç (DİKKAT: Karşı tarafın senin numaranı kaydetmiş olması gerekir, yoksa mesaj ulaşmaz)\n4. "Oluştur" bas\n5. Listeye mesaj yaz, gönder — herkese aynı anda gider\n\nYayın listesi isimlendirme önerileri:\n- "Satılık Arayan Müşteriler"\n- "Kiralık Arayan Müşteriler"\n- "Mülk Sahipleri"\n- "Kıbrıs İlgilenenler"\n- "Yatırımcılar"\n\nToplu mesaj ipuçları:\n- Kişiselleştir: "Merhaba!" ile başla, genel bir selamlama yap\n- Sık gönderme: Haftada 1-2 kez yeterli, fazlası rahatsız eder\n- Değer ver: Sadece ilan paylaşma, bölge haberleri ve piyasa bilgileri de gönder\n- Görsel ekle: Metin + fotoğraf veya kısa video çok daha etkili\n- Müşterinin numaranı kaydetmesini sağla: İlk görüşmede "Sizi bilgilendirebilmem için numaramı kaydetmenizi rica edebilir miyim?" de\n\n---\n\n## LINKEDIN — NEDİR VE NASIL KURULUR',k:['diğer','numaranı','anda','me','tarafın','birebir','her','iphone','gönderilmiş','oluşturma','üstte','grup','gönderirsin','üç','aynı','istediğin','mesaj','toplu','kişiye','görmez','göndermek','fazla','birden','özel','senin','olması','kaydetmiş','alır','nedir','olarak']},
{t:'LinkedIn Nedir?',c:'### LinkedIn Nedir?\nProfesyonel iş ağı platformu. İş dünyasındaki insanlarla bağlantı kurar, profesyonel profilini sergiler, içerik paylaşırsın. Gayrimenkul danışmanı olarak kurumsal müşteriler, yatırımcılar ve iş ortakları bulmak için güçlü bir araç.',k:['için','sergiler','içerik','insanlarla','iş','kurumsal','linkedin','müşteriler','bağlantı','yatırımcılar','platformu','bulmak','araç','kurar','bir','dünyasındaki','profilini','nedir','olarak','ağı','gayrimenkul','ortakları','güçlü','danışmanı','profesyonel','paylaşırsın','ve']},

{t:'İç Gözlem (Daireye girince)',c:'### İç Gözlem (Daireye girince)\n- Oda sayısı ve m² (net ve brüt)\n- Kat / toplam kat sayısı\n- Cephe yönü (kuzey/güney/doğu/batı)\n- Manzara (ne görünüyor — Çamlıca, deniz, yeşil alan, bina)\n- Doğal ışık durumu (karanlık mı, aydınlık mı)\n- Zemin tipi (parke, seramik, laminat)\n- Duvar durumu (boyalı mı, lekeli mi, çatlak var mı)\n- Tavan yüksekliği\n- Mutfak tipi (açık/kapalı) ve dolap durumu\n- Banyo sayısı ve durumu (küvet/duşakabin, tesisat)\n- Balkon sayısı ve boyutu\n- Isınma sistemi (merkezi/kombi/klima/yerden ısıtma)\n- Kombi marka ve yaşı\n- Pencere tipi (PVC, alüminyum, ahşap) ve cam (tek/çift/ısıcam)\n- İç kapılar durumu\n- Elektrik tesisatı (priz sayısı, sigorta panosu)\n- Su basıncı (musluğu aç kontrol et)\n- Nem / rutubet belirtisi var mı (duvar köşeleri, banyo tavanı)\n- Böcek/haşere belirtisi',k:['brüt','gözlem','görünüyor','doğu','batı','aydınlık','zemin','parke','karanlık','çamlıca','lekeli','mutfak','alan','mi','ne','küvet','tavan','boyutu','daireye','kombi','net','duvar','açık','var','güney','manzara','yeşil','doğal','bina','duşakabin']},

{t:'MyREMAX SSS (Sıkça Sorulan Sorular)',c:'### MyREMAX SSS (Sıkça Sorulan Sorular)\nMyREMAX\'ta kapsamlı bir gayrimenkul bilgi bankası var. Danışmanlar şu konularda bilgiye ulaşabilir:\n\nTapu ve Hukuki Konular:\n- İfraz, tevhit, intifa hakkı, şufa hakkı, vefa hakkı, sükna hakkı, geçit hakkı\n- İktisap, yapı ruhsatı, iskân belgesi, kira şerhi, trampa\n- Cayma akçesi, teklif formu, ecrimisil\n- Tapu harcı, döner sermaye, hisse devri, cins tahsisi\n- Pembe ve mavi tapular arası fark\n- Takyidat belgesi nedir, nereden alınır\n- İntifa ve sükna arasındaki farklar\n- İntifalı/süknalı satışlarda tapu harçları\n- İzale-i şuyu davası ve süreci\n- Aile konutu şerhi\n- Çeşitli tapu tipleri ve açıklamaları\n- Tapu işlemlerinde gerekli evraklar\n- Takaslı (trampa) satışlarda tapu harcı\n- Kooperatif hisseli tapularda satış\n- Tarihi eser mülklerde tapu harcı\n- Hisseli mülklerde satış ve devir prosedürleri\n- Tapu başvurusu nasıl yapılır\n\nVergi ve Finansal Konular:\n- Gayrimenkuldeki vergiler (gelir vergisi, KDV, tapu harcı, stopaj)\n- Gelir vergisi hesaplaması\n- Kat karşılığı edinimde emlak kazanç vergisi\n- Veraset yoluyla edinilmiş mülkte gelir vergisi\n- Stopaj ile KDV farkı, brüt-net oranları\n- Ticari gayrimenkul satışlarında KDV avantajı\n- Tapudaki satış bedelinin döviz olarak ödenip ödenemeyeceği\n\nKredi ve Finansman:\n- Arsa tapulu yere kredi kullanımı\n- Kat mülkiyeti/irtifakında kredi çıkmaması durumları\n- Ticari mülk ve arsa için kredi oranları\n- İpotekli mülkte yeni alıcının kredi kullanması\n\nKiralama:\n- Yıllık kira zam oranı\n- Kiracı hakları ve tahliye süreci\n- Kiracılı mülk satışında dikkat edilecekler\n- Tahliye taahhütnamesi ne zaman alınmalı\n- Depozito güvence bedeli nasıl alınmalı\n\nMiras ve Veraset:\n- Veraset işlemine konu mülklerde süreç\n- Miras kalan gayrimenkullerin satışı\n- Evlenmeden önce edinilen mülklerde eş hakları\n- Evlilik sırasında kalan mirasta eş hakları\n\nYabancıya Satış:\n- Yabancı vatandaşların mülk edinim kuralları\n- Gerekli evraklar\n- Vatandaşlık işlemleri ve para transferi\n- Her gayrimenkul yabancıya satılabilir mi\n\nDiğer:\n- İmar planları okuma (renkler ve işaretler)\n- Parselde inşaat alanı hesaplama\n- Arsa payı hesaplama\n- Yetkilendirme sözleşmesinin yasal süreleri\n- Belediyeye emlak beyanı nasıl verilir\n- 65 yaş üstü resmi işlemlerde sağlık raporu\n- Satış sonrası yapılması gereken resmi işlemler\n\nBu soruların detaylı cevapları MyREMAX platformundaki SSS bölümünde mevcuttur. Detay için myremax.remax.com.tr > sol menü > K.G.B. veya SSS bölümüne bak.',k:['ktisap','akçesi','formu','şu','ecrimisil','hisse','fark','iskân','trampa','devri','takyidat','pembe','bilgi','şerhi','kapsamlı','bilgiye','tevhit','tapu','sermaye','ntifa','hakkı','belgesi','sıkça','bir','alınır','ta','hukuki','nereden','cayma','bankası']},

{t:'"Çok pahalı" / "Fiyatı yüksek"',c:'### "Çok pahalı" / "Fiyatı yüksek"\n- Empati kur: "Anlıyorum, önemli bir yatırım. Fiyatı neye göre yüksek bulduğunuzu sorabilir miyim?"\n- Emsal göster: "Aynı bölgede son 3 ayda satılan benzer daireler şu fiyatlarda kapandı..."\n- Değer analizi sun: m² bazında karşılaştır, mülkün farklılaştırıcı özelliklerini vurgula\n- Yatırım getirisi hesapla: "Bu mülk kiralandığında aylık X TL getiri sağlar, yıllık getiri oranı %Y"\n- Ödeme planı öner: "Satıcıyla vadeli ödeme planı konuşabiliriz"',k:['neye','konuşabiliriz','getirisi','sun','şu','daireler','farklılaştırıcı','değer','satıcıyla','fiyatlarda','miyim','öner','emsal','kapandı','pahalı','göster','aynı','mülk','oranı','önemli','bir','son','benzer','ayda','yatırım','anlıyorum','sorabilir','bölgede','özelliklerini','bazında']},
{t:'"Komisyon ödemek istemiyorum"',c:'### "Komisyon ödemek istemiyorum"\n- Hizmet değerini anlat: "Biz sadece kapı açmıyoruz. Fiyat analizi, pazarlama, hukuki süreç takibi, tapu işlemleri — tüm süreci profesyonelce yönetiyoruz"\n- Yasal dayanağı belirt: "Taşınmaz Ticareti Yönetmeliği gereği satışlarda %2+KDV, kiralamalarda 1 aylık kira+KDV hizmet bedeli uygulanır. Bu sektör standardıdır"\n- Güvence vurgula: "RE/MAX sistemiyle çalışmak size hukuki güvence sağlar. Yetki belge numaramız 3402699, tüm işlemler kayıt altında"\n- Risk hatırlat: "Komisyonsuz işlemlerde hukuki sorunlar, eksik evrak, dolandırıcılık riskleri çok daha yüksek"',k:['re','takibi','max','risk','ticareti','kdv','belirt','sektör','yetki','işlemleri','kapı','altında','tapu','değerini','yönetmeliği','belge','sistemiyle','açmıyoruz','standardıdır','hukuki','süreç','çalışmak','gereği','yönetiyoruz','kira','bedeli','hatırlat','size','istemiyorum','dayanağı']},
{t:'"Düşüneyim" / "Eşimle konuşayım"',c:'### "Düşüneyim" / "Eşimle konuşayım"\n- Kabul et ama takip planı kur: "Tabii ki, bu önemli bir karar. Ne zaman tekrar konuşabiliriz?"\n- Aciliyet oluştur (doğal): "Bu mülke başka ilgilenenler de var, size en güncel bilgiyi vermek isterim"\n- Engeli anla: "Düşünmeniz gereken spesifik bir konu var mı? Belki beraber çözüm bulabiliriz"\n- Takip zamanlaması: 2-3 gün sonra nazikçe ara, yeni bir bilgiyle (fiyat güncellemesi, yeni emsal satış)',k:['konuşabiliriz','başka','gereken','engeli','oluştur','sonra','en','mülke','ne','kabul','bulabiliriz','emsal','belki','zamanlaması','zaman','bilgiyle','ilgilenenler','önemli','bir','ki','ara','isterim','karar','aciliyet','var','bilgiyi','size','beraber','yeni','doğal']},
{t:'"Lokasyonu beğenmedim"',c:'### "Lokasyonu beğenmedim"\n- Bölge avantajlarını sun: ulaşım hatları, metro/metrobüs mesafesi, okul/hastane yakınlığı\n- Gelecek projelerden bahset: yeni metro hattı, kentsel dönüşüm, AVM/park projeleri\n- Değer artışı verisi paylaş: "Bu bölgede son 2 yılda %X değer artışı yaşandı"\n- Alternatif öner: "Kriterlerin arasından şu bölgede de seçeneklerimiz var"\n- Fikirtepe özelinde: kentsel dönüşüm avantajı, merkezi konum, E-5 ve Marmaray erişimi',k:['park','seçeneklerimiz','sun','avm','şu','konum','metrobüs','değer','bahset','avantajlarını','metro','dönüşüm','projelerden','hattı','kentsel','artışı','öner','gelecek','mesafesi','ulaşım','erişimi','son','marmaray','var','beğenmedim','yeni','verisi','bölgede','kriterlerin','bu']},
{t:'"Başka emlakçıyla da görüşeceğim"',c:'### "Başka emlakçıyla da görüşeceğim"\n- Profesyonel karşıla: "Tabii ki karşılaştırma yapmanız çok doğru"\n- Farkını göster: "Biz size fiyat analizi, profesyonel pazarlama planı ve RE/MAX\'in global ağını sunuyoruz"\n- Referans ver: "Bölgedeki son kapanışlarımızı ve müşteri memnuniyetimizi paylaşabilirim"',k:['karşılaştırma','başka','re','global','da','max','memnuniyetimizi','ver','kapanışlarımızı','emlakçıyla','müşteri','göster','görüşeceğim','referans','ki','son','size','in','yapmanız','farkını','tabii','çok','bölgedeki','doğru','analizi','sunuyoruz','karşıla','profesyonel','paylaşabilirim','fiyat']},
{t:'"Kendi başıma satarım/kiralarım"',c:'### "Kendi başıma satarım/kiralarım"\n- Süre hatırlat: "Sahibinden satışlar ortalama 2-3 kat daha uzun sürer"\n- Pazarlama gücü: "Biz remax.com.tr, sahibinden, hepsiemlak ve tüm portallarda eş zamanlı yayınlıyoruz + sosyal medya reklamı"\n- Güvenlik: "Evinizdeki tanımadığınız kişilerin güvenlik riskini profesyonel süreçle ortadan kaldırıyoruz"\n- Fiyat avantajı: "Doğru fiyatlandırma ile mülkünüz daha hızlı ve daha yüksek fiyata satılır"\n\n---\n\n## KIBRIS GAYRİMENKUL',k:['satışlar','mülkünüz','menkul','evinizdeki','tanımadığınız','eş','reklamı','tr','ile','kibris','zamanlı','medya','kendi','kişilerin','kaldırıyoruz','sahibinden','güvenlik','hatırlat','fiyata','fiyatlandırma','yayınlıyoruz','ortalama','kiralarım','riskini','gayri','daha','hızlı','kat','tüm','sosyal']},
{t:'Yabancıya Satış Süreci',c:'### Yabancıya Satış Süreci\n- Yabancı uyruklu kişiler Kuzey Kıbrıs\'ta gayrimenkul satın alabilir\n- Bir kişi adına en fazla 1 dönüm (1338 m²) arazi satın alınabilir\n- Bakanlar Kurulu\'ndan satın alma izni gerekir (süreç 6-12 ay sürebilir)\n- İzin süreci devam ederken mülk kullanılabilir ve kiralanabilir\n- Tapu devri Bakanlar Kurulu onayından sonra yapılır',k:['kiralanabilir','izni','sonra','satın','bakanlar','devri','en','alınabilir','arazi','uyruklu','devam','tapu','mülk','ederken','yabancıya','bir','ta','fazla','süreç','kullanılabilir','dönüm','alabilir','zin','yapılır','kuzey','satış','gerekir','ay','ndan','gayrimenkul']},
{t:'Yatırım Avantajları',c:'### Yatırım Avantajları\n- Döviz bazlı yatırım (GBP/USD bazında fiyatlandırma)\n- Yüksek kira getirisi (yıllık %6-8 arası)\n- İngiliz hukuk sistemi güvencesi\n- Türkiye\'ye göre düşük yaşam maliyeti\n- Faizsiz taksit imkânı (geliştirici firmaların ödeme planları)\n- Akdeniz iklimi, doğa ve yaşam kalitesi',k:['getirisi','gbp','iklimi','imkânı','usd','avantajları','güvencesi','taksit','bazlı','maliyeti','ye','doğa','kira','kalitesi','arası','yatırım','firmaların','fiyatlandırma','bazında','düşük','akdeniz','ödeme','hukuk','geliştirici','planları','ngiliz','sistemi','yıllık','faizsiz','döviz']},
{t:'Döveç İnşaat ve Diğer Geliştiriciler',c:'### Döveç İnşaat ve Diğer Geliştiriciler\nKıbrıs Katalog uygulamasından tüm projeleri görebilirsin. Mevcut geliştiriciler: Döveç İnşaat, Cyprus Constructions, Northernland.\nHer projenin tip filtresi ve ödeme planı hesaplayıcısı var.\nWhatsApp rehberi: kisa.link/YRQLo',k:['diğer','döveç','mevcut','geliştiriciler','kisa','her','constructions','uygulamasından','tip','cyprus','hesaplayıcısı','var','yrqlo','projenin','filtresi','katalog','whatsapp','northernland','link','ödeme','tüm','nşaat','projeleri','rehberi','planı','görebilirsin','kıbrıs','ve']},
{t:'Sunum Materyalleri',c:'### Sunum Materyalleri\nTüm Kıbrıs sunum materyalleri Kıbrıs Katalog uygulamasında mevcuttur (link: Apps Script — Umut\'tan al).\nMüşteriye sunum yapmak için:\n1. Kıbrıs Katalog uygulamasını aç\n2. Geliştirici seç (Döveç, Cyprus Constructions, Northernland)\n3. Müşterinin bütçesine ve ihtiyacına uygun projeleri filtrele\n4. Proje detayında fotoğraflar, kat planları ve fiyat bilgileri mevcut\n5. Ödeme planı hesaplayıcısıyla müşteriye özel taksit planı çıkar\n6. Projeyi doğrudan WhatsApp ile müşteriye paylaş\n7. WhatsApp rehberi: kisa.link/YRQLo — müşteriye bu linki de gönderebilirsin\nAyrı bir Drive linki veya broşüre gerek yok — her şey uygulamada.\n\n---\n\n## PAZARLAMA REHBERİ',k:['için','umut','döveç','mevcut','filtrele','bütçesine','script','constructions','ihtiyacına','detayında','fotoğraflar','projeyi','ile','taksit','doğrudan','sunum','cyprus','özel','payl','uygulamasında','tan','yapmak','katalog','whatsapp','al','northernland','proje','materyalleri','link','uygulamasını']},
{t:'Instagram/Facebook Reklam Verme (Meta Business Suite)',c:'### Instagram/Facebook Reklam Verme (Meta Business Suite)\n1. Meta Business Suite\'e giriş yap (business.facebook.com)\n2. "Reklam Oluştur" butonuna tıkla\n3. Hedef seç: Portföy tanıtımı için "Trafik" veya "Etkileşim", müşteri bulmak için "Potansiyel Müşteri"\n4. Hedef kitle belirle: Konum (Fikirtepe, Kadıköy, İstanbul), yaş (25-55), ilgi alanı (gayrimenkul, ev satın alma)\n5. Bütçe belirle: Günlük minimum 100-200 TL önerilir, süre 7-14 gün\n6. Görsel/Video yükle: Dikey format (1080x1920) story için, kare (1080x1080) feed için\n7. Metin yaz: kısa, dikkat çekici, fiyat veya özellik vurgulu\n8. Yayınla ve performansı takip et',k:['ilgi','için','oluştur','konum','tanıtımı','portföy','satın','business','giriş','müşteri','bulmak','video','günlük','meta','potansiyel','görsel','ev','trafik','dikey','yaş','reklam','minimum','etkileşim','hedef','facebook','veya','yükle','suite','format','yap']},
{t:'Video Editleme',c:'### Video Editleme\nÖnerilen uygulamalar: CapCut (ücretsiz, kolay), InShot (hızlı düzenleme)\nTemel adımlar:\n1. Mülkü geniş açıyla ve iyi ışıkta çek (yatay veya dikey)\n2. CapCut\'ta yeni proje oluştur, videoları ekle\n3. Gereksiz kısımları kes, geçişler ekle\n4. Metin ekle: adres, fiyat, m², oda sayısı\n5. Müzik ekle (telif hakları olmayan)\n6. Dışa aktar: 1080p, story formatı (9:16) veya feed formatı (1:1)\n7. İdeal süre: 15-30 saniye (story/reels), 60 saniye (feed)',k:['oluştur','inshot','reels','kısımları','video','hakları','geçişler','telif','dikey','ta','adımlar','mülkü','müzik','çek','deal','ekle','yeni','editleme','uygulamalar','veya','önerilen','temel','proje','oda','aktar','kes','hızlı','metin','videoları','story']},
{t:'Sahibinden.com\'a İlan Verme',c:'### Sahibinden.com\'a İlan Verme\n1. sahibinden.com\'a giriş yap (ofis hesabı veya kendi hesabın)\n2. Sağ üstteki "İlan Ver" butonuna tıkla\n3. Kategori seç: Konut > Satılık/Kiralık > Daire/Residence/Villa vs.\n4. İl/İlçe/Mahalle seç (Kadıköy > Fikirtepe, Dumlupınar Mah. vs.)\n5. İlan bilgilerini doldur: başlık, fiyat, m², oda sayısı, bina yaşı, kat, ısınma tipi, cephe, banyo sayısı\n6. Başlık dikkat çekici olsun: ör. "Yenifikirtepe 6. Etap Manzaralı 2+1 Sıfır Daire"\n7. Açıklama: Detaylı, profesyonel (ChatGPT ile yazabilirsin — aşağıda rehber var)\n8. Fotoğraf yükle: Minimum 10, ideal 20+ fotoğraf. İlk fotoğraf en dikkat çekici olsun\n9. İletişim bilgileri: Kendi telefonun veya ofis numarası (0216 315 15 15)\n10. Konum haritada doğru işaretlendiğinden emin ol\n11. "İlanı Yayınla" — sonra istatistikleri takip et\n\nİpuçları: Başlıkta BÜYÜK HARF kullanma. Fotoğrafları yüklemeden önce AI ile düzenle. İlan açıklamasında RE/MAX Doğuş ve danışman adını belirt. Vitrin/öne çıkarma kullanmadan önce Umut\'a danış.',k:['vs','çekici','yaşı','ör','üstteki','manzaralı','doldur','sıfır','giriş','etap','mah','konut','lçe','açıklama','kendi','sahibinden','kategori','başlık','lan','detaylı','bina','veya','hesabın','hesabı','sağ','kiralık','yap','oda','ısınma','villa']},
{t:'ChatGPT ile Fotoğraf Işıklandırma ve Düzenleme',c:'### ChatGPT ile Fotoğraf Işıklandırma ve Düzenleme\n1. ChatGPT\'ye (chatgpt.com) giriş yap\n2. Fotoğrafı sohbete yükle (ataç simgesi veya sürükle-bırak)\n3. Şu komutu yaz: "Bu ev fotoğrafının ışığını artır, daha aydınlık ve davetkar hale getir. Renkleri doğal tut."\n4. ChatGPT düzenlenmiş fotoğrafı oluşturur — indir ve kullan\n\nFarklı komutlar:\n- Işıklandırma: "Bu fotoğrafı daha aydınlık yap, gölgeleri azalt, pencereden gelen ışığı artır"\n- Renk düzeltme: "Renkleri daha canlı ve sıcak yap, beyaz dengesini düzelt"\n- Genel iyileştirme: "Bu emlak fotoğrafını profesyonel emlak çekimi gibi düzenle"',k:['ışığını','hale','aydınlık','şu','gölgeleri','farklı','chatgpt','pencereden','sohbete','komutu','tut','fotoğrafının','getir','sıcak','oluşturur','giriş','işıklandırma','ışığı','ile','komutlar','düzenlenmiş','ev','ye','kullan','düzeltme','doğal','fotoğrafı','veya','indir','yükle']},
{t:'Yapay Zeka ile Fotoğraftan Obje Silme',c:'### Yapay Zeka ile Fotoğraftan Obje Silme\n\nYöntem 1 — ChatGPT:\n1. Fotoğrafı ChatGPT\'ye yükle\n2. "Bu fotoğraftaki [obje adı]\'nı sil, arka planı doğal şekilde tamamla" yaz\n3. Örnek: "Salondaki karton kutuları sil", "Balkondaki çamaşırlığı kaldır", "Yerdeki ayakkabıları sil"\n\nYöntem 2 — cleanup.pictures (ücretsiz):\n1. cleanup.pictures sitesine git\n2. Fotoğrafı yükle\n3. Silmek istediğin objenin üzerini fırçayla boya\n4. AI otomatik olarak objeyi silip arka planı tamamlar, sonucu indir',k:['fırçayla','ayakkabıları','silip','chatgpt','zeka','yöntem','fotoğraftaki','şekilde','istediğin','ile','objenin','silme','obje','git','fotoğraftan','arka','salondaki','karton','üzerini','sonucu','ye','adı','çamaşırlığı','boya','kaldır','olarak','sil','doğal','fotoğrafı','indir']},
{t:'Eşyalı/Eşyasız Fotoğraf Düzenleme',c:'### Eşyalı/Eşyasız Fotoğraf Düzenleme\n\nEşyalı daireyi boş göstermek:\n1. Fotoğrafı ChatGPT\'ye yükle\n2. "Bu odadaki tüm mobilyaları ve eşyaları kaldır, boş bir oda olarak göster. Duvarlar, zemin ve pencereler kalsın" yaz\n\nBoş daireyi eşyalı göstermek (sanal home staging):\n1. Fotoğrafı ChatGPT\'ye yükle\n2. "Bu boş salona modern mobilya ekle: kanepe, sehpa, TV ünitesi, halı. Doğal ve gerçekçi görünsün" yaz\n3. Veya: "Bu boş yatak odasına çift kişilik yatak, komodin ve abajur ekle"\n\nİpuçları: Sanal staging ilanda belirtilmeli — "Görsel temsilidir" notu ekle. Gerçek fotoğrafları da mutlaka koy. Banyo ve mutfağı genellikle olduğu gibi bırak, salon ve yatak odasında dene.',k:['tv','yatak','zemin','odasına','gerçekçi','chatgpt','abajur','mobilya','göster','bir','ye','halı','puçları','kanepe','sta','çift','kaldır','ekle','olarak','duvarlar','staging','eşyaları','eşyalı','fotoğrafı','doğal','veya','görünsün','yükle','kişilik','sanal']},
{t:'ChatGPT ile İlan Metni Yazma',c:'### ChatGPT ile İlan Metni Yazma\n1. ChatGPT\'ye giriş yap\n2. Şu formatta bilgi ver: "Bana bir emlak ilanı metni yaz: İşlem: Satılık/Kiralık, Konum: [mahalle, ilçe], Proje: [varsa], Oda sayısı: [1+1 vs.], m²: [net], Kat: [kaçıncı/toplam], Bina yaşı, Isınma, Öne çıkan özellikler, Fiyat. Profesyonel ve güven veren bir dil kullan. RE/MAX Doğuş adına yaz."\n3. ChatGPT ilan metnini oluşturur\n4. Gerekirse düzelt: "Daha kısa yaz" veya "Yatırımcıya yönelik vurgula"\n5. Metni kopyala, sahibinden veya sosyal medya ilanına yapıştır\n\nÖrnek komut: "Fikirtepe Yenifikirtepe 6. Etap B Blok\'ta 2+1, 85 m², 12. kat, sıfır daire, Çamlıca manzaralı, merkezi ısınma, kapalı otopark, site içi havuz ve spor salonu var. Satılık, 9.500.000 TL. RE/MAX Doğuş adına profesyonel ilan metni yaz."\n\n---\n\n## CAPCUT — SIFIRDAN A\'DAN Z\'YE REHBERİ',k:['ilçe','vs','veren','re','yaşı','şu','konum','ver','max','özellikler','bana','chatgpt','kaçıncı','bilgi','kopyala','oluşturur','giriş','öne','ile','emlak','gerekirse','bir','ye','net','metni','şlem','sahibinden','kullan','lan','metnini']},
{t:'CapCut Nedir?',c:'### CapCut Nedir?\nÜcretsiz video düzenleme uygulaması. Telefondan (iPhone/Android) ve bilgisayardan (capcut.com) kullanılır. Portföy videosu, reels, story ve tanıtım videosu hazırlamak için ideal.',k:['hazırlamak','için','kullanılır','iphone','portföy','tanıtım','reels','video','telefondan','bilgisayardan','nedir','com','story','düzenleme','capcut','uygulaması','android','ideal','videosu','ücretsiz','ve']},
{t:'Kurulum',c:'### Kurulum\n- iPhone: App Store\'dan "CapCut" indir\n- Android: Google Play\'den "CapCut" indir\n- Bilgisayar: capcut.com\'dan web versiyonunu kullan veya masaüstü uygulamasını indir\n- Giriş: Google, Facebook veya e-posta ile hesap oluştur',k:['app','oluştur','iphone','giriş','ile','posta','hesap','web','store','bilgisayar','play','versiyonunu','kullan','google','veya','indir','facebook','dan','uygulamasını','den','com','masaüstü','capcut','android','kurulum']},
{t:'İlk Video Projesi Oluşturma',c:'### İlk Video Projesi Oluşturma\n1. CapCut\'ı aç, "Yeni Proje" butonuna bas\n2. Galerinden videoları ve fotoğrafları seç (çoklu seçim yapabilirsin)\n3. "Ekle" butonuna bas — videolar zaman çizelgesine (timeline) eklenir\n4. Ekranın alt kısmında düzenleme araçları görünür',k:['çoklu','galerinden','alt','ekranın','oluşturma','seçim','video','timeline','eklenir','zaman','lk','bas','araçları','ekle','yeni','yapabilirsin','proje','aç','videoları','videolar','projesi','düzenleme','capcut','butonuna','kısmında','görünür','çizelgesine','fotoğrafları','seç','ve']},
{t:'Temel Düzenleme İşlemleri',c:'### Temel Düzenleme İşlemleri\n\nKırpma (Trim):\n1. Zaman çizelgesinde videoyu seç (dokun)\n2. Video klipsin başındaki veya sonundaki beyaz çubuğu sürükle\n3. İstemediğin kısmı kes\n\nBölme (Split):\n1. Oynatma çubuğunu (beyaz dikey çizgi) kesmek istediğin noktaya getir\n2. Alt menüden "Böl" (Split) butonuna bas\n3. Video ikiye bölünür — istemediğin parçayı seç ve "Sil"\n\nSıralama Değiştirme:\n1. Bir klipe uzun bas\n2. Sürükleyerek istediğin sıraya taşı',k:['alt','dokun','böl','klipsin','getir','split','video','istediğin','zaman','başındaki','bas','bir','bölme','dikey','sıraya','değiştirme','taşı','kesmek','bölünür','videoyu','sil','çubuğu','ikiye','kırpma','veya','temel','stemediğin','kes','parçayı','sürükleyerek']},
{t:'Metin Ekleme',c:'### Metin Ekleme\n1. Alt menüden "Metin" (Text) butonuna bas\n2. "Metin Ekle" seç\n3. Yazını yaz: adres, fiyat, m², oda sayısı\n4. Font seç (temiz, okunabilir fontlar: Montserrat, Poppins, Arial)\n5. Renk seç (beyaz metin + siyah gölge en okunabilir)\n6. Boyut ayarla — parmakla sıkıştır/genişlet\n7. Konumu ayarla — sürükleyerek ekranda istediğin yere taşı\n8. Süreyi ayarla — metin klipsin zaman çizelgesindeki uzunluğunu sürükle\n\nAnimasyonlu metin: Metin seçiliyken "Animasyon" > giriş animasyonu seç (ör: "Fade In", "Slide Up")',k:['ayarla','poppins','uzunluğunu','okunabilir','alt','temiz','parmakla','en','montserrat','genişlet','klipsin','giriş','ekranda','istediğin','ekleme','gölge','zaman','yazını','bas','fontlar','siyah','konumu','taşı','animasyonlu','boyut','font','ekle','animasyon','yere','oda']},
{t:'Müzik Ekleme',c:'### Müzik Ekleme\n1. Alt menüden "Ses" (Audio) butonuna bas\n2. "Sesler" (Sounds) seç — CapCut\'ın ücretsiz müzik kütüphanesi açılır\n3. Türe göre filtrele: "Cheerful", "Inspiring", "Calm" — emlak için sakin/modern tarzlar ideal\n4. Beğendiğini seç, "+" ile ekle\n5. Müzik sesi: müzik klibe dokun > ses seviyesini %20-30 arası ayarla (konuşma varsa düşük tut)',k:['audio','sakin','için','seviyesini','ayarla','cheerful','sesler','alt','filtrele','dokun','tut','türe','kütüphanesi','inspiring','beğendiğini','ile','emlak','calm','ekleme','sounds','bas','ın','ekle','arası','sesi','düşük','tarzlar','klibe','menüden','modern']},
{t:'Geçiş Efektleri (Transition)',c:'### Geçiş Efektleri (Transition)\n1. İki klip arasındaki beyaz kare simgeye dokun\n2. Geçiş efekti seç (ör: "Slide", "Fade", "Zoom")\n3. Süreyi ayarla (0.3-0.5 saniye yeterli — fazla uzun yapma)\n4. Profesyonel görünüm için tüm geçişlerde aynı efekti kullan',k:['ayarla','için','simgeye','dokun','zoom','efektleri','yapma','slide','görünüm','aynı','arasındaki','efekti','ki','fazla','kullan','yeterli','kare','fade','tüm','geçişlerde','transition','saniye','klip','beyaz','profesyonel','süreyi','uzun','seç','geçiş','ör']},
{t:'Filtre ve Renk Düzeltme',c:'### Filtre ve Renk Düzeltme\n1. Klibi seç > "Filtreler" (Filters)\n2. Emlak videoları için: "Natural", "Fresh", "Bright" kategorileri\n3. Filtreyi seç, yoğunluğu %50-70 arası ayarla (abartma)\n4. Renk ayarı: "Ayarla" (Adjust) > parlaklık, kontrast, doygunluk, sıcaklık manuel ayarla\n5. Karanlık mekanlarda: Parlaklık +20, Gölgeler +30, Kontrast +10',k:['abartma','ayarla','için','adjust','karanlık','kategorileri','natural','klibi','filtre','emlak','yoğunluğu','filtreler','sıcaklık','düzeltme','arası','fresh','manuel','videoları','ayarı','renk','parlaklık','mekanlarda','gölgeler','filters','kontrast','doygunluk','seç','bright','filtreyi','ve']},
{t:'Hız Ayarı',c:'### Hız Ayarı\n1. Klibi seç > "Hız" (Speed)\n2. "Normal" sekmesinde hız çarpanını ayarla\n3. Oda geçişlerinde 2x hız güzel görünür\n4. Manzara çekimlerinde 0.5x (ağır çekim) etkileyici olur',k:['ayarla','sekmesinde','güzel','klibi','hız','geçişlerinde','çekim','çekimlerinde','etkileyici','manzara','çarpanını','oda','normal','ağır','ayarı','olur','görünür','seç','speed']},
{t:'Dışa Aktarma (Export)',c:'### Dışa Aktarma (Export)\n1. Sağ üstteki "Dışa Aktar" (Export) butonuna bas\n2. Çözünürlük: 1080p (Full HD) — daha düşük seçme\n3. Kare hızı: 30 fps yeterli\n4. Format otomatik MP4 gelir\n5. "Dışa Aktar" bas, galeriye kaydedilir',k:['mp','üstteki','aktarma','gelir','hd','export','hızı','seçme','bas','full','yeterli','kaydedilir','çözünürlük','kare','sağ','format','daha','aktar','düşük','otomatik','fps','dışa','butonuna','galeriye']},
{t:'Emlak Videosu İçin İdeal Format',c:'### Emlak Videosu İçin İdeal Format\n- Story/Reels: Dikey 9:16 (1080x1920), 15-30 saniye\n- Instagram Feed: Kare 1:1 (1080x1080) veya Dikey 4:5 (1080x1350), 30-60 saniye\n- YouTube: Yatay 16:9 (1920x1080), 1-3 dakika\n\nProje başında format seçmek için: "Yeni Proje" > sağ üstte oran seçeneği (9:16, 1:1, 16:9)',k:['için','üstte','reels','oran','emlak','dikey','dakika','deal','yeni','kare','veya','proje','sağ','format','seçeneği','youtube','story','instagram','saniye','feed','başında','seçmek','yatay','videosu','çin']},
{t:'CapCut Sık Sorulan Sorular',c:'### CapCut Sık Sorulan Sorular\nS: Videoya logo/watermark nasıl eklerim?\nC: "Kaplama" (Overlay) > "Fotoğraf ekle" > RE/MAX Doğuş logosunu seç > boyutunu küçült > köşeye yerleştir > opaklığı %70 yap > süresini videonun tamamına uzat\n\nS: Sesli anlatım nasıl eklerim?\nC: Alt menü > "Ses" > "Kayıt" > mikrofon simgesine bas ve konuş. Video oynarken canlı anlatım yapabilirsin.\n\nS: Videoyu WhatsApp\'a gönderince kalitesi düşüyor?\nC: WhatsApp sıkıştırır. Kaliteli paylaşmak için: videoyu "Dosya" olarak gönder (ataç > dosya > galeriden seç), "Fotoğraf" olarak değil.\n\nS: Şablon (template) nasıl kullanırım?\nC: Ana ekranda "Şablonlar" sekmesi > beğendiğin şablonu seç > "Bu şablonu kullan" > kendi videolarını/fotoğraflarını ekle. Hızlı ve profesyonel sonuç verir.\n\nS: Birden fazla metin farklı zamanlarda nasıl gösterilir?\nC: Her metin için ayrı "Metin Ekle" yap. Zaman çizelgesinde her metnin başlangıç ve bitiş süresini ayrı ayarla.\n\n---\n\n## CANVA — SIFIRDAN A\'DAN Z\'YE REHBERİ',k:['simgesine','re','gönderince','videoya','için','küçült','max','videonun','anlatım','alt','mikrofon','konuş','logo','yerleştir','dosya','nasıl','overlay','video','gönd','kaplama','oynarken','boyutunu','bas','eklerim','watermark','tamamına','kalitesi','sorular','ekle','köşeye']},
{t:'Canva Nedir?',c:'### Canva Nedir?\nÜcretsiz grafik tasarım aracı. Sosyal medya görseli, ilan afişi, kartvizit, sunum, broşür — her türlü görsel içeriği profesyonel şekilde hazırlarsın. Tasarım bilgisi gerekmez.',k:['grafik','her','canva','kartvizit','içeriği','şekilde','afişi','görsel','hazırlarsın','sunum','medya','nedir','broşür','aracı','gerekmez','sosyal','türlü','tasarım','görseli','bilgisi','ilan','profesyonel','ücretsiz']},
{t:'Kurulum ve Giriş',c:'### Kurulum ve Giriş\n- Telefon: App Store veya Google Play\'den "Canva" indir\n- Bilgisayar: canva.com\'a git\n- Giriş: Google, Facebook veya e-posta ile ücretsiz hesap oluştur\n- Ücretsiz plan yeterli — Pro gerekmez',k:['app','oluştur','plan','telefon','pro','canva','giriş','kurulum','ile','posta','hesap','git','store','bilgisayar','play','yeterli','google','veya','indir','gerekmez','den','com','facebook','ücretsiz','ve']},
{t:'İlk Tasarımı Oluşturma',c:'### İlk Tasarımı Oluşturma\n1. Canva\'yı aç, "Tasarım Oluştur" (Create a Design) butonuna bas\n2. Boyut seç:\n   - Instagram Story: 1080x1920 px\n   - Instagram Post: 1080x1080 px\n   - Instagram Post (dikey): 1080x1350 px\n   - A4 afiş: A4 seç\n   - Kartvizit: "Kartvizit" ara\n   - Sunum: "Sunum (16:9)" seç\n3. Boş sayfa açılır — tasarıma başla',k:['tasarımı','oluştur','post','canva','oluşturma','kartvizit','lk','bas','ara','dikey','sunum','yı','boyut','başla','tasarıma','create','aç','story','instagram','tasarım','px','afiş','butonuna','design','sayfa','seç','boş','açılır']},
{t:'Şablon Kullanma (En Hızlı Yol)',c:'### Şablon Kullanma (En Hızlı Yol)\n1. Sol menüden "Şablonlar" (Templates) sekmesine tıkla\n2. Arama kutusuna yaz: "real estate", "emlak", "property", "for sale", "for rent"\n3. Beğendiğin şablona tıkla — sayfana uygulanır\n4. Metinleri kendi bilgilerinle değiştir (fiyat, adres, m², telefon)\n5. Fotoğrafı kendi mülk fotoğrafınla değiştir\n6. Renkleri RE/MAX renklerine uyarla (mavi: #003DA5, kırmızı: #DC1C2E, beyaz: #FFFFFF)',k:['re','da','max','telefon','property','for','şablona','metinleri','en','değiştir','kırmızı','sol','mülk','emlak','sayfana','sale','ffffff','kendi','templates','arama','beğendiğin','fotoğrafı','bilgilerinle','kullanma','hızlı','yol','kutusuna','mavi','menüden','yaz']},
{t:'Fotoğraf Ekleme ve Düzenleme',c:'### Fotoğraf Ekleme ve Düzenleme\n1. Sol menüden "Yüklemeler" (Uploads) > "Dosya yükle" > mülk fotoğrafını seç\n2. Fotoğrafı tasarıma sürükle\n3. Boyutlandır: köşelerden sürükleyerek büyüt/küçült\n4. Kırp: fotoğrafa çift tıkla > çerçeve içinde kaydır ve kırp\n5. Filtre: fotoğrafı seç > üst menüde "Filtre" > "Enhance" veya "Solar" hafif uygula\n6. Ayarlar: "Ayarlar" (Adjust) > parlaklık, kontrast, doygunluk ayarla',k:['adjust','ayarla','hafif','küçült','menüde','boyutlandır','solar','uploads','sol','fotoğrafını','dosya','mülk','ekleme','üst','çift','kaydır','ayarlar','fotoğrafı','veya','yükle','sürükleyerek','çerçeve','uygula','enhance','menüden','tıkla','parlaklık','fotoğrafa','düzenleme','kırp']},
{t:'Metin Ekleme ve Düzenleme',c:'### Metin Ekleme ve Düzenleme\n1. Sol menüden "Metin" (Text) > "Başlık ekle" veya "Alt başlık ekle"\n2. Metni yaz: adres, fiyat, özellikler\n3. Font seçimi: Profesyonel fontlar — Montserrat, Poppins, Raleway, Open Sans\n4. Boyut: Başlık 36-48pt, alt bilgi 18-24pt\n5. Renk: Metne tıkla > renk kutusuna tıkla > renk seç veya hex kodu gir\n6. Hizalama: Ortala, sola veya sağa yasla\n7. Efekt: Metin seçili > "Efektler" > "Gölge" veya "Arka plan" ekle (okunabilirlik için)',k:['hex','okunabilirlik','poppins','için','efektler','alt','plan','kodu','ortala','özellikler','montserrat','sol','bilgi','sağa','pt','ekleme','gölge','arka','fontlar','metni','sola','başlık','boyut','font','ekle','veya','gir','open','yasla','kutusuna']},
{t:'Element ve Şekil Ekleme',c:'### Element ve Şekil Ekleme\n1. Sol menüden "Elementler" (Elements)\n2. Arama: "line", "arrow", "frame", "shape", "icon"\n3. Şekiller: Fiyat kutucuğu için dikdörtgen ekle, rengini ayarla, üzerine metin koy\n4. Çerçeveler: "Frame" ara > fotoğrafını çerçeveye sürükle\n5. İkonlar: "phone", "location", "bed", "bath" ara > oda sayısı, konum ikonu ekle',k:['üzerine','ayarla','için','konum','line','element','sol','fotoğrafını','icon','ekleme','phone','ara','bath','arrow','frame','elements','arama','şekil','ekle','location','rengini','kutucuğu','oda','elementler','çerçeveler','çerçeveye','metin','menüden','konlar','ikonu']},
{t:'Logo Ekleme',c:'### Logo Ekleme\n1. "Yüklemeler" > RE/MAX Doğuş logosunu yükle (PNG, şeffaf arka plan ideal)\n2. Tasarıma sürükle\n3. Köşeye yerleştir, boyutunu küçült\n4. Her tasarımda tutarlı konumda kullan (genellikle sağ alt veya sol üst)',k:['tasarımda','re','genellikle','küçült','max','alt','plan','tutarlı','her','logo','konumda','yerleştir','sol','ekleme','arka','boyutunu','şeffaf','üst','kullan','köşeye','doğuş','png','veya','yükle','sağ','logosunu','sürükle','ideal','yüklemeler','tasarıma']},
{t:'Katmanlar ve Hizalama',c:'### Katmanlar ve Hizalama\n1. Bir elementin önüne/arkasına almak: Sağ tıkla > "Öne getir" veya "Arkaya gönder"\n2. Hizalama: Birden fazla element seç (Shift+tıkla) > üst menüde "Hizala" > ortala, dağıt\n3. Gruplama: Birden fazla element seç > "Grupla" — birlikte taşınır',k:['menüde','ortala','önüne','element','getir','öne','grupla','bir','fazla','birden','üst','taşınır','almak','arkasına','veya','arkaya','sağ','elementin','birlikte','katmanlar','gruplama','tıkla','shift','hizalama','hizala','seç','gönder','dağıt','ve']},
{t:'Sayfa Ekleme (Çoklu Tasarım)',c:'### Sayfa Ekleme (Çoklu Tasarım)\n1. Alt kısımda "+" butonuyla yeni sayfa ekle\n2. Her sayfaya farklı fotoğraf/bilgi koy\n3. Carousel (kaydırmalı) post için ideal — 5-10 sayfa',k:['çoklu','için','alt','farklı','her','post','bilgi','carousel','ekleme','sayfaya','kaydırmalı','ekle','yeni','tasarım','koy','fotoğraf','sayfa','ideal','butonuyla','kısımda']},
{t:'Kaydetme ve İndirme',c:'### Kaydetme ve İndirme\n1. Sağ üstte "Paylaş" (Share) > "İndir" (Download)\n2. Format seçimi:\n   - Sosyal medya görseli: PNG (en kaliteli) veya JPG\n   - Baskı (afiş, kartvizit): PDF Baskı kalitesi\n   - Sunum: PPTX veya PDF\n3. Sayfa seçimi: Tümü veya belirli sayfaları seç\n4. "İndir" bas — galeriye kaydedilir',k:['pdf','ndirme','share','en','kaydetme','kartvizit','üstte','sayfaları','ndir','download','sunum','bas','medya','belirli','kalitesi','jpg','kaydedilir','png','veya','sağ','format','sosyal','pptx','paylaş','görseli','baskı','afiş','tümü','galeriye','sayfa']},
{t:'Emlak İçin Hazır Tasarım Fikirleri',c:'### Emlak İçin Hazır Tasarım Fikirleri\n\nSatılık/Kiralık ilan görseli:\n- Büyük mülk fotoğrafı (arka plan)\n- Üst bant: "SATILIK" veya "KİRALIK" (kırmızı veya mavi bant)\n- Ortada: Fiyat (büyük, dikkat çekici)\n- Alt bilgi: m², oda sayısı, kat, konum\n- Alt bant: RE/MAX Doğuş logosu + danışman adı + telefon\n\n"Satıldı" görseli:\n- Mülk fotoğrafı + üzerinde kırmızı "SATILDI" damgası\n- "RE/MAX Doğuş farkıyla" alt yazısı\n- Güven ve başarı mesajı verir\n\nBölge tanıtımı:\n- Fikirtepe drone fotoğrafı veya çevre fotoğrafları\n- "Fikirtepe\'de Yaşam" veya "Yenifikirtepe Rehberi" başlığı\n- Bilgilendirici metin: ulaşım, okullar, hastaneler, projeler\n\nKartvizit:\n- "Kartvizit" şablonu seç\n- Ön yüz: Ad, unvan (RE/MAX Doğuş Gayrimenkul Danışmanı), telefon, e-posta, logo\n- Arka yüz: Ofis adresi, web sitesi, QR kod',k:['re','çekici','danışman','yazısı','satildi','max','alt','plan','konum','telefon','tanıtımı','üzerinde','kırmızı','damgası','başarı','bilgi','verir','mülk','fikirleri','emlak','arka','bant','çevre','ki','adı','üst','ortada','fotoğrafı','doğuş','veya']},
{t:'Canva Sık Sorulan Sorular',c:'### Canva Sık Sorulan Sorular\n\nS: Tasarımımı başka bir boyuta nasıl uyarlarım?\nC: "Boyutlandır" (Resize) butonu > yeni boyut seç. Ücretsiz planda bu özellik sınırlı — aynı tasarımı yeni boyutta "Tasarım Oluştur" ile sıfırdan aç ve elementleri kopyala-yapıştır.\n\nS: Şeffaf arka plan nasıl yaparım?\nC: İndir > "Şeffaf arka plan" kutucuğunu işaretle. Bu özellik sadece PNG formatında ve Canva Pro\'da çalışır. Ücretsiz alternatif: remove.bg sitesinde arka planı kaldır.\n\nS: Marka renkleri ve fontlarımı nasıl kaydederim?\nC: Sol menü > "Marka kiti" (Brand Kit) — Pro özelliği. Ücretsiz planda: en çok kullandığın renk kodlarını not al (RE/MAX mavi: #003DA5, kırmızı: #DC1C2E).\n\nS: Aynı tasarımı tekrar tekrar nasıl kullanırım?\nC: Tasarımı aç > "Dosya" > "Kopya oluştur". Kopyayı düzenle, orijinal bozulmaz. Böylece her portföy için aynı şablonu kullanırsın.\n\nS: Tasarımı başka biriyle nasıl paylaşırım?\nC: "Paylaş" > "Bağlantıyı kopyala" > link olarak gönder. Veya "İndir" ile dosya olarak gönder.\n\nS: Video tasarımı da yapabilir miyim?\nC: Evet. "Video" şablonu seç. Fotoğraflara animasyon ekleyebilir, metin animasyonları yapabilir, müzik ekleyebilirsin. Ancak detaylı video düzenleme için CapCut daha iyi.\n\nS: Canva\'da AI ile tasarım yapabilir miyim?\nC: Evet. "Magic Design" özelliğini kullan — fotoğrafını yükle, ne yapmak istediğini yaz, Canva otomatik tasarım önerileri sunar. Veya "Metin ile görüntü" (Text to Image) ile AI görsel üret.\n- Canva kullanımı önerilir (canva.com — ücretsiz plan yeterli)\n- RE/MAX şablonları ve Doğuş renkleri ile marka tutarlılığı sağla\n- Story boyutu: 1080x1920 px\n- Post boyutu: 1080x1080 px\n- Afiş boyutu: A3 veya A4',k:['marka','kutucuğunu','başka','tasarımı','da','oluştur','plan','remove','pro','boyutlandır','sitesinde','canva','uyarlarım','kopyala','nasıl','planda','aynı','ile','özellik','ndir','arka','tasarımımı','bir','şeffaf','çalışır','boyut','bg','sorular','kaldır','yaparım']},

{t:'RE/MAX Türkiye İş Birlikleri ve Anlaşmalı Firmalar',c:'### RE/MAX Türkiye İş Birlikleri ve Anlaşmalı Firmalar\nRE/MAX Türkiye\'nin anlaşmalı olduğu firmalar — danışmanlar ve brokerlar özel avantajlardan yararlanabilir:\n\n- Eva Gayrimenkul Değerleme — gayrimenkul değerleme hizmeti\n- E-Tapu Danışmanlık — tapu işlemleri danışmanlık\n- Yapıkredi — bankacılık ve kredi hizmetleri\n- Sigortam.net — sigorta hizmetleri (DASK, konut, araç)\n- Dünyagöz — sağlık hizmetleri (göz)\n- Okan Üniversitesi — eğitim iş birliği\n- Cambly — İngilizce eğitimi (online)\n- American VIP — taşımacılık/VIP hizmetler\n- Açelya Nakliyat — nakliye hizmetleri\n- Bosch Ölçme Aletleri — 2026 kampanyası (lazer metre vs.)\n- Leica — ölçüm aletleri\n- Royal Canin — evcil hayvan ürünleri\n- Bi\'Hiyjen — hijyen ürünleri\n- BukyTalk — iletişim hizmetleri\n- Letshare — paylaşım platformu\n- MeCard — dijital kartvizit iş birliği\n- ArabamOn — araç hizmetleri\n- Palivor Çiftliği — kurumsal etkinlik/organizasyon\n- Swissotel Çeşme Resort & Spa — konaklama\n- Ses Perakende Arçelik Yetkili Bayi — beyaz eşya/elektronik\n- Tapu İşlemleri Uygulama ve Mevzuat Kitabı — mesleki kaynak\n\nBu iş birliklerinin detayları ve indirim/avantaj koşulları için MyREMAX platformunu kontrol et veya RE/MAX Türkiye\'den bilgi al.\n\nHangi konuda kime ulaşılır:\n- Eğitim/Power Start soruları → Gülay Demirsu Ural veya Murat Arslan\n- MyREMAX/sistem sorunları → Damla Atalay (Yazılım Destek)\n- Aidat/ödeme soruları → Fethi Bektaş (Muhasebe)\n- Danışman gelişim/koçluk → Merve Karakaya\n- İlk işlem desteği → İlk İşlem Mentörleri (Hakan, Ecem, Yekta, Nejat)\n- Saha desteği / ofis ziyareti → Bölge saha yöneticileri\n\n---\n\n---\n\n## REFERRAL VE COOPERATION PROSEDÜRÜ (2026)',k:['re','hizmeti','american','eva','anlaşmalı','max','sağlık','ngilizce','firmalar','dask','avantajlardan','değerleme','iş','okan','işlemleri','dünyagöz','kredi','göz','tapu','birlikleri','araç','konut','özel','net','türkiye','cambly','yapıkredi','olduğu','danış
