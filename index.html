{t:`e-Devlet'ten Takyidat Yazısı Alma (Adım Adım)`,b:`Takyidat yazısı: Mülkün üzerinde ipotek, haciz, şerh, intifa gibi kısıtlama olup olmadığını gösteren belgedir. Satış öncesi mutlaka kontrol et.

9. Sayfayı PDF olarak kaydet veya ekran görüntüsü al

Alternatif yol — Tapu Müdürlüğü'nden:

3. Tapu müdürlüğünden alınan belge resmi geçerliliğe sahiptir

Dikkat: e-Devlet'ten sadece kendi üzerine kayıtlı mülkleri sorgulayabilirsin. Başka birinin mülkü için tapu müdürlüğüne başvurmak gerekir. Müşterinden kendi e-Devlet'inden çekmesini iste veya birlikte tapu müdürlüğüne gidin.`,p:`KAPARO SÜRECİ`},
{t:`Belediyeden Rayiç Bedel Belgesi Alma (Adım Adım)`,b:`Rayiç bedel belgesi: Belediyenin belirlediği mülk değerini gösteren belgedir. Tapu devri için zorunludur — belediyeye emlak vergisi borcu olmadığını da gösterir.

Yüz yüze başvuru:
1. Mülkün bulunduğu belediyeye git (Kadıköy Belediyesi, Üsküdar Belediyesi vs.)
2. Emlak Vergisi / Gelirler Müdürlüğü birimine başvur
3. Mülk sahibinin TC kimlik numarası ve mülk bilgilerini (ada, parsel) ver
4. Belediye mülkün rayiç bedelini ve emlak vergisi borç durumunu gösteren belgeyi hazırlar
5. Belgeyi al — tapu müdürlüğüne götür

Online başvuru (belediyeye göre değişir):
1. İlgili belediyenin web sitesine git (ör: kadikoy.bel.tr)
2. e-Belediye veya Online İşlemler bölümüne gir
3. "Emlak Vergisi Sorgulama" veya "Rayiç Bedel Sorgulama" seçeneğini bul
4. TC kimlik ve mülk bilgileriyle sorgula
5. Bazı belediyeler belgeyi online olarak verir, bazıları bizzat gelmenizi ister

e-Devlet üzerinden:
1. turkiye.gov.tr'ye giriş yap
2. "Belediye Emlak Vergisi Borç Sorgulama" ara
3. İlgili belediyeyi seç
4. Borç durumunu gör (tüm belediyeler bu hizmeti sunmayabilir)

{t:`Ekspertiz (Değerleme) Raporu ve Web Tapu'dan Eksper Atama`,b:`Ekspertiz raporu ne zaman gerekir:
- Alıcı konut kredisi kullanacaksa (banka zorunlu tutar)
- Yabancıya satışlarda (yasal zorunluluk)
- Miras paylaşımında adil değer tespiti için
- Kamulaştırma süreçlerinde

Sürecin özeti:
1. Alıcı bankaya kredi başvurusu yapar
2. Banka bir eksper (SPK lisanslı değerleme uzmanı) atar
3. Mülk sahibi Web Tapu üzerinden ekspere yetki verir
4. Eksper mülkü yerinde inceler
5. Rapor hazırlanır ve bankaya sunulur
6. Banka rapora göre kredi limitini belirler

Web Tapu'dan Ekspertiz Yetkisi Verme (Mülk Sahibi Yapacak):
1. webtapu.tkgm.gov.tr adresine git
2. e-Devlet şifresiyle giriş yap
3. Sol menüden "Taşınmaz İşlemleri" seç
4. Ekspertiz yetkisi vermek istediğin gayrimenkulü bul
5. "Ekspertiz Yetki Verme" veya "Değerleme Yetki Ver" seçeneğine tıkla
6. Yetki vereceğin bankayı seç — sistem otomatik olarak ilgili eksperi tanımlar
7. Telefonuna gelen SMS doğrulama kodunu gir
8. İşlemi onayla — karekodlu (barkodlu) yetki belgesi oluşur
9. Bu belgeyi ekspere veya bankaya ilet

Alternatif yol — Barkodlu belge:
1. Web Tapu'da gayrimenkullerini listele
2. İlgili gayrimenkulün yanındaki "Yetki Ver" sütunundaki yeşil tike tıkla
3. Karekodlu belge otomatik oluşur
4. Bu belgeyi ekspere göster veya PDF olarak gönder

Yabancıya satışlarda değerleme raporu başvurusu:
1. Web Tapu'ya e-Devlet ile giriş yap
2. Sol menüden "Değerlendirme İşlemleri" > "Değerleme Talep Et"
3. Başvuruyu tamamla
4. Talep durumu "Ödeme Bekliyor" olarak görünecek
5. Ödemeyi banka aracılığıyla yap (Ziraat, Vakıfbank vs. — MKK/GABİM ödemesi olarak)
6. Ödeme sonrası eksper atanır ve süreç başlar

Ekspertiz sürecinde danışmanın rolü:
- Müşteriye süreci açıkla ve yönlendir
- Mülk sahibinden Web Tapu üzerinden yetki vermesini iste
- Eksper randevusu için mülke erişim sağla (anahtar, randevu ayarla)
- Eksper geldiğinde mülkte hazır bulun (zorunlu değil ama profesyonel görünür)
- Rapor sonucunu takip et ve müşteriye bildir

Ekspertiz ücreti (2026 ortalaması): Yaklaşık 15.000-25.000 TL arası (mülk tipi ve büyüklüğüne göre değişir). Ücreti genellikle alıcı (kredi kullanan) öder.

Dikkat: Ekspertiz değeri satış fiyatından düşük çıkarsa banka daha az kredi verir. Bu durumda alıcı aradaki farkı peşinat olarak karşılamalı. Müşterini önceden bilgilendir.`,p:`KAPARO SÜRECİ`},
{t:`Gün İçi Süreç`,b:`1. Randevu saatinde alıcı ve satıcı (veya vekilleri) tapu müdürlüğünde hazır bulunur
2. Tapu memuru belgeleri kontrol eder, satış bedeli ve harçları doğrular
3. Kimlik tespiti yapılır
4. Taraflar resmi senedi imzalar
5. Tapu memuru yeni durumu tescil eder
6. Yeni tapu belgesi alıcıya teslim edilir
7. İşlem genellikle aynı gün tamamlanır`,p:`KAPARO SÜRECİ`},
{t:`Devir Sonrası Yapılacaklar (Alıcıya hatırlat)`,b:`- DASK poliçesini kendi adına güncelle
- Elektrik, su, doğalgaz aboneliklerini devral
- Belediyeye emlak vergisi bildirimi yap
- Aidat ödemelerini yönetime bildir

{t:`Temel Yöntem: Emsal Karşılaştırma`,b:`1. Aynı bölgede son 3-6 ayda satılmış benzer mülkleri araştır
2. Satışta olan rakip mülkleri listele
3. Satılamayan (uzun süredir piyasada olan) mülkleri not et
4. Bu üç veriyle fiyat aralığı belirle`,p:`KAPARO SÜRECİ`},
{t:`Dikkat Edilecek Kriterler`,b:`- Konum (cadde/sokak, ulaşım, çevre)
- m² (net ve brüt alan)
- Kat (yüksek katlar genellikle daha değerli)
- Cephe (güney ve batı cepheler tercih edilir)
- Manzara (deniz, şehir, yeşil alan)
- Bina yaşı ve yapı kalitesi
- Isınma sistemi (merkezi, kombi, yerden ısıtma)
- Otopark ve güvenlik
- Site içi sosyal tesisler
- İmar durumu ve kat irtifakı/mülkiyeti
- Aidat miktarı
- Krediye uygunluk`,p:`KAPARO SÜRECİ`},
{t:`Değerleme Uygulaması`,b:`RE/MAX Değerleme uygulamasını kullan (dogusremax.github.io/remax-de-erleme). Sohbet sihirbazı ile mülk bilgilerini gir, otomatik rapor oluştur. 7 slaytlık PPTX çıktı alabilirsin.`,p:`KAPARO SÜRECİ`},
{t:`Fiyat Sunumu İpuçları (Power Start'tan)`,b:`- Fiyat analizini nasıl yaptığını müşteriye açıkla
- Emsal verileri sunmadan önce müşterinin fiyat beklentisini yorumlama
- "Rakip" kavramını kullan: "Evinize bakabilecek alıcıların bakabileceği diğer mülklere rakip denir"
- Satışta olan, satılamayan ve satılmış emsal verileriyle fiyat aralığını birlikte inceleyin`,p:`KAPARO SÜRECİ`},
{t:`Yapay Zeka ile Mülk Değerlemesi (ChatGPT / Gemini)`,b:`Yapay zekayı değerleme asistanı olarak kullanabilirsin. Emsal araştırması, rapor yazımı ve fiyat analizi için çok güçlü bir araç.

Adım 1 — Emsal Araştırması:
ChatGPT veya Gemini'ye şunu yaz:
"Fikirtepe, Kadıköy, İstanbul bölgesinde 2+1, 85 m², 10. kat, sıfır daire için emsal fiyat analizi yap. Benzer projelerde (Yenifikirtepe, Nuhoğlu, Şua) son dönem satış fiyatlarını ve m² birim fiyatlarını karşılaştır."

Adım 2 — Mülk Değerleme Raporu:
"Şu mülk için profesyonel bir değerleme raporu hazırla:
- Konum: Dumlupınar Mah., Yenifikirtepe 6. Etap B Blok
- Tip: 2+1 daire, 85 m² net
- Kat: 12/20
- Bina yaşı: Sıfır (2026 teslim)
- Cephe: Güney-Batı, Çamlıca manzaralı
- Isınma: Merkezi
- Otopark: Kapalı
- Site: Havuz, spor salonu, güvenlik
- Aidat: 4.500 TL/ay
Emsal karşılaştırma yöntemiyle fiyat aralığı öner. SWOT analizi ekle. Raporu müşteriye sunulacak profesyonel formatta yaz."

Adım 3 — Kira Getirisi Hesaplama:
"Bu mülkün kira değerlemesini yap. Bölgedeki benzer dairelerin aylık kira fiyatlarını araştır, yıllık brüt ve net kira getiri oranını hesapla."

Adım 4 — Karşılaştırmalı Tablo:
"Aynı bölgede 3 farklı projeyi karşılaştıran bir tablo oluştur: proje adı, m² fiyatı, toplam fiyat, teslim tarihi, ödeme koşulları, avantajlar/dezavantajlar."

İpuçları:
- Sahibinden, hepsiemlak gibi sitelerden güncel fiyatları toplayıp ChatGPT'ye ver — daha doğru analiz yapar
- Tapu kayıtlarındaki gerçek satış fiyatlarını kullan (varsa)
- AI çıktısını mutlaka kendi bilginle kontrol et — piyasa bilgin her zaman AI'dan daha günceldir
- Raporu müşteriye gönderirken RE/MAX Doğuş logosu ve danışman bilgini ekle

---`,p:`KAPARO SÜRECİ`},
{t:`NotebookLM Nedir?`,b:`Google'ın geliştirdiği ücretsiz yapay zeka asistanı. Yüklediğin belgeleri analiz eder, özetler, rapor oluşturur, sunum hazırlar ve hatta podcast formatında sesli özet üretir. Önemli farkı: sadece senin yüklediğin kaynaklara dayalı çalışır, uydurma bilgi riski düşük.`,p:`KAPARO SÜRECİ`},
{t:`NotebookLM'e Giriş`,b:`1. notebooklm.google.com adresine git
2. Google hesabınla giriş yap (ücretsiz)
3. "Yeni Notebook Oluştur" butonuna tıkla
4. Kaynaklarını yükle: PDF, Google Docs, web sitesi (URL), YouTube videosu, metin`,p:`KAPARO SÜRECİ`},
{t:`Gayrimenkul İçin Kullanım Alanları`,b:`Değerleme raporu hazırlama:
1. Emsal verileri içeren dosyalarını (PDF, Excel tablosu, ekran görüntüleri) NotebookLM'e yükle
2. Bölge hakkındaki haberleri, imar planlarını, proje broşürlerini ekle
3. Sor: "Bu kaynaklara göre Fikirtepe bölgesinde 2+1 daire için fiyat analizi yap ve müşteriye sunulacak bir değerleme raporu oluştur"
4. NotebookLM tüm kaynaklarını analiz edip rapor üretir

Müşteri sunumu hazırlama:
1. Proje broşürlerini, fiyat listelerini, fotoğrafları NotebookLM'e yükle
2. Sor: "Bu projenin avantajlarını ve yatırım getirisini anlatan bir sunum metni hazırla"
3. "Slide Deck" özelliğiyle otomatik sunum slaytları oluştur (Studio bölümünden)

Bölge analiz raporu:
1. Fikirtepe kentsel dönüşüm haberleri, imar planları, belediye raporlarını yükle
2. Sor: "Bu kaynaklara göre Fikirtepe'nin 5 yıllık değer artış potansiyelini analiz et"
3. Sonucu müşteriye gönder`,p:`KAPARO SÜRECİ`},
{t:`NotebookLM'in Temel Özellikleri`,b:`Soru-Cevap: Yüklediğin belgelere sorular sor, kaynağa dayalı cevap alırsın. Her cevabın altında hangi belgeden geldiğini gösterir.

Rapor Oluşturma: Sağ panelde "Rapor Oluştur" seçeneğiyle farklı formatlarda raporlar üret:
- Çalışma kılavuzu
- Blog yazısı
- Brifing belgesi
- Teknik inceleme
- "Kendiniz oluşturun" ile kendi formatını belirle

Slide Deck (Sunum Oluşturma): Studio bölümünden otomatik sunum slaytları oluştur. Görseller, grafikler ve metin blokları otomatik düzenlenir. Slaytları düzenleyebilir, gereksiz kısımları kaldırabilirsin.

Audio Overview (Sesli Özet / Podcast): Studio bölümünden "Audio Overview" seç. İki yapay ses arasında geçen doğal podcast formatında sesli özet üretir. 15-25 dakika arası. MP3 olarak indirebilirsin. Müşteriye dinlettirmek veya kendi bilgini tazelemek için harika.

İnfografik: Verilerini görsel infografik formatına dönüştürür. Sosyal medyada paylaşmak veya müşteriye göndermek için kullanışlı.`,p:`KAPARO SÜRECİ`},
{t:`NotebookLM Pratik İpuçları`,b:`- Net ve spesifik sorular sor: "Bu rapordaki m² fiyatları neler?" > "Bu belge ne diyor?"
- Birden fazla kaynak yükle — NotebookLM kaynaklar arası bağlantı kurar
- Türkçe kaynak yükleyebilir ve Türkçe soru sorabilirsin
- Ücretsiz planda günlük 10 rapor limiti var — önemli raporlara öncelik ver

{t:`Filtre ve Renk Düzeltme`,b:`1. Klibi seç > "Filtreler" (Filters)

{t:`Hız Ayarı`,b:`1. Klibi seç > "Hız" (Speed)

{t:`Dışa Aktarma (Export)`,b:`1. Sağ üstteki "Dışa Aktar" (Export) butonuna bas
2. Çözünürlük: 1080p (Full HD) — daha düşük seçme

{t:`Tanımlar`,b:`Referral (Yönlendirme): Bir gayrimenkule veya müşteriye ait bilgilerin başka bir RE/MAX ofisiyle paylaşılması. Amaç: müşteriye daha hızlı hizmet sunmak.
Cooperation (İş Birliği): İki danışman/ofisin aynı işlemde taraflı (alıcı-satıcı) birlikte çalışması. Her ofis kendi tarafının hizmet bedelini tahsil eder.
Takım Çalışması (Team Work): Aynı portföy/müşteri üzerinde iki+ danışmanın yazılı paylaşım anlaşmasıyla ortak çalışması. Masraf ve kazanç %50-%50.`,p:`REFERRAL VE COOPERATION PROSEDÜRÜ (2026)`},
{t:`Genel İlkeler`,b:`1. Her işlem kayıt altına alınmalı — MYRE/MAX Referral Co-operation listesi üzerinden yapılır
2. Sözlü veya WhatsApp yönlendirmeleri resmi işlem sayılmaz
3. Referral sözleşmeyi alan ofisindir
4. Portföyü yönlendiren ofis sadece yönlendirme hakkı alır, hukuki haklar sözleşmeyi alan ofisindir
5. Referral ödemesi en geç 3 iş günü içinde yapılmalı
6. Ödeme banka aracılığıyla — elden veya makbuzsuz ödeme yasak
7. Tüm anlaşmalar şeffaf olmalı
8. Satış fiyatı, hizmet bedeli, müşteri iletişimi açık paylaşılmalı
9. Her işlemde "ofis esastır" — portföyler ve referral hakları ofise aittir`,p:`REFERRAL VE COOPERATION PROSEDÜRÜ (2026)`},
{t:`Süreç Akışı`,b:`1. MYRE/MAX'ta "Referral Co-operation" menüsünden yeni talep oluştur
2. Portföy türü (satılık/kiralık) ve bölgesini belirt
3. Karşı ofis 24 saat içinde kabul/ret
4. Kabul → yönlendirme tamamlanır`,p:`REFERRAL VE COOPERATION PROSEDÜRÜ (2026)`},
{t:`Paylaşım Oranları`,b:`- Satış: %25 referral payı (yönlendiren ofis, hizmet bedelinin %25'ini alır)
- Kiralama: %12,5 referral payı
- Cooperation: %50 / %50 (her taraf kendi müşterisinden)
- Takım Çalışması: %50 / %50 (fiilen yer gösterimi zorunlu)`,p:`REFERRAL VE COOPERATION PROSEDÜRÜ (2026)`},
{t:`Süre ve Geçerlilik`,b:`- Referral geçerlilik süresi maksimum 2 yıl
- Aynı müşteri 1 yıl içinde aynı portföy için tekrar işlem yaparsa ilk referral ofisine hak doğar`,p:`REFERRAL VE COOPERATION PROSEDÜRÜ (2026)`},
{t:`Özel Durumlar`,b:`- Fiyat/hizmet bedeli değişirse: Gerçekleşen fiyat üzerinden ödeme yapılır
- Referral'ın referral'ı olmaz (transfer zinciri kuralı)
- Üçlü paylaşımlarda her ofis kendi tarafına göre hak alır
- RE/MAX dışı kişilere %25 kuralı geçersiz — mutabakat ile %5-%10 arası jest ödemesi
- Tanıdık müşteri istisnası: Karşı ofisin son 1 yılda aktif iletişimde olduğu müşteri → referral geçersiz
- %25 referral oranı değiştirilemez
- Tüm ödemeler ofis hesabından — danışmanlar arası doğrudan para transferi yasak`,p:`REFERRAL VE COOPERATION PROSEDÜRÜ (2026)`},
{t:`Takım Çalışması Kuralları`,b:`- Sözleşmeyi alan danışman portföyü sisteme girer ve brandayı kendi adına asar
- Alıcıyı da kendileri buluyorsa toplam hizmet bedeli 2'ye bölünür
- Firma portföyünde hizmet bedeli firmadan A ofise ödenir, A ofis 3 iş günü içinde B'ye aktarır
- Parça parça ödeme geliyorsa her ödeme anında paylaşım yapılır

const STOP=new Set(` + repr(list(set('bir bu şu ve ile de da mi mı mu mü ben sen biz siz ya hem en olan olarak ama fakat veya diyor dedi ne nasıl nedir yapacağım yapıyorum yapmak yapmalıyım yapayım yapılır hazırlayacağım hazırlıyorum hazırlamak hazırla istiyorum isterim istiyor gerekiyor lazım dolduracağım dolduruyorum doldurmak olmalı olacak nereye nereden nerede kaçta kim kimin açılıyor kapanıyor gerekenler gerekli dosyası dosyasını'.split()))).replace("'",'"').replace('[','').replace(']','') + `".split(",").map(s=>s.trim().replace(/"/g,'')));

function norm(t){return t.toLowerCase().replace(/İ/g,'i').replace(/I/g,'ı').replace(/\u0130/g,'i').replace(/['']/g,'');}
function stems(w){
const s=new Set([w]);
const sfx=['ları','leri','ların','lerin','ndan','nden','ndaki','ndeki','daki','deki','ının','inin','unun','ünün','ına','ine','una','üne','nın','nin','nun','nün','nda','nde','dan','den','tan','ten','da','de','ta','te','lar','ler','ya','ye','ın','in','un','ün','yor','ken','mış','miş','muş','müş','ı','i','u','ü'];
sfx.sort((a,b)=>b.length-a.length);
for(const sx of sfx){if(w.endsWith(sx)&&w.length-sx.length>=3){s.add(w.slice(0,-sx.length));break;}}
return s;}

const INTENTS=[
[/kontrat|sözleşme.*(doldur|hazırla|yaz)/,'matbu evraklar'],
[/sahibinden.*(ilan|nasıl|verme|yayınla)/,"sahibinden.coma ilan verme"],
[/kira\s+sözleşme/,'kira sözleşmesi önemli maddeleri'],
[/çay.*(demle|nasıl|kaç)/,'ofis açılış prosedürü'],
[/ofis.*(saat|kaçta|açık$|kapalı)/,'ofis kuralları'],
];

function checkIntent(q){
const ql=norm(q);
for(const[re,target] of INTENTS){
if(re.test(ql)){
const t=norm(target);
const found=S.find(s=>norm(s.t).includes(t));
if(found) return found;
}}return null;}

function getNobetci(d){
const r=['Gamze Yetkin','Gizem Gök','İrem Aleyna Tetik','Orhan Özazman','Evşen Özazman','Özlem Varol','Ayşegül Alpay'];
const a=new Date(2026,6,23);let c=0;const dt=new Date(a);dt.setDate(dt.getDate()+1);
while(dt<=d){if(dt.getDay()!==0&&dt.getDay()!==6)c++;dt.setDate(dt.getDate()+1);}
return r[c%7];}

function nobetInfo(){
const g=['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];
const a=['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
const t=new Date();const we=t.getDay()===0||t.getDay()===6;
let m='📅 '+t.getDate()+' '+a[t.getMonth()]+' '+g[t.getDay()]+'\n\n';
m+=we?'Hafta sonu — nöbet yok.\n\n':'Bugünkü nöbetçi: '+getNobetci(t)+'\n\n';
m+='Önümüzdeki 7 iş günü:\n';
const d=new Date(t);for(let i=0;i<7;i++){d.setDate(d.getDate()+1);while(d.getDay()===0||d.getDay()===6)d.setDate(d.getDate()+1);
m+=d.getDate()+' '+a[d.getMonth()]+' '+g[d.getDay()]+' → '+getNobetci(d)+'\n';}
m+='\nDöngü: Gamze → Gizem → İrem → Orhan → Evşen → Özlem → Alpay';
return m;}

function findAnswer(query){
const ql=norm(query);
if(/nöbet|nöbetçi/.test(ql)&&/kim|bugün|yarın|sıra/.test(ql))
return{title:'📅 Nöbet Düzeni',body:nobetInfo()};
const ir=checkIntent(query);
if(ir) return{title:ir.t,body:ir.b};
const qc=ql.replace(/[?!.,""]/g,'');
const words=qc.split(/\s+/).filter(w=>w.length>1&&!STOP.has(w));
if(!words.length) return null;
const wst={};const wdc={};
words.forEach(w=>{wst[w]=stems(w);
let c=0;S.forEach(s=>{const f=norm(s.t+' '+s.p+' '+s.b);wst[w].forEach(st=>{if(f.includes(st))c++;});});
wdc[w]=Math.max(c,1);});
let best=null,bs=0;
S.forEach(sec=>{
const tl=norm(sec.t),pl=norm(sec.p),fl=tl+' '+pl+' '+norm(sec.b);
let sc=0,mt=0;
words.forEach(w=>{
const idf=Math.min(S.length/wdc[w],30);const st=wst[w];let hit=false;
st.forEach(s=>{if(!hit&&tl.includes(s)){sc+=40*idf;mt++;hit=true;}});
if(!hit)st.forEach(s=>{if(!hit&&pl.includes(s)){sc+=15*idf;mt++;hit=true;}});
if(!hit)st.forEach(s=>{if(!hit&&fl.includes(s)){const boost=wdc[w]<=3?8:2;sc+=boost*idf;mt++;hit=true;}});
});
if(!mt)return;
const ratio=mt/words.length;
if(ratio===1&&words.length>1)sc*=3;
else if(ratio>=0.6)sc*=1.5;
else if(ratio<0.3&&words.length>2)sc*=0.05;
const bl=sec.b.length;
if(bl<150)sc*=1.8;else if(bl<300)sc*=1.3;else if(bl>3000)sc*=0.6;
if(sc>bs){bs=sc;best=sec;}});
return best?{title:best.t,body:best.b}:null;}
