{t:'Tanımlar',c:'### Tanımlar\nReferral (Yönlendirme): Bir gayrimenkule veya müşteriye ait bilgilerin başka bir RE/MAX ofisiyle paylaşılması. Amaç: müşteriye daha hızlı hizmet sunmak.\nCooperation (İş Birliği): İki danışman/ofisin aynı işlemde taraflı (alıcı-satıcı) birlikte çalışması. Her ofis kendi tarafının hizmet bedelini tahsil eder.\nTakım Çalışması (Team Work): Aynı portföy/müşteri üzerinde iki+ danışmanın yazılı paylaşım anlaşmasıyla ortak çalışması. Masraf ve kazanç %50-%50.',k:['eder','re','başka','danışman','max','sunmak','kazanç','işlemde','taraflı','her','portföy','üzerinde','tarafının','alıcı','masraf','danışmanın','müşteri','aynı','tanımlar','work','yazılı','paylaşılması','bir','ki','referral','ofisin','satıcı','kendi','gayrimenkule','cooperation']},
{t:'Genel İlkeler',c:'### Genel İlkeler\n1. Her işlem kayıt altına alınmalı — MYRE/MAX Referral Co-operation listesi üzerinden yapılır\n2. Sözlü veya WhatsApp yönlendirmeleri resmi işlem sayılmaz\n3. Referral sözleşmeyi alan ofisindir\n4. Portföyü yönlendiren ofis sadece yönlendirme hakkı alır, hukuki haklar sözleşmeyi alan ofisindir\n5. Referral ödemesi en geç 3 iş günü içinde yapılmalı\n6. Ödeme banka aracılığıyla — elden veya makbuzsuz ödeme yasak\n7. Tüm anlaşmalar şeffaf olmalı\n8. Satış fiyatı, hizmet bedeli, müşteri iletişimi açık paylaşılmalı\n9. Her işlemde "ofis esastır" — portföyler ve referral hakları ofise aittir',k:['banka','max','üzerinden','her','alan','myre','co','en','iş','yapılmalı','aracılığıyla','ofisindir','müşteri','sözleşmeyi','hakkı','resmi','elden','referral','hukuki','şeffaf','altına','bedeli','alır','geç','yönlendirmeleri','veya','whatsapp','yönlendiren','sadece','satış']},
{t:'Süreç Akışı',c:'### Süreç Akışı\n1. MYRE/MAX\'ta "Referral Co-operation" menüsünden yeni talep oluştur\n2. Portföy türü (satılık/kiralık) ve bölgesini belirt\n3. Karşı ofis 24 saat içinde kabul/ret\n4. Kabul → yönlendirme tamamlanır',k:['talep','max','oluştur','portföy','myre','co','belirt','kabul','saat','ta','referral','süreç','operation','menüsünden','bölgesini','yeni','ret','kiralık','karşı','tamamlanır','ofis','satılık','içinde','akışı','türü','yönlendirme','ve']},
{t:'Paylaşım Oranları',c:'### Paylaşım Oranları\n- Satış: %25 referral payı (yönlendiren ofis, hizmet bedelinin %25\'ini alır)\n- Kiralama: %12,5 referral payı\n- Cooperation: %50 / %50 (her taraf kendi müşterisinden)\n- Takım Çalışması: %50 / %50 (fiilen yer gösterimi zorunlu)',k:['müşterisinden','her','kiralama','gösterimi','ini','referral','kendi','zorunlu','yer','fiilen','alır','cooperation','takım','bedelinin','yönlendiren','taraf','oranları','satış','çalışması','ofis','hizmet','paylaşım','payı']},
{t:'Süre ve Geçerlilik',c:'### Süre ve Geçerlilik\n- Referral geçerlilik süresi maksimum 2 yıl\n- Aynı müşteri 1 yıl içinde aynı portföy için tekrar işlem yaparsa ilk referral ofisine hak doğar',k:['için','portföy','doğar','müşteri','aynı','ilk','referral','yaparsa','maksimum','yıl','ve','geçerlilik','tekrar','süre','içinde','süresi','hak','işlem','ofisine']},
{t:'Özel Durumlar',c:'### Özel Durumlar\n- Fiyat/hizmet bedeli değişirse: Gerçekleşen fiyat üzerinden ödeme yapılır\n- Referral\'ın referral\'ı olmaz (transfer zinciri kuralı)\n- Üçlü paylaşımlarda her ofis kendi tarafına göre hak alır\n- RE/MAX dışı kişilere %25 kuralı geçersiz — mutabakat ile %5-%10 arası jest ödemesi\n- Tanıdık müşteri istisnası: Karşı ofisin son 1 yılda aktif iletişimde olduğu müşteri → referral geçersiz\n- %25 referral oranı değiştirilemez\n- Tüm ödemeler ofis hesabından — danışmanlar arası doğrudan para transferi yasak',k:['re','tanıdık','max','aktif','durumlar','üzerinden','her','ödemeler','zinciri','para','müşteri','ile','oranı','kişilere','doğrudan','ofisin','referral','özel','kendi','son','ın','bedeli','istisnası','alır','arası','iletişimde','hesabından','olduğu','dışı','ödeme']},
{t:'Takım Çalışması Kuralları',c:'### Takım Çalışması Kuralları\n- Sözleşmeyi alan danışman portföyü sisteme girer ve brandayı kendi adına asar\n- Alıcıyı da kendileri buluyorsa toplam hizmet bedeli 2\'ye bölünür\n- Firma portföyünde hizmet bedeli firmadan A ofise ödenir, A ofis 3 iş günü içinde B\'ye aktarır\n- Parça parça ödeme geliyorsa her ödeme anında paylaşım yapılır\n\n---\n\n## REMAX TÜRKİYE OFİS PERFORMANS KARNESİ (2026)',k:['alıcıyı','ofi','danışman','parça','da','firmadan','alan','her','aktarır','iş','kuralları','sözleşmeyi','karnesi','ödenir','portföyünde','anında','ye','brandayı','kendi','bedeli','bölünür','takım','sisteme','asar','ödeme','kendileri','çalışması','türki','ofis','portföyü']},

function login(){
  const s=document.getElementById("nameSelect"),p=document.getElementById("pinInput").value,e=document.getElementById("loginError");
  if(!s.value){e.textContent="Danışman seçiniz";return;}
  if(p!==s.value){e.textContent="PIN hatalı";return;}
  document.getElementById("loginScreen").style.display="none";
  document.getElementById("app").style.display="flex";
  const name=s.options[s.selectedIndex].text;
  document.getElementById("welcomeName").textContent="Merhaba "+name.split(" ")[0]+"!";
  document.getElementById("userLabel").textContent=name;
  document.getElementById("searchInput").focus();
}

function search(q){document.getElementById("searchInput").value=q;doSearch();}

function doSearch(){
  const q=document.getElementById("searchInput").value.trim().toLowerCase();
  if(!q)return;
  document.getElementById("welcome").style.display="none";
  const words=q.replace(/[?!.,]/g,'').split(/\s+/).filter(w=>w.length>1);
  
  const scored=D.map((item,i)=>{
    const txt=(item.t+' '+item.c).toLowerCase();
    let score=0;
    words.forEach(w=>{
      // Exact word match
      if(txt.includes(w)) score+=3;
      else if(w.length>=4 && txt.includes(w.substring(0,w.length-1))) score+=2;
      else if(w.length>=5 && txt.includes(w.substring(0,w.length-2))) score+=1;
      // Partial match
      const variations={
        'su':['su','hamidiye','suyu','suyunu','içme','bitince','sipariş','söyle','ofis suyu','damacana'],
        'nöbet':['nöbet','nöbetçi','nobetci','görev','döngü'],
        'kapanış':['kapanış','kapanis','kapaniş','kapanıs'],
        'tapu':['tapu','devir','harç','takyidat','rayiç','ekspertiz','eksper'],
        'müşteri':['müşteri','itiraz','pahalı','komisyon','düşüneyim'],
        'kıbrıs':['kıbrıs','kibris','döveç','cyprus','northernland'],
        'sunum':['sunum','1.sunum','2.sunum','görüşme'],
        'instagram':['instagram','insta','sosyal medya'],
        'whatsapp':['whatsapp','grup','broadcast','toplu mesaj'],
        'canva':['canva','görsel','afiş','tasarım'],
        'capcut':['capcut','video','montaj','düzenleme'],
        'matbu':['matbu','evrak','sözleşme','kontrat','yetki belgesi'],
        'portföy':['portföy','portfolio','ilan','sahibinden'],
        'değerleme':['değerleme','ekspertiz','fiyat analizi'],
        'linkedin':['linkedin','profesyonel'],
        'linktree':['linktree','bio link'],
        'referral':['referral','cooperation','yönlendirme','paylaşım oranı'],
        'karne':['karne','performans','puan','sıralama','rozet'],
        'marka':['marka','logo','renk','standart','brand'],
        'ofis':['ofis','açılış','kapanış prosedür','kural','çalışma saat'],
        'pin':['pin','giriş','şifre','login'],
        'tedarikçi':['tedarikçi','matbaa','turgut','drone','ensar','hamidiye','muameleci','burak bey','sipariş','bitti','bitince','söyle'],
        'takvim':['takvim','calendar','bildirim','google takvim'],
        'hesap':['hesap','iban','banka','npara'],
        'myremax':['myremax','myre','remax sistemi','sistem'],
        'eğitim':['eğitim','power','akademi','oryantasyon'],
        'chatgpt':['chatgpt','yapay zeka','ai','gemini','notebooklm'],
        'kariyer':['kariyer','danışman olmak','aday'],
        'afiş':['afiş','kartvizit','turgut','basım','tabela'],
        'video':['video','drone','ensar','capcut','çekim'],
        'fotoğraf':['fotoğraf','ışık','obje sil','staging','eşyalı'],
      };
      for(const[key,vals] of Object.entries(variations)){
        if(w===key||vals.some(v=>w.includes(v)||v.includes(w))){
          if(vals.some(v=>txt.includes(v))) score+=5;
        }
      }
    });
    // Title bonus
    if(words.some(w=>item.t.toLowerCase().includes(w))) score+=10;
    return{idx:i,score};
  });

  scored.sort((a,b)=>b.score-a.score);
  const results=scored.filter(s=>s.score>0).slice(0,5);
  
  const container=document.getElementById("results");
  // Remove old cards
  container.querySelectorAll('.card,.no-result').forEach(el=>el.remove());
  
  const mc=document.getElementById("matchCount");
  
  if(results.length===0){
    mc.style.display="none";
    container.innerHTML+='<div class="no-result"><div class="emoji">🤔</div><p>Aramanızla eşleşen sonuç bulunamadı.<br><b>Farklı kelimelerle tekrar dene</b> veya <b>Umut Bey ile görüş.</b></p></div>';
    return;
  }

  mc.textContent="✓ "+results.length+" sonuç bulundu";
  mc.style.display="block";

  results.forEach(r=>{
    const item=D[r.idx];
    const card=document.createElement("div");
    card.className="card";
    
    // Format content - remove markdown headers
    let body=item.c.replace(/^#{1,3}\s*/gm,'').replace(/^---$/gm,'').trim();
    // Highlight search terms
    words.forEach(w=>{
      if(w.length>2){
        const regex=new RegExp('('+w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
        body=body.replace(regex,'<span class="highlight">$1</span>');
      }
    });
    
    card.innerHTML='<div class="card-title">'+item.t+'</div><div class="card-body">'+body+'</div>';
    container.appendChild(card);
  });

  container.scrollTop=0;
}

document.getElementById("searchInput").addEventListener("keydown",function(e){if(e.key==="Enter")doSearch();});
document.getElementById("pinInput").addEventListener("input",function(){this.value=this.value.replace(/[^0-9]/g,"");});
document.getElementById("pinInput").addEventListener("keydown",function(e){if(e.key==="Enter")login();});
</script>
